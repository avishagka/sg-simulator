<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>סימולטור עיבוד ותצוגת נתוני מדריך השירותים</title>
  <style>
    :root {
      --bg: #eef7fb;
      --card: #ffffff;
      --text: #17385c;
      --muted: #667b90;
      --border: #d7e6ef;
      --soft: #f6fbfe;
      --info: #e5f6fd;
      --info-text: #0067a6;
      --danger: #fff1f0;
      --danger-text: #b3261e;
      --success: #e8f8ee;
      --success-text: #14743c;
      --primary: #0067a6;
      --primary-hover: #00578f;
      --primary-text: #ffffff;
      --accent: #00a6d6;
      --accent-soft: #dff5fb;
      --yellow: #ffd200;
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, "Segoe UI", "Noto Sans Hebrew", sans-serif;
      background: linear-gradient(180deg, #e6f6fc 0, #f7fbfd 260px, #eef7fb 100%);
      color: var(--text);
    }

    .page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px;
    }

    h1, h2, h3, p { margin: 0; }

    .top {
      margin-bottom: 20px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 20px;
      box-shadow: 0 10px 28px rgba(0, 103, 166, 0.08);
    }

    .top-copy { flex: 1; }

    .endpoint-picker {
      width: max-content;
      display: grid;
      gap: 6px;
    }

    .endpoint-picker label {
      font-size: 13px;
      color: #24577f;
      font-weight: 700;
    }

    .endpoint-picker select {
      width: auto;
      min-width: 0;
      max-width: 260px;
    }

    @media (max-width: 720px) {
      .top { display: block; }
      .endpoint-picker { margin-top: 12px; }
    }

    .top h1 {
      font-size: 28px;
      margin-bottom: 8px;
      color: var(--primary);
      font-weight: 700;
    }

    .top p {
      color: var(--muted);
      font-size: 15px;
    }

    .contact-note {
      margin-top: 10px;
      color: var(--text);
      font-size: 14px;
    }

    .contact-note a {
      color: var(--primary);
      font-weight: 700;
      text-decoration: underline;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    .simulator-workspace {
      direction: rtl;
      grid-template-columns: minmax(0, 1fr);
      grid-template-areas: "main";
    }

    .main-panel {
      grid-area: main;
      direction: rtl;
      min-width: 0;
    }

    .json-side-panel {
      grid-area: side;
      direction: rtl;
      display: none;
      gap: 14px;
      position: sticky;
      top: 16px;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .simulator-workspace { grid-template-columns: 1fr; }
      .json-side-panel { position: static; display: none; }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 20px rgba(0, 103, 166, 0.07);
    }

    .card-body {
      padding: 16px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .button {
      border: 1px solid var(--border);
      background: white;
      color: var(--primary);
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      font-weight: 700;
    }

    .button:hover {
      background: var(--accent-soft);
      border-color: #a8ddec;
    }

    .button:focus-visible,
    .tab:focus-visible,
    .provider-accordion-head:focus-visible,
    .search-result-card:focus-visible {
      outline: 3px solid rgba(0, 166, 214, 0.35);
      outline-offset: 3px;
    }

    .button:disabled,
    .tab:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .button.primary {
      background: var(--primary);
      color: var(--primary-text);
      border-color: var(--primary);
    }

    .button.primary:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .button.small {
      padding: 6px 10px;
      font-size: 13px;
    }

    textarea {
      width: 100%;
      min-height: 520px;
      resize: vertical;
      direction: ltr;
      text-align: left;
      font-family: Consolas, Monaco, monospace;
      font-weight: 400;
      font-size: 12px;
      line-height: 1.5;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      outline: none;
      background: #fff;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 166, 214, 0.14);
    }

    .source-editor textarea { min-height: 420px; }

    .agent-loader textarea {
      min-height: 220px;
    }

    .helper-text {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      margin: 0 0 10px;
    }

    .file-input {
      border: 1px dashed var(--border);
      background: var(--soft);
      border-radius: 12px;
      padding: 8px;
      font-size: 13px;
      max-width: 280px;
    }

    select {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 14px;
      background: #fff;
      font-family: inherit;
      color: var(--text);
    }

    select:focus {
      outline: 0;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 166, 214, 0.14);
    }

    .control-panel {
      display: grid;
      grid-template-columns: max-content max-content;
      gap: 14px;
      align-items: end;
      justify-content: end;
    }

    @media (max-width: 720px) {
      .control-panel { grid-template-columns: 1fr; }
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
    }

    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .error {
      margin-top: 10px;
      color: var(--danger-text);
      background: var(--danger);
      border: 1px solid #ffc9c4;
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .nav-panel {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .tab-group {
      display: grid;
      grid-template-columns: 112px repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
      align-items: center;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px;
    }

    .tab-group-title {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      padding-inline: 8px;
    }

    .tab {
      padding: 10px;
      border: 1px solid var(--border);
      background: white;
      color: var(--primary);
      border-radius: 999px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
    }

    .tab.active {
      background: var(--primary);
      color: var(--primary-text);
      border-color: var(--primary);
      box-shadow: 0 6px 14px rgba(0, 103, 166, 0.18);
    }

    .summary-item {
      color: #24577f;
      font-size: 14px;
      font-weight: 700;
    }

    .summary-item + .summary-item::before {
      content: "•";
      color: #8aa5b8;
      margin-inline: 2px 10px;
    }

    .intro-state {
      max-width: 860px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 8px 20px rgba(0, 103, 166, 0.07);
    }

    .intro-state h2 {
      color: var(--primary);
      font-size: 24px;
      margin-bottom: 10px;
    }

    .intro-state p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
      max-width: 760px;
    }

    .intro-prompt {
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
      margin-top: 16px;
    }

    .intro-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .processing-summary {
      max-width: 980px;
      margin: 0 auto 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: 0 6px 16px rgba(0, 103, 166, 0.06);
    }

    .summary-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .summary-items {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .entity-switcher {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-start;
      margin-bottom: 14px;
    }

    .screen {
      max-width: 820px;
      margin: 0 auto;
      background: #edf8fc;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .header-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 18px rgba(0, 103, 166, 0.08);
    }

    .header-content {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      flex-direction: row-reverse;
    }

    .avatar {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex: 0 0 auto;
    }

    .header-main {
      flex: 1;
      display: grid;
      gap: 12px;
    }

    .name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .entity-type {
      color: var(--muted);
      font-size: 14px;
    }

    .attributes {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    @media (max-width: 700px) {
      .attributes { grid-template-columns: 1fr 1fr; }
    }

    .attr-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-start;
    }

    .chip {
      background: var(--soft);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      background: var(--info);
      color: var(--info-text);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .accessibility {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
    }

    .remark {
      background: var(--info);
      color: var(--info-text);
      border: 1px solid #bee9f6;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .section {
      background: white;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .section-toggle {
      width: 100%;
      border: 0;
      background: #ffffff;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-size: 18px;
      font-weight: 700;
      text-align: right;
    }

    .section-content {
      padding: 0 16px 16px;
    }

    .schedule-group {
      margin-bottom: 18px;
    }

    .schedule-title {
      display: flex;
      gap: 8px;
      align-items: center;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .schedule-table {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .schedule-row {
      display: grid;
      grid-template-columns: 70px 1fr;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .schedule-row:last-child { border-bottom: 0; }

    .day-cell {
      background: var(--soft);
      padding: 10px;
      text-align: center;
      font-weight: 700;
    }

    .hours-cell {
      padding: 10px;
      display: grid;
      gap: 4px;
    }

    .closed { color: #9ca3af; }

    .note { color: var(--muted); }

    .contact-item,
    .location-item,
    .service-item,
    .detail-row {
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
    }

    .contact-item:last-child,
    .location-item:last-child,
    .service-item:last-child,
    .detail-row:last-child { border-bottom: 0; }

    .contact-item {
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }

    .contact-action {
      direction: ltr;
      text-align: left;
      color: var(--muted);
      font-size: 13px;
    }

    .label {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .muted { color: var(--muted); }

    .message {
      background: var(--soft);
      border-radius: 12px;
      padding: 10px;
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
    }

    .service-group {
      margin-bottom: 16px;
    }

    .service-title {
      font-weight: 700;
      margin-bottom: 8px;
    }

    .service-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
    }

    .detail-section {
      margin-bottom: 18px;
    }

    .detail-title {
      font-weight: 700;
      margin-bottom: 8px;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 12px;
      font-size: 14px;
    }

    pre {
      margin: 0;
      direction: ltr;
      text-align: left;
      background: #0f172a;
      color: #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      overflow: auto;
      max-height: 760px;
      font-size: 12px;
      line-height: 1.5;
    }

    .tests {
      margin-top: 12px;
      font-size: 14px;
      max-width: 980px;
      margin-inline: auto;
    }

    .test-pass { color: var(--success-text); }
    .test-fail { color: var(--danger-text); }

    .provider-screen {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 8px 20px rgba(0, 103, 166, 0.07);
    }

    .provider-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      padding: 16px;
      box-shadow: 0 6px 16px rgba(0, 103, 166, 0.06);
    }

    .provider-section-title {
      color: var(--primary);
      font-size: 20px;
      font-weight: 800;
      border-bottom: 1px solid #bce8f5;
      padding-bottom: 12px;
      margin: 0 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .service-screen-title {
      color: var(--primary);
      font-size: 18px;
      font-weight: 800;
      text-align: right;
      margin: 0;
    }

    .service-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.65fr) minmax(260px, .95fr);
      grid-template-areas: "main side";
      gap: 28px;
      align-items: start;
    }

    .service-layout.single {
      grid-template-columns: 1fr;
      grid-template-areas: "main";
    }

    .service-main-column {
      grid-area: main;
      display: grid;
      gap: 18px;
    }

    .service-side-column {
      grid-area: side;
      display: grid;
      gap: 18px;
    }

    .doctor-hero {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 16px;
      background: var(--accent-soft);
      border-radius: 12px;
      padding: 16px;
      align-items: center;
    }

    .doctor-avatar {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--primary);
      border: 1px solid var(--border);
      font-weight: 800;
    }

    .doctor-name {
      font-size: 22px;
      color: var(--primary);
      font-weight: 800;
      margin: 0 0 8px;
    }

    .doctor-meta {
      font-size: 15px;
      line-height: 1.8;
      color: #1d2840;
    }

    .provider-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 14px 0 0;
      justify-content: flex-start;
    }

    .provider-chip {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 700;
      background: var(--soft);
      border: 1px solid transparent;
    }

    .provider-chip.green { background: var(--success); color: var(--success-text); }
    .provider-chip.blue { background: var(--info); color: var(--info-text); border-color: #b8e6f4; }
    .provider-chip.red { background: #fff0f2; color: #d5243f; border-color: #ffc2cb; }

    .provider-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .provider-notice,
    .absence-item {
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 8px;
      align-items: start;
      font-size: 14px;
      line-height: 1.7;
      color: #2e3447;
      padding: 8px 0;
    }

    .provider-notice {
      background: #fff8d9;
      border: 1px solid #ffe27a;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 10px;
    }

    .provider-icon-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 13px;
    }

    .warn-icon {
      color: #e8a700;
      font-weight: 900;
      font-size: 18px;
      line-height: 1.3;
    }

    .provider-accordion {
      border: 1px solid var(--border);
      border-radius: 12px;
      margin: 10px 0;
      overflow: hidden;
      background: #fff;
    }

    .provider-accordion-head {
      width: 100%;
      border: 0;
      background: #fff;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 14px;
      font-weight: 800;
      color: var(--primary);
      border-bottom: 1px solid var(--border);
      text-align: right;
      font: inherit;
    }

    .provider-accordion-body { padding: 0 14px 10px; }

    .provider-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .provider-table th {
      background: var(--accent-soft);
      color: var(--text);
      padding: 10px;
      border: 1px solid #b8e6f4;
      font-weight: 800;
    }

    .provider-table td {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    .provider-table tr.day-break td { border-top: 1px solid #bce8f5; }
    .closed { color: #454b5b; }

    .contact-row {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 8px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .contact-row:last-child { border-bottom: 0; }
    .contact-label { font-weight: 800; color: var(--primary); }
    .contact-value { direction: ltr; text-align: left; }
    .contact-values {
      display: grid;
      gap: 6px;
      justify-items: start;
    }
    .contact-value-item {
      direction: ltr;
      text-align: left;
    }

    .treat-row {
      display: grid;
      grid-template-columns: 1fr 84px;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .treat-row:last-child { border-bottom: 0; }

    .coverage-badge {
      justify-self: start;
      border-radius: 7px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid var(--border);
      background: #f4f6f8;
      color: #334;
    }

    .coverage-badge.basket { background: #effcf3; color: #15703a; border-color: #9ee3b4; }
    .coverage-badge.supplementary { background: var(--info); color: var(--info-text); border-color: #b8e6f4; }
    .coverage-badge.unknown { background: #f3f4f6; color: #555; border-color: #ddd; }

    .kv {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      line-height: 1.7;
    }

    .kv:last-child { border-bottom: 0; }
    .kv b { color: var(--primary); }

  <script>
    const dayLabels = {
      1: "א׳",
      2: "ב׳",
      3: "ג׳",
      4: "ד׳",
      5: "ה׳",
      6: "ו׳",
      7: "שבת",
    };

    const contactTypeMap = {
      "01": { type: "phone", label: "טלפון", sortOrder: 1 },
      "02": { type: "appointments", label: "זימון תורים", sortOrder: 2 },
      "03": { type: "fax", label: "פקס", sortOrder: 3 },
      "04": { type: "mobile", label: "נייד", sortOrder: 4 },
      "05": { type: "email", label: "דוא״ל", sortOrder: 5 },
    };

    const scheduleTypeMap = {
      1: { type: "reception", title: "שעות פעילות הרופא", sortOrder: 1 },
      2: { type: "appointments", title: "זימון תורים", sortOrder: 2 },
      5: { type: "additional", title: "נוסף", sortOrder: 3 },
      14: { type: "phone", title: "שעות פעילות טלפונית", sortOrder: 4 },
      15: { type: "teamReception", title: "קבלת קהל צוות", sortOrder: 5 },
    };


    const collapseConfig = {
      availability: {
        enabled: true,
        previewRows: 3,
        showDetailsInPreview: true,
      },
      contacts: {
        enabled: true,
        previewRows: 2,
        showDetailsInPreview: true,
      },
      appointments: {
        enabled: true,
        previewRows: 1,
        showDetailsInPreview: true,
      },
      locations: {
        enabled: true,
        previewRows: 1,
        showDetailsInPreview: false,
      },
      services: {
        enabled: true,
        previewRows: 2,
        showDetailsInPreview: false,
      },
      details: {
        enabled: true,
        previewRows: 1,
        showDetailsInPreview: false,
      },
    };

    const remarkMap = {
      "0010": { type: "emergency", targetArea: "pageTop", displayStyle: "highlight", sortOrder: 1 },
      "00010": { type: "emergency", targetArea: "pageTop", displayStyle: "highlight", sortOrder: 1 },
      "10": { type: "emergency", targetArea: "pageTop", displayStyle: "highlight", sortOrder: 1 },
      "0004": { type: "name", targetArea: "entity", displayStyle: "inline", sortOrder: 2 },
      "0002": { type: "address", targetArea: "locations", displayStyle: "inline", sortOrder: 4 },
      "0003": { type: "schedule", targetArea: "availability", displayStyle: "inline", sortOrder: 5 },
      "0005": { type: "occupation", targetArea: "entity", displayStyle: "regular", sortOrder: 6 },
      "0006": { type: "contact", targetArea: "contacts", displayStyle: "inline", sortOrder: 3 },
      "0008": { type: "clinicServices", targetArea: "services", displayStyle: "regular", sortOrder: 7 },
      "0020": { type: "additionalInfo", targetArea: "details", displayStyle: "regular", sortOrder: 8 },
      "0001": { type: "additionalInfo", targetArea: "details", displayStyle: "regular", sortOrder: 8 },
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeJsString(value) {
      return String(value ?? "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/\r/g, "\\r")
        .replace(/\n/g, "\\n");
    }

    function normalizeArray(value) {
      if (!value) return [];
      return Array.isArray(value) ? value : [value];
    }

    function nonEmpty(value) {
      return value !== undefined && value !== null && String(value).trim() !== "";
    }

    function mapEntityType(chapterCode) {
      if (chapterCode === "001" || chapterCode === "01") return "doctor";
      if (chapterCode === "003" || chapterCode === "03") return "therapist";
      return "other";
    }

    function mapAvatarType(gender) {
      if (gender === "אישה" || gender === "F" || gender === "female") return "female";
      if (gender === "גבר" || gender === "M" || gender === "male") return "male";
      return "default";
    }

    function valuesWithSort(values) {
      return values.filter(nonEmpty).map((value, index) => ({ value, sortOrder: index + 1 }));
    }

    function buildSummaryAttributes(source) {
      const attrs = [];

      let specializationValues = normalizeArray(source.specialization_list)
        .map((value) => String(value || "").trim())
        .filter(Boolean);

      if (!specializationValues.length && source.service_name_doc) {
        specializationValues = [source.service_name_doc];
      }

      if (specializationValues.length) {
        attrs.push({
          type: "specialization",
          label: "מומחיות",
          sortOrder: 1,
          values: valuesWithSort(specializationValues),
        });
      }

      const professionalization = valuesWithSort(
        normalizeArray(source.treat_area_list).map((x) => x && x.treat_area)
      );

      if (professionalization.length) {
        attrs.push({
          type: "professionalization",
          label: "התמקצעות",
          sortOrder: 2,
          values: professionalization,
        });
      }

      let languageValues = normalizeArray(source.languages)
        .slice()
        .sort((a, b) => Number((a && a.seqnr_languages) || 999) - Number((b && b.seqnr_languages) || 999))
        .map((x) => x && x.language)
        .filter(nonEmpty);

      if (!languageValues.length && source.language_list) {
        languageValues = String(source.language_list).split(",").map((x) => x.trim()).filter(Boolean);
      }

      if (languageValues.length) attrs.push({ type: "language", label: "שפות", sortOrder: 3, values: valuesWithSort(languageValues) });
      if (source.city_name) attrs.push({ type: "city", label: null, sortOrder: 4, values: valuesWithSort([source.city_name]) });
      return attrs.sort((a, b) => a.sortOrder - b.sortOrder);
    }

    function buildBadges(source) {
      const badges = [];

      if (source.noMember === true || source.no_member === true || source.no_member_icon === true || source.limited_memb_icon === true) {
        badges.push({
          type: "limitedMembership",
          text: "לא מקבל חברים חדשים",
          displayStyle: "info",
          sortOrder: 1
        });
      }

      const shabanType = Number(source.shaban_type);

      if (shabanType === 1 || shabanType === 3) {
        badges.push({
          type: "shabanConsultation",
          text: "ייעוץ בתשלום נוסף",
          displayStyle: "paidService",
          sortOrder: 2
        });
      }

      if (shabanType === 2 || shabanType === 3) {
        badges.push({
          type: "shabanTreatments",
          text: "ניתוחים וטיפולים בתשלום נוסף",
          displayStyle: "paidService",
          sortOrder: 3
        });
      }

      return badges.sort((a, b) => a.sortOrder - b.sortOrder);
    }

    function buildRemarks(source) {
      return normalizeArray(source.remarks)
        .filter((r) => nonEmpty(r && r.remark_text))
        .map((r, index) => {
          const code = String(r.remark_message_type_code || "");
          const config = remarkMap[code] || { type: "other", targetArea: "details", displayStyle: "regular", sortOrder: 999 };
          const isVisible = code === "10" || code === "0010" || code === "00010";
          return {
            isVisible,
            type: config.type,
            sourceTypeCode: code,
            targetArea: config.targetArea,
            text: String(r.remark_text).trim(),
            displayStyle: config.displayStyle,
            severity: config.type === "emergency" ? "green" : null,
            sortOrder: config.sortOrder * 1000 + Number(r.remark_seqnr || index + 1) * 10 + Number(r.remark_line_number || 1),
          };
        })
        .sort((a, b) => a.sortOrder - b.sortOrder);
    }

    function buildContacts(source) {
      const seenValues = new Set();
      const grouped = new Map();

      normalizeArray(source.contact)
        .filter((c) => nonEmpty(c && c.contact_detail))
        .map((c, index) => {
          const normalizedCode = String(c.contact_code || "").padStart(2, "0");
          const config = contactTypeMap[normalizedCode] || { type: "other", label: c.contact_desc || "אחר", sortOrder: 999 };
          const value = String(c.contact_detail).trim();
          return {
            type: config.type,
            sourceCode: normalizedCode,
            label: c.contact_desc || config.label,
            value,
            groupSortOrder: config.sortOrder,
            sourceSortOrder: index,
          };
        })
        .sort((a, b) => a.groupSortOrder - b.groupSortOrder || a.sourceSortOrder - b.sourceSortOrder)
        .forEach((item) => {
          const dedupKey = `${item.type}:${item.value}`;
          if (seenValues.has(dedupKey)) return;
          seenValues.add(dedupKey);
          if (!grouped.has(item.type)) {
            grouped.set(item.type, {
              type: item.type,
              sourceCode: item.sourceCode,
              label: item.label,
              sortOrder: item.groupSortOrder,
              values: [],
            });
          }
          grouped.get(item.type).values.push({
            value: item.value,
            sortOrder: grouped.get(item.type).values.length + 1,
          });
        });

      return Array.from(grouped.values()).sort((a, b) => a.sortOrder - b.sortOrder);
    }

    function buildScheduleGroups(source) {
      const schedules = normalizeArray(source.schedule).filter((s) => s && s.schedule_type);
      const groupMap = new Map();

      schedules.forEach((s) => {
        const config = scheduleTypeMap[s.schedule_type] || { type: "other", title: s.schedule_desc || "אחר", sortOrder: 999 };
        if (!groupMap.has(config.type)) {
          groupMap.set(config.type, { type: config.type, title: config.title, sortOrder: config.sortOrder, rawRows: [] });
        }
        groupMap.get(config.type).rawRows.push(s);
      });

      return Array.from(groupMap.values())
        .sort((a, b) => a.sortOrder - b.sortOrder)
        .map((group) => {
          const days = Array.from({ length: 7 }, (_, i) => {
            const dayCode = i + 1;
            const dayRows = group.rawRows
              .filter((r) => Number(r.availability_week_day) === dayCode)
              .sort((a, b) => String(a.availability_start_time).localeCompare(String(b.availability_start_time)))
              .map((r, rowIndex) => ({
                startTime: r.availability_start_time || null,
                endTime: r.availability_end_time || null,
                hoursText: `${r.availability_start_time} עד ${r.availability_end_time}`,
                notes: r.frequency_desc || null,
                isClosed: false,
                showDayLabel: rowIndex === 0,
                availableMorning: Boolean(r.available_morning),
                availableAfternoon: Boolean(r.available_afternoon),
                availableEvening: Boolean(r.available_evening),
                sortOrder: rowIndex + 1,
              }));

            return {
              dayCode,
              dayLabel: dayLabels[dayCode],
              isVisible: dayRows.length > 0,
              rows: dayRows.length ? dayRows : [],
            };
          });

          return {
            type: group.type,
            title: group.title,
            sortOrder: group.sortOrder,
            days,
            display: {
              defaultOpen: group.type === "reception",
              previewRows: null,
              hasOverflow: false,
            },
          };
        });
    }

    function buildServices(source) {
      const services = normalizeArray(source.serv_treats).filter((s) => nonEmpty(s && s.cpt_code) || nonEmpty(s && s.sg_treat_name));
      const groups = new Map();

      services.forEach((s, index) => {
        const groupCode = s.cpt_pubt || "00000";
        if (!groups.has(groupCode)) groups.set(groupCode, { groupCode, title: s.cpt_pubt_name || "ללא קטגוריה", sortOrder: groups.size + 1, items: [] });
        groups.get(groupCode).items.push({
          code: s.cpt_code || null,
          name: s.sg_treat_name || s.cell_treat_name || s.hebrew_text || s.hebrew_service_name || "",
          coverageType: s.treat_is_personal === true ? "supplementary" : "basket",
          coverageText: s.treat_is_personal === true ? "משלים" : "בסל",
          locationName: null,
          selfParticipationText: null,
          selfParticipationUrl: null,
          sortOrder: index + 1,
        });
      });

      return Array.from(groups.values()).map((group) => {
        const previewRows = collapseConfig.services.previewRows;
        const hasOverflow = group.items.length > previewRows;
        return {
          ...group,
          display: {
            defaultOpen: !hasOverflow,
            previewRows,
            hasOverflow,
          },
        };
      });
    }

    function buildDetails(source) {
      const sections = [];
      if (source.license_number) {
        sections.push({ type: "license", title: "רישיון", sortOrder: 1, items: [{ label: "מספר רישיון", value: source.license_number, sortOrder: 1 }] });
      }

      normalizeArray(source.resume).forEach((r, index) => {
        const items = [
          { label: r.resume_title1, value: r.resume_title1_contents, sortOrder: 1 },
          { label: r.resume_title2, value: r.resume_title2_contents, sortOrder: 2 },
          { label: r.resume_title3, value: r.resume_title3_contents, sortOrder: 3 },
        ].filter((item) => nonEmpty(item.label) && nonEmpty(item.value));

        if (items.length) sections.push({ type: "resume", title: r.resume_topic || "פרטי השכלה ומומחיות", sortOrder: 10 + Number(r.resume_code || index + 1), items });
      });

      return sections.sort((a, b) => a.sortOrder - b.sortOrder);
    }

    function buildLocations(source, remarks) {
      return [{
        type: "primary",
        city: source.city_name || null,
        street: source.street_name || null,
        streetCode: source.street_code || null,
        houseNumber: source.house_number || null,
        fullAddress: source.full_address || null,
        navigationUrl: null,
        accessibility: { isVisible: Boolean(source.accessibility_bool), text: source.accessibility_bool ? source.accessibility || "נגיש" : null },
        messages: [],
      }];
    }

    function parseSapDate(value) {
      if (!value) return null;
      const parts = String(value).split(".");
      if (parts.length !== 3) return null;
      const [day, month, year] = parts;
      return `${year}-${month.padStart(2, "0")}-${day.padStart(2, "0")}`;
    }

    function formatDisplayDate(isoDate) {
      if (!isoDate) return null;
      const [year, month, day] = isoDate.split("-");
      return `${day}/${month}/${year}`;
    }

    function mapReplacementEntity(substitute) {
      if (!substitute) {
        return {
          isVisible: false,
          entityType: null,
          name: null,
          profileUrl: null,
          remark: null,
        };
      }

      return {
        isVisible: true,
        entityType: substitute.sub_otype === "S" ? "doctor" : "other",
        name: substitute.sub_name || null,
        profileUrl: null,
        remark: substitute.sub_remark || null,
      };
    }

    function getGenderText(gender) {
      const avatarType = mapAvatarType(gender);
      if (avatarType === "female") {
        return {
          doctor: "הרופאה",
          absentSingle: "לא נמצאת בתאריך:",
          absentRange: "לא נמצאת בין התאריכים:",
          replacement: "ממלאת מקום",
        };
      }

      return {
        doctor: "הרופא",
        absentSingle: "לא נמצא בתאריך:",
        absentRange: "לא נמצא בין התאריכים:",
        replacement: "ממלא מקום",
      };
    }

    function buildAbsenceDisplayText(item, gender) {
      const genderText = getGenderText(gender);
      const baseText = item.dateType === "single"
        ? `${genderText.doctor} ${genderText.absentSingle} ${formatDisplayDate(item.startDate)}`
        : `${genderText.doctor} ${genderText.absentRange} ${formatDisplayDate(item.startDate)} עד ${formatDisplayDate(item.endDate)}`;

      if (item.replacementEntity && item.replacementEntity.isVisible && item.replacementEntity.name) {
        return `${baseText}, ${genderText.replacement}: ${item.replacementEntity.name}${item.replacementEntity.remark ? ` ${item.replacementEntity.remark}` : ""}`;
      }

      return baseText;
    }

    function buildAbsences(source) {
      const absences = normalizeArray(source.absence);
      const substitutes = normalizeArray(source.subtitute || source.substitute);

      const items = absences
        .map((absence, index) => {
          const startDate = parseSapDate(absence.absence_bdate);
          const endDate = parseSapDate(absence.absence_edate);
          if (!startDate || !endDate) return null;

          const substitute = substitutes.find((sub) => {
            return parseSapDate(sub.sub_bdate) === startDate && parseSapDate(sub.sub_edate) === endDate;
          });

          const dateType = startDate === endDate ? "single" : "range";
          const displayDate = dateType === "single"
            ? formatDisplayDate(startDate)
            : `${formatDisplayDate(startDate)} - ${formatDisplayDate(endDate)}`;

          return {
            startDate,
            endDate,
            displayDate,
            dateType,
            displayText: null,
            isDisplayed: false,
            isToday: false,
            reason: absence.absence_reason_dis === true ? absence.absence_reason || null : null,
            replacementEntity: {
              ...mapReplacementEntity(substitute),
              id: substitute && (substitute.sub_entity_id || substitute.entity_id || substitute.sub_object_id || null),
            },
            sortOrder: index + 1,
          };
        })
        .filter(Boolean)
        .sort((a, b) => a.startDate.localeCompare(b.startDate));

      if (items.length) {
        items[0].isDisplayed = true;
      }

      const enrichedItems = items.map((item, index) => ({
        ...item,
        displayText: buildAbsenceDisplayText(item, source.service_provider_gender),
        sortOrder: index + 1,
      }));

      return {
        isVisible: enrichedItems.some((item) => item.isDisplayed),
        items: enrichedItems,
      };
    }

    function transformSourceToPayload(source) {
      const remarks = buildRemarks(source);
      const visibleRemarks = remarks.filter((r) => r.isVisible);
      const contacts = buildContacts(source);
      const services = buildServices(source);
      const details = buildDetails(source);
      const scheduleGroups = buildScheduleGroups(source);
      const absences = buildAbsences(source);

      return {
        entity: {
          isVisible: true,
          entityType: mapEntityType(source.chapter_code),
          id: source.entity_id || source.service_provider_id || source.object_id,
          sourceType: source.chapter_code || null,
          sourceCode: source.object_id || null,
          name: source.service_provider_name || source.service_name || null,
          displayName: source.service_provider_name || source.service_name || null,
          subtitle: source.treat_area_string || null,
          profileUrl: source.url || null,
          image: { type: "avatar", gender: source.service_provider_gender || null, avatarType: mapAvatarType(source.service_provider_gender), url: null, alt: source.service_provider_name || source.service_name || "" },
          summaryAttributes: buildSummaryAttributes(source),
          badges: buildBadges(source),
          accessibility: { isVisible: Boolean(source.accessibility_bool), text: source.accessibility_bool ? source.accessibility || "נגיש" : null },
        },
        remarks: { isVisible: visibleRemarks.length > 0, items: remarks },
        availability: {
          isVisible: scheduleGroups.length > 0 || absences.isVisible,
          absences,
          scheduleGroups,
        },
        contacts: { isVisible: contacts.length > 0, items: contacts, messages: contacts.some((c) => c.type === "email") ? [{ type: "emailDisclaimer", text: "לורום איפסום...", sortOrder: 1 }] : [] },
        locations: { isVisible: true, items: buildLocations(source, remarks) },
        services: { isVisible: services.length > 0, groups: services },
        details: { isVisible: details.length > 0, sections: details },
        relatedEntities: { isVisible: false, groups: [] },
      };
    }

    const contentCatalog = {
      specializations: { title: "מומחיות", key: "provider.specializations.title" },
      professionalizations: { title: "התמקצעות", key: "provider.professionalizations.title" },
      languages: { title: "שפות", key: "provider.languages.title" },
      address: { title: "כתובת", key: "provider.address.title" },
      facil: { title: "מתקנים", key: "provider.facil.title" },
      absences: { title: "העדרויות וממלאי מקום", key: "provider.absences.title" },
      schedule: { title: "שעות פעילות", key: "provider.schedule.title" },
      services: { title: "ניתוחים וטיפולים", key: "provider.services.title" },
      appointments: { title: "זימון תורים", key: "provider.appointments.title" },
      contacts: { title: "אמצעי תקשורת", key: "provider.contacts.title" },
      resume: { title: "פרטים נוספים", key: "provider.resume.sectionTitle" },
      license: { title: "רישיון", key: "provider.resume.license.title", numberLabelKey: "provider.resume.license.numberLabel" },
      serviceCoverageBasket: { key: "provider.services.coverage.basket" },
      serviceCoverageSupplementary: { key: "provider.services.coverage.supplementary" },
      emailDisclaimer: { key: "provider.contacts.emailDisclaimer" },
      searchResult: { title: "תוצאות חיפוש", key: "provider.searchResult.title" },
      detailsScreen: { title: "איתור שירות", key: "provider.details.screenTitle" },
    };

    function contentKeys(...keys) {
      return keys.reduce((acc, key) => {
        const item = contentCatalog[key];
        if (item && item.key) acc.title = item.key;
        return acc;
      }, {});
    }

    function getSummaryAttributeValues(attrs, type) {
      const attr = attrs.find((item) => item.type === type);
      return attr
        ? attr.values
            .filter((item) => item && nonEmpty(item.value))
            .map((item, index) => ({
              value: item.value,
              sortOrder: Number(item.sortOrder || index + 1),
            }))
        : [];
    }

    function buildTextListComponent(id, titleKey, values) {
      return {
        id,
        title: contentCatalog[titleKey].title,
        isVisible: values.length > 0,
        contentKeys: { title: contentCatalog[titleKey].key },
        values,
      };
    }

    function buildAddressComponent(source) {
      const displayAddress = source.full_address || [source.city_name, source.street_name, source.house_number].filter(Boolean).join(" ");
      return {
        id: "address",
        title: contentCatalog.address.title,
        isVisible: nonEmpty(displayAddress),
        contentKeys: { title: contentCatalog.address.key },
        city: source.city_name || null,
        street: source.street_name || null,
        streetCode: source.street_code || null,
        houseNumber: source.house_number || null,
        fullAddress: source.full_address || null,
        displayAddress: displayAddress || null,
        navigationUrl: null,
        accessibility: { isVisible: Boolean(source.accessibility_bool), text: source.accessibility_bool ? source.accessibility || "נגיש" : null },
        messages: [],
      };
    }

    function buildIconsComponent(source, badges, address) {
      const items = [];
      if (source.accessibility_bool) {
        items.push({
          id: "accessibility",
          type: "accessibility",
          text: source.accessibility || "נגיש",
          icon: "accessibility",
          targetArea: "entityHeader",
          severity: "positive",
          source: "accessibility_bool",
          sortOrder: 1,
        });
      }

      badges.forEach((badge, index) => {
        const iconByType = {
          limitedMembership: "info",
          shabanConsultation: "paidService",
          shabanTreatments: "paidService",
        };
        items.push({
          id: badge.type,
          type: badge.type,
          text: badge.text,
          icon: iconByType[badge.type] || "info",
          targetArea: "entityHeader",
          severity: badge.type === "limitedMembership" ? "warning" : "info",
          source: badge.type === "limitedMembership" ? "limited_memb_icon" : "shaban_type",
          sortOrder: index + 2,
        });
      });

      return {
        id: "icons",
        isVisible: items.length > 0,
        items: items.sort((a, b) => a.sortOrder - b.sortOrder),
      };
    }

    function buildAppointmentsComponent(badges) {
      const limited = badges.find((badge) => badge.type === "limitedMembership");
      const messages = limited ? [{
        type: "limitedMembership",
        text: limited.text,
        sourceComponent: "icons",
        sourceType: "limitedMembership",
        sortOrder: 1,
      }] : [];

      return {
        id: "appointments",
        title: contentCatalog.appointments.title,
        isVisible: messages.length > 0,
        contentKeys: { title: contentCatalog.appointments.key },
        messages,
      };
    }

    function buildDayRangeLabel(days) {
      if (!days.length) return "";
      if (days.length === 1) return days[0].dayLabel;
      return `${days[0].dayLabel}-${days[days.length - 1].dayLabel}`;
    }

    function scheduleDaySignature(day) {
      return JSON.stringify((day.rows || []).map((row) => ({
        startTime: row.startTime || null,
        endTime: row.endTime || null,
        hoursText: row.hoursText || null,
        notes: row.notes || null,
        isClosed: Boolean(row.isClosed),
      })));
    }

    function buildDisplayDays(days) {
      const visibleDays = (days || []).filter((day) => day.isVisible !== false && day.rows && day.rows.length);
      const groups = [];

      visibleDays.forEach((day) => {
        const signature = scheduleDaySignature(day);
        const last = groups[groups.length - 1];
        const isConsecutive = last && last.days[last.days.length - 1].dayCode + 1 === day.dayCode;
        if (last && last.signature === signature && isConsecutive) {
          last.days.push(day);
          return;
        }
        groups.push({ signature, days: [day] });
      });

      return groups.map((group, groupIndex) => {
        const baseRows = group.days[0].rows || [];
        return {
          dayCodes: group.days.map((day) => day.dayCode),
          dayLabel: buildDayRangeLabel(group.days),
          isRange: group.days.length > 1,
          rows: baseRows.map((row, rowIndex) => ({
            ...row,
            showDayLabel: rowIndex === 0,
            sortOrder: rowIndex + 1,
          })),
          sortOrder: groupIndex + 1,
        };
      });
    }

    function buildScheduleComponent(scheduleGroups) {
      return {
        id: "schedule",
        title: contentCatalog.schedule.title,
        isVisible: scheduleGroups.length > 0,
        contentKeys: { title: contentCatalog.schedule.key },
        groups: scheduleGroups.map((group) => ({
          ...group,
          displayDays: buildDisplayDays(group.days),
        })),
      };
    }

    function buildAbsencesComponent(absences) {
      return {
        id: "absences",
        title: contentCatalog.absences.title,
        isVisible: Boolean(absences && absences.isVisible),
        contentKeys: { title: contentCatalog.absences.key },
        items: absences && absences.items ? absences.items : [],
      };
    }

    function buildContactsComponent(contacts) {
      const messages = contacts.some((c) => c.type === "email")
        ? [{ type: "emailDisclaimer", text: "לורום איפסום...", contentKeys: { text: contentCatalog.emailDisclaimer.key }, sortOrder: 1 }]
        : [];
      return {
        id: "contacts",
        title: contentCatalog.contacts.title,
        isVisible: contacts.length > 0,
        contentKeys: { title: contentCatalog.contacts.key },
        items: contacts,
        messages,
      };
    }

    function resolveContactPreferredAction(contactType, value, endpointKey) {
      if ((endpointKey === "online" || endpointKey === "serviceGuide" || endpointKey === "mlh") && ["phone", "appointments", "mobile"].includes(contactType)) {
        return { type: "copy", value };
      }

      if (["phone", "appointments", "mobile"].includes(contactType)) {
        return { type: "tel", uri: `tel:${value}` };
      }

      if (contactType === "email") {
        return { type: "mailto", uri: `mailto:${value}` };
      }

      return null;
    }

    function applyEndpointContactActions(contactsComponent, endpointKey) {
      return {
        ...contactsComponent,
        items: (contactsComponent.items || []).map((contact) => ({
          ...contact,
          values: (contact.values || []).map((valueItem) => ({
            ...valueItem,
            preferredAction: resolveContactPreferredAction(contact.type, valueItem.value, endpointKey),
          })),
        })),
      };
    }

    function buildServicesComponent(services) {
      return {
        id: "services",
        title: contentCatalog.services.title,
        isVisible: services.length > 0,
        contentKeys: { title: contentCatalog.services.key },
        groups: services.map((group) => ({
          ...group,
          contentSource: group.groupCode === "00000" ? "hardcodedFallback" : "originalJson",
          items: group.items.map((item) => ({
            ...item,
            contentKeys: {
              coverageText: item.coverageType === "supplementary"
                ? contentCatalog.serviceCoverageSupplementary.key
                : contentCatalog.serviceCoverageBasket.key,
            },
          })),
        })),
      };
    }

    function buildResumeComponent(detailsSections) {
      return {
        id: "resume",
        title: contentCatalog.resume.title,
        isVisible: detailsSections.length > 0,
        contentKeys: { title: contentCatalog.resume.key },
        sections: detailsSections.map((section) => {
          if (section.type !== "license") return section;
          return {
            ...section,
            title: contentCatalog.license.title,
            contentKeys: { title: contentCatalog.license.key },
            items: section.items.map((item) => ({
              ...item,
              contentKeys: item.label === "מספר רישיון" ? { label: contentCatalog.license.numberLabelKey } : {},
            })),
          };
        }),
      };
    }

    function buildFacilComponent(source) {
      return {
        id: "facil",
        title: contentCatalog.facil.title,
        isVisible: false,
        contentKeys: { title: contentCatalog.facil.key },
        items: [],
      };
    }

    function transformSourceToUniversalPayload(source, context = {}) {
      const summaryAttributes = buildSummaryAttributes(source);
      const badges = buildBadges(source);
      const remarks = buildRemarks(source);
      const contacts = buildContacts(source);
      const scheduleGroups = buildScheduleGroups(source);
      const absences = buildAbsences(source);
      const services = buildServices(source);
      const resumeSections = buildDetails(source);
      const address = buildAddressComponent(source);

      const components = {
        specializations: buildTextListComponent("specializations", "specializations", getSummaryAttributeValues(summaryAttributes, "specialization")),
        professionalizations: buildTextListComponent("professionalizations", "professionalizations", getSummaryAttributeValues(summaryAttributes, "professionalization")),
        languages: buildTextListComponent("languages", "languages", getSummaryAttributeValues(summaryAttributes, "language")),
        address,
        remarks: {
          id: "remarks",
          isVisible: remarks.some((r) => r.isVisible),
          items: remarks,
        },
        icons: buildIconsComponent(source, badges, address),
        facil: buildFacilComponent(source),
        absences: buildAbsencesComponent(absences),
        schedule: buildScheduleComponent(scheduleGroups),
        services: buildServicesComponent(services),
        appointments: buildAppointmentsComponent(badges),
        contacts: applyEndpointContactActions(buildContactsComponent(contacts), context.endpointKey || "app"),
        resume: buildResumeComponent(resumeSections),
      };

      return {
        metadata: {
          requestId: context.requestId || "simulator-request",
          payloadVersion: "1.0",
          schemaName: "UniversalProviderDisplayPayload",
          schemaVersion: "1.0",
          supportedEntityTypes: ["doctor"],
          entityTypeVersions: { doctor: "1.0" },
          generatedAt: new Date().toISOString(),
          locale: { language: "he", country: "IL", direction: "rtl" },
          client: {
            clientType: context.clientType || "simulator",
            platform: context.platform || "web",
            channel: context.channel || "agentSimulator",
          },

    function buildUniversalResponse(sources, context = {}) {
      const transformedPayloads = sources.map((source) => transformSourceToUniversalPayload(source, context));
      const firstMetadata = transformedPayloads[0] && transformedPayloads[0].metadata;
      const metadata = firstMetadata || transformSourceToUniversalPayload({}, context).metadata;

      return {
        metadata,
        results: transformedPayloads.map(({ metadata: _metadata, ...result }) => result),
      };
    }

    function isAgentResultShape(input) {
      return Boolean(input && input.entity && input.presentation && input.components);
    }

    function isAgentResponseShape(input) {
      if (!input || typeof input !== "object") return false;
      if (input.metadata && Array.isArray(input.results)) return true;
      if (input.metadata && isAgentResultShape(input)) return true;
      if (Array.isArray(input)) return input.some(isAgentResultShape);
      return false;
    }

    function isSearchEngineResponseShape(input) {
      const hits = input && input.data && input.data.service_guide && input.data.service_guide.hits;
      return Array.isArray(hits);
    }

    function extractHits(input) {
      if (!input) throw new Error("פלט מנוע חיפוש ריק");
      if (isAgentResponseShape(input)) {
        throw new Error("מקור הנתונים הוא פלט מנוע חיפוש, אבל הוזן פלט agent. יש לעבור למקור פלט agent.");
      }
      const hits = input && input.data && input.data.service_guide && input.data.service_guide.hits;
      if (Array.isArray(hits)) return hits.map((h) => h.source || h);
      throw new Error("מבנה פלט מנוע חיפוש לא נתמך. נדרש data.service_guide.hits.");
    }

      const pass = JSON.stringify(actual) === JSON.stringify(expected);
      return { name, pass, actual, expected };
    }

      try {
        action();
        return { name, pass: false, actual: "no error", expected: expectedText };
      } catch (error) {
        const actual = error && error.message ? error.message : String(error);
        return { name, pass: actual.includes(expectedText), actual, expected: expectedText };
      }
    }

    function renderServices(payload) {
      if (!payload.services.groups.length) return "";
      const renderServiceRows = (items) => items.map((item) => `
        <div class="treat-row">

          <div class="coverage-badge ${escapeHtml(item.coverageType || "unknown")}">${escapeHtml(item.coverageText || "")}</div>

      `).join("");

      return payload.services.groups.map((g) => {
        const display = g.display || { defaultOpen: true, previewRows: g.items.length, hasOverflow: false };
        const fullContent = renderServiceRows(g.items);
        const previewItems = display.hasOverflow ? g.items.slice(0, display.previewRows) : g.items;
        const previewContent = display.hasOverflow ? renderServiceRows(previewItems) : null;
        return renderAccordion(g.title || "", fullContent, display, previewContent);

    function renderAppointments(payload) {
      const limited = payload.entity.badges.find((badge) => badge.type === "limitedMembership");

    function renderDetails(payload) {
      if (!payload.details.sections.length) return "";

        <div class="kv">
          <b>${escapeHtml(section.title)}</b>
          ${section.items.map((item) => `
            <div>
              ${item.label ? `<span class="muted">${escapeHtml(item.label)}:</span> ` : ""}

    function renderSearchResult(payload, index) {
      const e = payload.entity;

      const professionalization = getAttributeValues(payload, "professionalization");
      const languages = getAttributeValues(payload, "language");

        ? payload.availability.absences.items.find((item) => item.isDisplayed)
        : null;
      const location = payload.locations.items.find((loc) => nonEmpty(loc.city));
      const cityValues = getAttributeValues(payload, "city");
      const city = (location && location.city) || cityValues[0] || "";
      const emergencyRemarks = payload.remarks.items.filter((remark) =>
        remark.isVisible &&
        remark.type === "emergency" &&
        remark.targetArea === "pageTop" &&
        nonEmpty(remark.text)
      );
      const badges = payload.entity.badges || [];
      const accessibility = payload.entity.accessibility;

      return `
        <article class="search-result-card" onclick="openEntityDetails(${index})" tabindex="0" role="button" onkeydown="if(event.key === 'Enter' || event.key === ' '){ event.preventDefault(); openEntityDetails(${index}); }">

            <div>
              <div class="search-result-name">${escapeHtml(e.displayName || "")}</div>
              <div class="search-result-meta">

                <div class="search-result-warning">

            ${badges.map((badge) => `<span class="search-result-chip">${escapeHtml(badge.text || "")}</span>`).join("")}
            ${city ? `<span class="search-result-location">⌖ ${escapeHtml(city)}</span>` : ""}

      return `

    function getResultDisplayName(payload, index) {
      const name = payload && payload.entity && (payload.entity.displayName || payload.entity.name);

    function renderDetailSelector() {
      if (state.payloads.length <= 1) return "";

      if (state.payloads.length > 4) {
        return `
          <div class="detail-selector">

    function renderScheduleOnly(payload) {

    function renderContacts(payload) {

      return `

                if (v.preferredAction && v.preferredAction.type === "tel") {

          <div class="search-result-hero">
            <div>
              <div class="search-result-name">${escapeHtml(e.displayName || "")}</div>
              <div class="search-result-meta">
                ${specializations.length ? `${escapeHtml(specializations.join(", "))}<br>` : ""}
                ${renderMetaLine((getComponent(payload, "professionalizations") || {}).title || "התמקצעות", professionalizations)}

      if (components.schedule && components.schedule.isVisible) mainParts.push(renderSection(components.schedule.title, renderScheduleOnly(payload)));
      if (components.address && components.address.isVisible) mainParts.push(renderSection(components.address.title, renderLocations(payload)));

    function renderSwitcher() {
      switcher.innerHTML = "";
    }

    window.selectEntity = function(index) {
      state.selectedIndex = index;
      renderAll();
    };

      state.selectedIndex = index;
      setActiveTab("screen");
      renderAll();
    };

    window.scrollToTop = function() {
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    async function copyTextToClipboard(text, successMessage) {
      try {
        await navigator.clipboard.writeText(text);
        window.alert(successMessage);
      } catch (error) {
        window.alert("לא ניתן להעתיק את ה-response");
      }
    }

    function getSelectedPayloadJson() {
      return JSON.stringify(state.payloads[state.selectedIndex] || {}, null, 2);
    }

    function getAllPayloadsJson() {
      return JSON.stringify(state.response || { metadata: null, results: [] }, null, 2);
    }

    function getSearchEngineOutputJson() {
      return state.searchEngineText || "";
    }

    function tryParseJson(text) {
      if (!text || !text.trim()) return null;
      try {
        return JSON.parse(text);
      } catch (error) {
        return null;
      }
    }

    function getJsonParseError(text, responseName) {
      if (!text || !text.trim()) return "";
      try {
        JSON.parse(text);
        return "";
      } catch (error) {
        return `שגיאת ${responseName}: ${error.message}`;
      }
    }

    function getAgentPayloadInputJson() {
      return tryParseJson(state.agentPayloadText);
    }

    function stripResultMetadata(payload) {
      if (!payload || typeof payload !== "object") return payload;
      const { metadata: _metadata, ...result } = payload;
      return result;
    }

    function isRenderableAgentResult(result) {
      return Boolean(result && result.entity && result.presentation && result.components);
    }

    function normalizeAgentPayload(input) {
      if (isSearchEngineResponseShape(input)) {
        throw new Error("נראה שהוזנו נתוני מקור ממנוע חיפוש. כדי לעבד אותם, עברו למסך נתוני מקור.");
      }

      if (input && input.metadata && Array.isArray(input.results)) {
        const results = input.results.map(stripResultMetadata);
        if (!results.every(isRenderableAgentResult)) throw new Error("results אינו מכיל רכיבי פלט agent תקינים");
        return { metadata: input.metadata, results };
      }

      if (input && input.metadata && input.entity && input.presentation && input.components) {
        return { metadata: input.metadata, results: [stripResultMetadata(input)] };
      }

      if (Array.isArray(input)) {
        const metadata = (input.find((item) => item && item.metadata) || {}).metadata || null;
        const results = input.map(stripResultMetadata);
        if (!results.every(isRenderableAgentResult)) throw new Error("המערך אינו מכיל פלט agent תקין");
        return { metadata, results };
      }

      throw new Error("הפלט המעובד לא בפורמט נתמך");
    }

    function applyAgentPayloadText(text) {
      const parsed = JSON.parse(text);
      const normalized = normalizeAgentPayload(parsed);
      state.agentPayloadText = text;
      state.agentPayloadError = "";
      state.agentPayloadStatus = `נטען פלט agent עם ${normalized.results.length} תוצאות`;
      state.response = normalized;
      state.payloads = normalized.results;
      state.selectedIndex = 0;
      setActiveTab("results");
      renderAll();
    }

    function getJsonType(value) {
      if (value === null) return "null";
      if (Array.isArray(value)) return "array";
      return typeof value;
    }

    function renderPrimitiveJson(value) {
      if (value === null) return `<span class="json-null">null</span>`;
      if (typeof value === "string") return `<span class="json-string">"${escapeHtml(value)}"</span>`;
      if (typeof value === "number") return `<span class="json-number">${escapeHtml(value)}</span>`;
      if (typeof value === "boolean") return `<span class="json-boolean">${value}</span>`;
      return `<span>${escapeHtml(String(value))}</span>`;
    }

    function renderJsonTree(value, label = "root", depth = 0) {
      const type = getJsonType(value);
      const labelHtml = `<span class="json-key">${escapeHtml(label)}</span>`;

      if (type !== "object" && type !== "array") {
        return `<div>${labelHtml}: ${renderPrimitiveJson(value)}</div>`;
      }

      const entries = type === "array"
        ? value.map((item, index) => [String(index), item])
        : Object.entries(value || {});
      const summary = `${label} ${type === "array" ? `[${entries.length}]` : `{${entries.length}}`}`;
      const children = entries.length
        ? entries.map(([key, item]) => renderJsonTree(item, key, depth + 1)).join("")
        : `<div class="json-empty">ריק</div>`;

      return `
        <details ${depth < 2 ? "open" : ""}>
          <summary>${escapeHtml(summary)}</summary>
          ${children}
        </details>
      `;
    }

    function renderEditableJsonTree(value, target, label = "root", path = [], depth = 0) {
      const type = getJsonType(value);
      const labelHtml = `<span class="json-tree-key">${escapeHtml(JSON.stringify(label))}</span>`;

      if (type !== "object" && type !== "array") {
        const pathToken = escapeHtml(escapeJsString(JSON.stringify(path)));
        const displayValue = type === "string" ? JSON.stringify(value) : (type === "null" ? "null" : String(value));
        return `
          <div class="json-tree-row">
            ${labelHtml}
            <span class="json-tree-colon">:</span>
            <span
              class="json-tree-editable ${escapeHtml(type)}"
              contenteditable="true"
              spellcheck="false"
              onkeydown="handleJsonTreeEditKey(event)"
              onblur="updateJsonTreeValue('${target}', '${pathToken}', this.textContent, '${type}')"
            >${escapeHtml(displayValue)}</span>
          </div>
        `;
      }

      const entries = type === "array"
        ? value.map((item, index) => [String(index), item])
        : Object.entries(value || {});
      const openToken = type === "array" ? "[" : "{";
      const closeToken = type === "array" ? "]" : "}";
      const summaryLabel = depth === 0
        ? `${label} ${openToken}${entries.length}${closeToken}`
        : `${JSON.stringify(label)}: ${openToken}${entries.length}${closeToken}`;
      const children = entries.length
        ? entries.map(([key, item]) => renderEditableJsonTree(item, target, key, path.concat(type === "array" ? Number(key) : key), depth + 1)).join("")
        : `<div class="json-empty">ריק</div>`;

      return `
        <details ${depth < 2 ? "open" : ""}>
          <summary>${escapeHtml(summaryLabel)}</summary>
          ${children}
        </details>
      `;
    }

    function renderJsonContent(target, data, rawText) {
      const mode = state.jsonViewMode[target] || "tree";
      if (mode === "text") {
        return renderJsonCode(data, rawText);
      }
      if (data === null || data === undefined) {
        return `<div class="json-empty">אין JSON תקין להצגה</div>`;
      }
      return `<div class="json-tree">${renderJsonTree(data)}</div>`;
    }

    function renderEditableJsonContent(target, data, rawText, inputId, updateHandlerName) {
      if (data !== null && data !== undefined) {
        return `<div class="json-tree">${renderEditableJsonTree(data, target)}</div>`;
      }
      return `<textarea id="${inputId}" class="json-edit-textarea" spellcheck="false" oninput="${updateHandlerName}(this.value)" onpaste="setTimeout(() => ${updateHandlerName}(this.value, true), 0)">${escapeHtml(rawText || "")}</textarea>`;
    }

    function highlightJsonLine(line) {
      return line.replace(/("(?:\\.|[^"\\])*")(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d+)?(?:[eE][+\-]?\d+)?/g, (match, stringToken, colon, literal) => {
        if (stringToken) {
          const className = colon ? "json-key" : "json-string";
          return `<span class="${className}">${escapeHtml(stringToken)}</span>${colon ? escapeHtml(colon) : ""}`;
        }
        if (literal === "true" || literal === "false") return `<span class="json-boolean">${literal}</span>`;
        if (literal === "null") return `<span class="json-null">null</span>`;
        return `<span class="json-number">${escapeHtml(match)}</span>`;
      });
    }

    function renderJsonCode(data, rawText) {
      const text = data !== null && data !== undefined ? JSON.stringify(data, null, 2) : (rawText || "");
      if (!text) return `<div class="json-empty">אין JSON להצגה</div>`;
      const lines = text.split(/\r?\n/);
      return `
        <div class="json-code" role="code">
          ${lines.map((line, index) => `
            <div class="json-line">
              <span class="json-line-number">${index + 1}</span>
              <span class="json-line-code">${highlightJsonLine(line)}</span>
            </div>
          `).join("")}
        </div>
      `;
    }

    function coerceEditableJsonValue(value, type) {
      const trimmed = String(value ?? "").trim();
      if (type === "number") {
        const numberValue = Number(trimmed);
        return Number.isFinite(numberValue) && trimmed !== "" ? numberValue : value;
      }
      if (type === "boolean") {
        if (trimmed === "true") return true;
        if (trimmed === "false") return false;
        return value;
      }
      if (type === "null") return trimmed === "null" ? null : value;
      if (type === "string") {
        try {
          const parsed = JSON.parse(trimmed);
          return typeof parsed === "string" ? parsed : String(parsed);
        } catch (error) {
          return value;
        }
      }
      return trimmed;
    }

    function setValueAtPath(root, path, value) {
      if (!path.length) return value;
      let cursor = root;
      for (let i = 0; i < path.length - 1; i += 1) {
        cursor = cursor[path[i]];
      }
      cursor[path[path.length - 1]] = value;
      return root;
    }

    window.updateJsonTreeValue = function(target, pathText, value, type) {
      const path = JSON.parse(pathText);
      const nextValue = coerceEditableJsonValue(value, type);
      if (target === "sourceFull") {
        state.searchEngineOutput = setValueAtPath(state.searchEngineOutput, path, nextValue);
        state.searchEngineText = JSON.stringify(state.searchEngineOutput, null, 2);
        state.sourceError = "";
        state.sourceStatus = "";
        state.searchSimulationRan = false;
        return;
      }
      if (target === "agentFull") {
        const parsed = tryParseJson(state.agentPayloadText);
        if (!parsed) return;
        const updated = setValueAtPath(parsed, path, nextValue);
        state.agentPayloadText = JSON.stringify(updated, null, 2);
        state.agentPayloadError = "";
        state.agentPayloadStatus = "";
      }
    };

    function renderSourceFields(fields) {
      return fields.map((field) => `<div>${escapeHtml(field)}</div>`).join("");
    }

    function renderGeneratedFieldsGuide() {
      const groups = generatedFieldsGuideGroups.map((group, groupIndex) => {
        const rows = group.rows.map((row) => `
          <tr>
            <td class="field-guide-field">${escapeHtml(row.field)}</td>
            <td class="field-guide-source-fields">${renderSourceFields(row.sourceFields)}</td>
            <td>${escapeHtml(row.displayTitle)}</td>
            <td>${escapeHtml(row.creation)}</td>
            <td>${escapeHtml(row.displayRules)}</td>
            <td>${escapeHtml(row.futureSource)}</td>
            <td>${escapeHtml(row.logic)}</td>
            <td>${escapeHtml(row.text)}</td>
          </tr>
        `).join("");

        return `
          <details class="field-guide-group" ${groupIndex === 0 ? "open" : ""}>
            <summary>
              <span>${escapeHtml(group.title)}</span>
              <span class="field-guide-count">${group.rows.length} שדות</span>
            </summary>
            <div class="field-guide-table-wrap">
              <table class="field-guide-table">
                <thead>
                  <tr>
                    <th>שדה / רכיב בפלט</th>
                    <th>שדות מקור</th>
                    <th>כותרת / content key</th>
                    <th>איך נוצר</th>
                    <th>חוקיות תצוגה</th>
                    <th>מקור עתידי באומברקו</th>
                    <th>מקור הלוגיקה</th>
                    <th>מקור הטקסט</th>
                  </tr>
                </thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </details>
        `;
      }).join("");

      return `
        <details class="field-guide">
          <summary>רשימת השדות שנוצרו ואיך נוצרו</summary>
          <div class="field-guide-body">
            <p class="field-guide-note">
              הרשימה מתארת את שכבת המיפוי של הפלט המעובד. היא מיועדת להבנה עסקית בלבד ולא משנה את יצירת הפלט.
            </p>
            <div class="field-guide-groups">${groups}</div>
          </div>
        </details>
      `;
    }

      return `

          ${renderGeneratedFieldsGuide()}
          ${renderJsonPanel("פלט מעובד שנוצר", "agentFull", state.response, allPayloadsJson, "copyAllPayloads", true)}
        </div>
      `;
    }

    function getSourceModeLabel() {
      if (state.sourceMode === "search") return "נתוני מקור ממנוע חיפוש";
      if (state.sourceMode === "agent") return "פלט מעובד קיים";
