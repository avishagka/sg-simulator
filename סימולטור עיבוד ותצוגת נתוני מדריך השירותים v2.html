    function renderProcessingSummary() {
      if (!state.payloads.length) return "";
      const endpointLabel = (endpointClientMap[endpointType.value] || endpointClientMap.app).label;
      const editButton = state.sourceMode === "search"
        ? `<button type="button" class="button small" onclick="setActiveTab('source'); renderAll();">עריכת נתוני מקור</button>`
        : `<button type="button" class="button small" onclick="setActiveTab('payload'); renderAll();">עריכת פלט מעובד</button>`;
      const endpointInfo = state.sourceMode === "search"
        ? `<span class="summary-item">endpoint: ${escapeHtml(endpointLabel)}</span>`
        : "";
      return `
        <section class="processing-summary" aria-label="סיכום עיבוד">
          <div class="summary-items">
            <span class="summary-item">מקור: ${escapeHtml(getSourceModeLabel())}</span>
            ${endpointInfo}
            <span class="summary-item">${state.payloads.length} תוצאות נוצרו</span>
          </div>
          <div class="summary-actions">
            ${editButton}
            <button type="button" class="button small" onclick="setActiveTab('payload'); renderAll();">צפייה בפלט המעובד</button>
            <button type="button" class="button small" onclick="startOver()">התחלה מחדש</button>
          </div>
        </section>
      `;
    }

    function renderAll() {
      const payload = state.payloads[state.selectedIndex];
      renderSwitcher();
      viewNav.style.display = state.payloads.length ? "" : "none";
      const startState = renderStartState();
      const summary = renderProcessingSummary();
      screenView.innerHTML = payload ? `${summary}${renderScreen(payload)}` : startState;
      resultsView.innerHTML = state.payloads.length ? `${summary}${renderSearchResults(state.payloads)}` : startState;
      sourceView.innerHTML = renderSourceInputPanel();
      payloadView.innerHTML = state.sourceMode === "agent" ? renderAgentInputPanel() : renderGeneratedAgentOutput();
      jsonSidePanel.innerHTML = "";
      screenView.style.display = state.activeTab === "screen" ? "block" : "none";
      resultsView.style.display = state.activeTab === "results" ? "block" : "none";
      sourceView.style.display = state.activeTab === "source" && state.sourceMode === "search" ? "block" : "none";
      payloadView.style.display = state.activeTab === "payload" ? "block" : "none";
      renderTests();
    }

    function parseAndRender() {
      if (state.sourceMode !== "search") {
        renderAll();
        return;
      }

      if (!state.searchEngineText.trim()) {
        state.searchEngineText = "";
        state.searchEngineOutput = null;
        state.response = { metadata: null, results: [] };
        state.payloads = [];
        state.selectedIndex = 0;
        state.searchSimulationRan = false;
        state.sourceError = "שגיאת פלט מנוע חיפוש: נדרש להזין JSON";
        state.sourceStatus = "";
        renderAll();
        return;
      }

      try {
        const parsed = JSON.parse(state.searchEngineText);
        state.searchEngineOutput = parsed;
        const endpointConfig = endpointClientMap[endpointType.value] || endpointClientMap.app;
        const transformContext = {
          requestId: "simulator-request",
          endpointKey: endpointType.value,
          clientType: endpointConfig.clientType,
          platform: endpointConfig.platform,
          channel: endpointConfig.channel,
        };
        const sources = extractHits(parsed);
        state.response = buildUniversalResponse(sources, transformContext);
        state.payloads = state.response.results;
        state.selectedIndex = 0;
        state.searchSimulationRan = true;
        state.sourceError = "";
        state.sourceStatus = `נמצאו ${state.payloads.length} אובייקטים`;
        setActiveTab("results");
      } catch (error) {
        state.searchEngineOutput = null;
        state.response = { metadata: null, results: [] };
        state.payloads = [];
        state.searchSimulationRan = false;
        state.sourceError = `שגיאת פלט מנוע חיפוש: ${error.message}`;
        state.sourceStatus = "";
      }
      renderAll();
    }

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        if (tab.disabled) return;
        setActiveTab(tab.dataset.tab);
        renderAll();
      });
    });

    fileInput.addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      try {
        state.searchEngineText = await file.text();
        state.searchEngineOutput = tryParseJson(state.searchEngineText);
        state.sourceStatus = `קובץ נטען: ${file.name}`;
        state.sourceError = getJsonParseError(state.searchEngineText, "פלט מנוע חיפוש");
        state.searchSimulationRan = false;
        renderAll();
      } catch (error) {
        state.searchEngineText = "";
        state.searchEngineOutput = null;
        state.response = { metadata: null, results: [] };
        state.payloads = [];
        state.searchSimulationRan = false;
        state.sourceError = `לא ניתן לקרוא את קובץ ה-JSON: ${error.message}`;
        state.sourceStatus = "";
        renderAll();
      }
    });

    agentPayloadFileInput.addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        state.agentPayloadText = text;
        state.agentPayloadStatus = `קובץ נטען: ${file.name}`;
        state.agentPayloadError = getJsonParseError(text, "פלט מעובד");
        renderAll();
      } catch (error) {
        state.agentPayloadError = `לא ניתן לקרוא או לטעון את הפלט המעובד: ${error.message}`;
        state.agentPayloadStatus = "";
        renderAll();
      }
    });

    endpointType.addEventListener("change", () => {
      if (state.sourceMode === "search" && state.searchEngineText.trim()) {
        state.searchSimulationRan = false;
        parseAndRender();
      }
    });
    sourceModeSelect.addEventListener("change", () => {
      resetSimulatorForSourceMode(sourceModeSelect.value);
      if (sourceModeSelect.value === "search") setActiveTab("source");
    });

    endpointType.value = "app";
    sourceModeSelect.value = "";
    renderTests();
    renderAll();
  </script>
</body>
</html>
