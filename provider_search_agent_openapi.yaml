openapi: 3.0.3
info:
  title: Service Provider Search Agent API
  version: 1.0.0
  description: API contract for service provider search endpoints that return a unified UniversalProviderDisplayPayload. In version 1 the supported entity type is doctor only. Client type is derived from the endpoint; the request does not include clientContext, locale, or responseOptions.

servers:
  - url: https://api.example.com
    description: Placeholder server URL

tags:
  - name: Service Provider Search
    description: Search service providers and return display-ready Agent payloads.

paths:
  /app/member-app/provider-search:
    post:
      tags: [Service Provider Search]
      summary: Service provider search for app endpoint
      description: Endpoint for member application clients. Response metadata.client is derived as mobile/app/memberApp.
      operationId: searchProvidersForApp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MinimalSearchRequest'
            example:
              requestId: 7ef235a2-43c4-45c3-9df1-ae9a75df7d91
              query:
                text: רופא משפחה בירושלים
                entityTypes: [doctor]
                filters:
                  city: ירושלים
      responses:
        '200':
          description: Unified Agent payload for rendering search result and provider details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UniversalProviderDisplayPayload'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /web/online/provider-search:
    post:
      tags: [Service Provider Search]
      summary: Service provider search for online web endpoint
      description: Endpoint for online web clients. Response metadata.client is derived as web/web/online.
      operationId: searchProvidersForOnline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MinimalSearchRequest'
      responses:
        '200':
          description: Unified Agent payload for rendering search result and provider details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UniversalProviderDisplayPayload'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /internal/mlh/provider-search:
    post:
      tags: [Service Provider Search]
      summary: Service provider search for MLH endpoint
      description: Endpoint for MLH internal system. Response metadata.client is derived as internalSystem/web/mlh.
      operationId: searchProvidersForMlh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MinimalSearchRequest'
      responses:
        '200':
          description: Unified Agent payload for rendering search result and provider details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UniversalProviderDisplayPayload'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /web/service-guide/provider-search:
    post:
      tags: [Service Provider Search]
      summary: Service provider search for service guide endpoint
      description: Endpoint for service guide clients. Response metadata.client is derived as web/web/serviceGuide.
      operationId: searchProvidersForServiceGuide
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MinimalSearchRequest'
      responses:
        '200':
          description: Unified Agent payload for rendering search result and provider details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UniversalProviderDisplayPayload'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    MinimalSearchRequest:
      type: object
      additionalProperties: false
      required: [requestId, query]
      properties:
        requestId:
          type: string
          description: Request identifier supplied by the caller or generated upstream.
          example: 7ef235a2-43c4-45c3-9df1-ae9a75df7d91
        query:
          $ref: '#/components/schemas/SearchQuery'

    SearchQuery:
      type: object
      additionalProperties: false
      required: [text]
      properties:
        text:
          type: string
          description: User search text.
          example: רופא משפחה בירושלים
        entityTypes:
          type: array
          description: Optional requested entity types. Version 1 supports doctor only.
          items:
            type: string
            enum: [doctor]
          default: [doctor]
        filters:
          type: object
          description: Optional structured filters. Supported filter keys may evolve by orchestrator.
          additionalProperties: true
          example:
            city: ירושלים
            specialization: משפחה

    UniversalProviderDisplayPayload:
      type: object
      additionalProperties: false
      required: [metadata, results]
      properties:
        metadata:
          $ref: '#/components/schemas/PayloadMetadata'
        results:
          type: array
          items:
            $ref: '#/components/schemas/ProviderResult'

    ProviderResult:
      type: object
      additionalProperties: false
      required: [entity, presentation, components]
      properties:
        entity:
          $ref: '#/components/schemas/Entity'
        presentation:
          $ref: '#/components/schemas/Presentation'
        components:
          $ref: '#/components/schemas/DisplayComponents'

    PayloadMetadata:
      type: object
      additionalProperties: false
      required:
        - requestId
        - payloadVersion
        - schemaName
        - schemaVersion
        - supportedEntityTypes
        - entityTypeVersions
        - generatedAt
        - locale
        - client
        - content
        - businessRules
        - sourceData
      properties:
        requestId:
          type: string
        payloadVersion:
          type: string
          example: '1.0'
        schemaName:
          type: string
          enum: [UniversalProviderDisplayPayload]
        schemaVersion:
          type: string
          example: '1.0'
        supportedEntityTypes:
          type: array
          items:
            type: string
            enum: [doctor]
        entityTypeVersions:
          type: object
          additionalProperties:
            type: string
          example:
            doctor: '1.0'
        generatedAt:
          type: string
          format: date-time
        locale:
          $ref: '#/components/schemas/LocaleMetadata'
        client:
          $ref: '#/components/schemas/ClientMetadata'
        content:
          $ref: '#/components/schemas/ContentMetadata'
        businessRules:
          $ref: '#/components/schemas/BusinessRulesMetadata'
        sourceData:
          $ref: '#/components/schemas/SourceDataMetadata'

    LocaleMetadata:
      type: object
      additionalProperties: false
      required: [language, country, direction]
      properties:
        language:
          type: string
          enum: [he]
        country:
          type: string
          enum: [IL]
        direction:
          type: string
          enum: [rtl]

    ClientMetadata:
      type: object
      additionalProperties: false
      required: [clientType, platform, channel]
      properties:
        clientType:
          type: string
          enum: [mobile, web, internalSystem, simulator]
        platform:
          type: string
          enum: [app, web]
        channel:
          type: string
          enum: [memberApp, online, mlh, serviceGuide, agentSimulator]

    ContentMetadata:
      type: object
      additionalProperties: false
      required: [mode, provider, futureProvider, contentVersion]
      properties:
        mode:
          type: string
          enum: [hardcoded]
        provider:
          type: string
          enum: [agent]
        futureProvider:
          type: string
          enum: [umbraco]
        contentVersion:
          type: string
          example: hc-v1

    BusinessRulesMetadata:
      type: object
      additionalProperties: false
      required: [rulesetVersion, source, applied]
      properties:
        rulesetVersion:
          type: string
          example: provider-search-v1
        source:
          type: string
          example: agent-hardcoded
        applied:
          type: boolean

    SourceDataMetadata:
      type: object
      additionalProperties: false
      required: [sourceSystem, sourcePayloadType, transformationVersion]
      properties:
        sourceSystem:
          type: string
          example: serviceGuide
        sourcePayloadType:
          type: string
          example: originalJson
        transformationVersion:
          type: string
          example: universal-provider-payload-v1

    Entity:
      type: object
      additionalProperties: false
      required: [isVisible, entityType, id, name, displayName, image]
      properties:
        isVisible:
          type: boolean
        entityType:
          type: string
          enum: [doctor, therapist, other]
        id:
          type: string
          nullable: true
        sourceType:
          type: string
          nullable: true
        sourceCode:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
          description: service_name from the original JSON.
        displayName:
          type: string
          nullable: true
          description: service_provider_name, fallback service_name.
        subtitle:
          type: string
          nullable: true
        profileUrl:
          type: string
          nullable: true
        image:
          $ref: '#/components/schemas/EntityImage'

    EntityImage:
      type: object
      additionalProperties: false
      required: [type, avatarType]
      properties:
        type:
          type: string
          enum: [avatar]
        gender:
          type: string
          nullable: true
        avatarType:
          type: string
          enum: [female, male, default]
        url:
          type: string
          nullable: true
        alt:
          type: string

    Presentation:
      type: object
      additionalProperties: false
      required: [entityType, searchResult, details]
      properties:
        entityType:
          type: string
          enum: [doctor, therapist, other]
        searchResult:
          $ref: '#/components/schemas/SearchResultPresentation'
        details:
          $ref: '#/components/schemas/DetailsPresentation'

    SearchResultPresentation:
      type: object
      additionalProperties: false
      required: [title, contentKeys, componentIds]
      properties:
        title:
          type: string
        contentKeys:
          $ref: '#/components/schemas/ContentKeys'
        componentIds:
          type: array
          items:
            type: string
            enum:
              - entity
              - specializations
              - professionalizations
              - languages
              - address
              - remarks
              - icons
              - facil
              - absences
              - schedule
              - services
              - appointments
              - contacts
              - resume

    DetailsPresentation:
      type: object
      additionalProperties: false
      required: [title, contentKeys, layoutPolicy, availableComponentIds]
      properties:
        title:
          type: string
        contentKeys:
          $ref: '#/components/schemas/ContentKeys'
        layoutPolicy:
          type: string
          enum: [clientManaged]
          description: >
            The Agent does not return display order, screen position, or layout
            area assignment for the provider details screen. The client maps
            available information components to UI components and screen areas.
        availableComponentIds:
          type: array
          description: Available information components for the provider details screen. This list is not a display order or layout instruction.
          items:
            type: string
            enum:
              - entity
              - specializations
              - professionalizations
              - languages
              - address
              - remarks
              - icons
              - facil
              - absences
              - schedule
              - services
              - appointments
              - contacts
              - resume

    DisplayComponents:
      type: object
      additionalProperties: false
      required:
        - specializations
        - professionalizations
        - languages
        - address
        - remarks
        - icons
        - facil
        - absences
        - schedule
        - services
        - appointments
        - contacts
        - resume
      properties:
        specializations:
          $ref: '#/components/schemas/TextListComponent'
        professionalizations:
          $ref: '#/components/schemas/TextListComponent'
        languages:
          $ref: '#/components/schemas/TextListComponent'
        address:
          $ref: '#/components/schemas/AddressComponent'
        remarks:
          $ref: '#/components/schemas/RemarksComponent'
        icons:
          $ref: '#/components/schemas/IconsComponent'
        facil:
          $ref: '#/components/schemas/FacilComponent'
        absences:
          $ref: '#/components/schemas/AbsencesComponent'
        schedule:
          $ref: '#/components/schemas/ScheduleComponent'
        services:
          $ref: '#/components/schemas/ServicesComponent'
        appointments:
          $ref: '#/components/schemas/AppointmentsComponent'
        contacts:
          $ref: '#/components/schemas/ContactsComponent'
        resume:
          $ref: '#/components/schemas/ResumeComponent'

    ContentKeys:
      type: object
      additionalProperties:
        type: string
      example:
        title: provider.schedule.title

    TextListComponent:
      type: object
      additionalProperties: false
      required: [id, title, isVisible, contentKeys, values]
      properties:
        id:
          type: string
        title:
          type: string
        isVisible:
          type: boolean
        contentKeys:
          $ref: '#/components/schemas/ContentKeys'
        values:
          type: array
          items:
            $ref: '#/components/schemas/SortValue'

    SortValue:
      type: object
      additionalProperties: false
      required: [value, sortOrder]
      properties:
        value:
          type: string
        sortOrder:
          type: integer

    AddressComponent:
      type: object
      additionalProperties: false
      required: [id, title, isVisible, contentKeys, displayAddress, accessibility, messages]
      properties:
        id:
          type: string
          enum: [address]
        title:
          type: string
        isVisible:
          type: boolean
        contentKeys:
          $ref: '#/components/schemas/ContentKeys'
        city:
          type: string
          nullable: true
        street:
          type: string
          nullable: true
        streetCode:
          type: string
          nullable: true
        houseNumber:
          type: string
          nullable: true
        fullAddress:
          type: string
          nullable: true
        displayAddress:
          type: string
          nullable: true
        navigationUrl:
          type: string
          nullable: true
        accessibility:
          $ref: '#/components/schemas/AccessibilityInfo'
        messages:
          type: array
          items:
            type: object

    AccessibilityInfo:
      type: object
      additionalProperties: false
      required: [isVisible]
      properties:
        isVisible:
          type: boolean
        text:
          type: string
          nullable: true

    RemarksComponent:
      type: object
      additionalProperties: false
      required: [id, isVisible, items]
      properties:
        id:
          type: string
          enum: [remarks]
        isVisible:
          type: boolean
        items:
          type: array
          items:
            $ref: '#/components/schemas/RemarkItem'

    RemarkItem:
      type: object
      additionalProperties: false
      required: [isVisible, type, sourceTypeCode, targetArea, text, displayStyle, sortOrder]
      properties:
        isVisible:
          type: boolean
        type:
          type: string
        sourceTypeCode:
          type: string
        targetArea:
          type: string
        text:
          type: string
        displayStyle:
          type: string
          enum: [inline, highlight, regular]
        severity:
          type: string
          nullable: true
        sortOrder:
          type: integer

    IconsComponent:
      type: object
      additionalProperties: false
      required: [id, isVisible, items]
      properties:
        id:
          type: string
          enum: [icons]
        isVisible:
          type: boolean
        items:
          type: array
          items:
            $ref: '#/components/schemas/IconItem'

    IconItem:
      type: object
      additionalProperties: false
      required: [id, type, text, icon, targetArea, severity, source, sortOrder]
      properties:
        id:
          type: string
        type:
          type: string
        text:
          type: string
        icon:
          type: string
        targetArea:
          type: string
        severity:
          type: string
        source:
          type: string
        sortOrder:
          type: integer

    FacilComponent:
      type: object
      additionalProperties: false
      required: [id, title, isVisible, contentKeys, items]
      properties:
        id:
          type: string
          enum: [facil]
        title:
          type: string
        isVisible:
          type: boolean
        contentKeys:
          $ref: '#/components/schemas/ContentKeys'
        items:
          type: array
          items:
            type: object

    AbsencesComponent:
      type: object
      additionalProperties: false
      required: [id, title, isVisible, contentKeys, items]
      properties:
        id:
          type: string
          enum: [absences]
        title:
          type: string
        isVisible:
          type: boolean
        contentKeys:
          $ref: '#/components/schemas/ContentKeys'
        items:
          type: array
          items:
            $ref: '#/components/schemas/AbsenceItem'

    AbsenceItem:
      type: object
      additionalProperties: false
      required: [startDate, endDate, displayDate, dateType, displayText, isDisplayed, isToday, replacementEntity, sortOrder]
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        displayDate:
          type: string
        dateType:
          type: string
          enum: [single, range]
        displayText:
          type: string
          nullable: true
        isDisplayed:
          type: boolean
        isToday:
          type: boolean
        reason:
          type: string
          nullable: true
        replacementEntity:
          $ref: '#/components/schemas/ReplacementEntity'
        sortOrder:
          type: integer

    ReplacementEntity:
      type: object
      additionalProperties: false
      required: [isVisible]
      properties:
        isVisible:
          type: boolean
        entityType:
          type: string
          nullable: true
        id:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        profileUrl:
          type: string
          nullable: true
        remark:
          type: string
          nullable: true

    ScheduleComponent:
      type: object
      additionalProperties: false
      required: [id, title, isVisible, contentKeys, groups]
      properties:
        id:
          type: string
          enum: [schedule]
        title:
          type: string
        isVisible:
          type: boolean
        contentKeys:
          $ref: '#/components/schemas/ContentKeys'
        groups:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleGroup'

    ScheduleGroup:
      type: object
      additionalProperties: false
      required: [type, title, sortOrder, days, displayDays, display]
      properties:
        type:
          type: string
          enum: [reception, appointments, additional, phone, teamReception, other]
        title:
          type: string
        sortOrder:
          type: integer
        days:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleDay'
        displayDays:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleDisplayDay'
        display:
          $ref: '#/components/schemas/ComponentDisplay'

    ScheduleDay:
      type: object
      additionalProperties: false
      required: [dayCode, dayLabel, isVisible, rows]
      properties:
        dayCode:
          type: integer
          minimum: 1
          maximum: 7
        dayLabel:
          type: string
        isVisible:
          type: boolean
        rows:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleRow'

    ScheduleDisplayDay:
      type: object
      additionalProperties: false
      required: [dayCodes, dayLabel, isRange, rows, sortOrder]
      properties:
        dayCodes:
          type: array
          items:
            type: integer
        dayLabel:
          type: string
          description: Single day label or range label, for example א׳-ב׳.
        isRange:
          type: boolean
        rows:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleRow'
        sortOrder:
          type: integer

    ScheduleRow:
      type: object
      additionalProperties: false
      required: [startTime, endTime, hoursText, isClosed, sortOrder]
      properties:
        startTime:
          type: string
          nullable: true
        endTime:
          type: string
          nullable: true
        hoursText:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        isClosed:
          type: boolean
        showDayLabel:
          type: boolean
        availableMorning:
          type: boolean
        availableAfternoon:
          type: boolean
        availableEvening:
          type: boolean
        sortOrder:
          type: integer

    ServicesComponent:
      type: object
      additionalProperties: false
      required: [id, title, isVisible, contentKeys, groups]
      properties:
        id:
          type: string
          enum: [services]
        title:
          type: string
        isVisible:
          type: boolean
        contentKeys:
          $ref: '#/components/schemas/ContentKeys'
        groups:
          type: array
          items:
            $ref: '#/components/schemas/ServiceGroup'

    ServiceGroup:
      type: object
      additionalProperties: false
      required: [groupCode, title, sortOrder, contentSource, display, items]
      properties:
        groupCode:
          type: string
        title:
          type: string
        sortOrder:
          type: integer
        contentSource:
          type: string
          enum: [originalJson, hardcodedFallback]
        display:
          $ref: '#/components/schemas/ComponentDisplay'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ServiceItem'

    ServiceItem:
      type: object
      additionalProperties: false
      required: [name, coverageType, coverageText, sortOrder]
      properties:
        code:
          type: string
          nullable: true
        name:
          type: string
        coverageType:
          type: string
          enum: [basket, supplementary]
        coverageText:
          type: string
        locationName:
          type: string
          nullable: true
        selfParticipationText:
          type: string
          nullable: true
        selfParticipationUrl:
          type: string
          nullable: true
        sortOrder:
          type: integer
        contentKeys:
          $ref: '#/components/schemas/ContentKeys'

    AppointmentsComponent:
      type: object
      additionalProperties: false
      required: [id, title, isVisible, contentKeys, messages]
      properties:
        id:
          type: string
          enum: [appointments]
        title:
          type: string
        isVisible:
          type: boolean
        contentKeys:
          $ref: '#/components/schemas/ContentKeys'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ComponentMessage'

    ContactsComponent:
      type: object
      additionalProperties: false
      required: [id, title, isVisible, contentKeys, items, messages]
      properties:
        id:
          type: string
          enum: [contacts]
        title:
          type: string
        isVisible:
          type: boolean
        contentKeys:
          $ref: '#/components/schemas/ContentKeys'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ContactItem'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ComponentMessage'

    ContactItem:
      type: object
      additionalProperties: false
      required: [type, sourceCode, label, sortOrder, values]
      properties:
        type:
          type: string
          enum: [phone, appointments, fax, mobile, email, other]
        sourceCode:
          type: string
        label:
          type: string
        sortOrder:
          type: integer
        values:
          type: array
          items:
            $ref: '#/components/schemas/ContactValue'

    ContactValue:
      type: object
      additionalProperties: false
      required: [value, sortOrder]
      properties:
        value:
          type: string
        preferredAction:
          nullable: true
          oneOf:
            - $ref: '#/components/schemas/TelAction'
            - $ref: '#/components/schemas/CopyAction'
            - $ref: '#/components/schemas/MailtoAction'
        sortOrder:
          type: integer

    TelAction:
      type: object
      additionalProperties: false
      required: [type, uri]
      properties:
        type:
          type: string
          enum: [tel]
        uri:
          type: string
          example: tel:*3555

    CopyAction:
      type: object
      additionalProperties: false
      required: [type, value]
      properties:
        type:
          type: string
          enum: [copy]
        value:
          type: string

    MailtoAction:
      type: object
      additionalProperties: false
      required: [type, uri]
      properties:
        type:
          type: string
          enum: [mailto]
        uri:
          type: string
          example: mailto:doctor@example.com

    ComponentMessage:
      type: object
      additionalProperties: true
      required: [type, text, sortOrder]
      properties:
        type:
          type: string
        text:
          type: string
        sourceComponent:
          type: string
        sourceType:
          type: string
        contentKeys:
          $ref: '#/components/schemas/ContentKeys'
        sortOrder:
          type: integer

    ResumeComponent:
      type: object
      additionalProperties: false
      required: [id, title, isVisible, contentKeys, sections]
      properties:
        id:
          type: string
          enum: [resume]
        title:
          type: string
        isVisible:
          type: boolean
        contentKeys:
          $ref: '#/components/schemas/ContentKeys'
        sections:
          type: array
          items:
            $ref: '#/components/schemas/ResumeSection'

    ResumeSection:
      type: object
      additionalProperties: false
      required: [type, title, sortOrder, items]
      properties:
        type:
          type: string
          enum: [license, resume]
        title:
          type: string
        contentKeys:
          $ref: '#/components/schemas/ContentKeys'
        sortOrder:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/ResumeItem'

    ResumeItem:
      type: object
      additionalProperties: false
      required: [label, value, sortOrder]
      properties:
        label:
          type: string
        value:
          type: string
        sortOrder:
          type: integer
        contentKeys:
          $ref: '#/components/schemas/ContentKeys'

    ComponentDisplay:
      type: object
      additionalProperties: false
      required: [defaultOpen, previewRows, hasOverflow]
      properties:
        defaultOpen:
          type: boolean
        previewRows:
          type: integer
          nullable: true
        hasOverflow:
          type: boolean

    ErrorResponse:
      type: object
      additionalProperties: false
      required: [requestId, error]
      properties:
        requestId:
          type: string
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
