              return detail(result.resultId, `title נקבע לפי fallback serviceProviderName -> serviceName. נבחר ${chosenField(hit || {}, [{ key: "serviceProviderName", label: "serviceProviderName" }, { key: "serviceName", label: "serviceName" }])}. avatarType נקבע לפי serviceProviderGender="${hit?.serviceProviderGender ?? "null"}" -> ${result.collapsedCard.avatarType}. navigation={type:"providerDetails", targetId:"${result.navigation.targetId}"} מפנה אל providerDetailsById["${result.navigation.targetId}"]`);
            }),
          },
          {
            title: "בניית כרטיס תוצאה",
            value: `${collapsedChips} chips, ${collapsedMessages} messages`,
            details: results.map((result) => {
              const hit = byId.get(result.resultId);
              const lines = asArray(result.collapsedCard.subtitleLines).map((line) => `${line.type}="${line.text}"`).join(", ") || "לא נמצאו נתונים";
              const messages = asArray(result.collapsedCard.messages).map((message) => `${message.type}="${message.text}"`).join(", ") || "לא נמצאו נתונים";
              return detail(result.resultId, `subtitleLines: ${subtitleDecision(hit || {})}. בפועל: ${lines}. chips: ${chipDecision(hit || {})}. messages: remark10 והיעדרות נכנסים ל-collapsed messages אם יש טקסט; בפועל: ${messages}. locationText נלקח מ-cityName="${result.collapsedCard.locationText || "null"}"`);
            }),
          },
          {
            title: "בניית providerDetailsById",
            value: Object.entries(sectionCounts).map(([key, count]) => `${key}: ${count}`).join(", ") || "לא נבנו אזורי תוכן להצגה",
            details: results.map((result) => {
              const hit = byId.get(result.resultId);
              return detail(result.resultId, providerDetailsDecision(hit, result));
            }),
          },
          {
            title: "בניית אמצעי קשר",
            value: `${displayContacts} פריטי קשר לתצוגה מתוך ${sourceContacts} רשומות Agent`,
            details: results.map((result) => {
              const hit = byId.get(result.resultId);
              return detail(result.resultId, contactDecision(hit || {}, result));
            }),
          },
          {
            title: "בניית שעות פעילות",
            value: `${displayScheduleRows} שורות תצוגה מתוך ${sourceSchedules} שורות Agent`,
            details: results.map((result) => {
              const hit = byId.get(result.resultId);
              return detail(result.resultId, scheduleDecision(hit || {}, result));
            }),
          },
          {
            title: "בניית ניתוחים וטיפולים",
            value: `${displayServiceItems} פריטי טיפול לתצוגה מתוך ${sourceTreats} רשומות Agent`,
            details: results.map((result) => {
              const hit = byId.get(result.resultId);
              return detail(result.resultId, serviceDecision(hit || {}, result));
            }),
          },
          {
            title: "בניית היעדרויות וממלאי מקום",
            value: `${displayAbsences} פריטי היעדרות לתצוגה מתוך ${sourceAbsences} היעדרויות Agent`,
            details: results.map((result) => {
              const hit = byId.get(result.resultId);
              return detail(result.resultId, absenceDecision(hit || {}, result));
            }),
          },
        ],
      };
      state.displaySummary = displaySummary;
      return displaySummary;
    }

    function buildDisplayResponse(agentResponse) {
      const displayItems = asArray(agentResponse.hits).map(buildDisplayResult).filter(Boolean);
      const results = displayItems.map((item) => item.result);
      const providerDetailsById = displayItems.reduce((acc, item) => {
        acc[item.result.resultId] = item.providerDetails;
        return acc;
      }, {});
      const summaryItems = results.map((result) => ({
        ...result,
        providerDetails: providerDetailsById[result.resultId],
      }));
      const response = {
        metadata: {
          requestId: agentResponse.requestId,
          generatedAt: new Date().toISOString(),
          client: { clientType: "service_guide", channel: "online" },
          businessRules: { source: "bff", version: BFF_RULESET_VERSION },
        },
        totalResults: results.length,
        results,
        providerDetailsById,
      };
      buildDisplaySummary(agentResponse, summaryItems);
      return response;
    }

    function runFlow() {
      state.errors = [];
      state.selectedProviderId = null;
      state.visibleCount = 10;
      state.orchestratorSummary = null;
      state.displaySummary = null;
      state.jsonVisible = {};
      state.previewPanelOpen = false;
      state.explanationOpen = false;
      const uiRequest = buildUiRequest();
      const missingQuery = !uiRequest.query;
      if (missingQuery) state.errors.push("יש להזין טקסט לחיפוש");
      if (!state.searchJsonText.trim()) state.errors.push("יש להעלות פלט מנוע חיפוש");
      let parsedSearchJson = null;
      try {
        parsedSearchJson = state.searchJsonText.trim() ? JSON.parse(state.searchJsonText) : null;
      } catch (error) {
        state.errors.push(`JSON לא תקין: ${error.message}`);
      }
      if (parsedSearchJson && !hasValidHitsPath(parsedSearchJson)) {
        state.errors.push("מבנה פלט מנוע החיפוש חסר את הנתיב data.service_guide.hits.");
      }
      if (!state.errors.length) {
        const agentRequest = buildAgentRequest(uiRequest);
        state.searchJson = parsedSearchJson;
        state.flow = { ui: uiRequest, agentRequest };
        const agentResponse = buildAgentResponse(state.searchJson, agentRequest);
        const displayResponse = buildDisplayResponse(agentResponse);
        state.flow.searchResponse = state.searchJson;
        state.flow.agentResponse = agentResponse;
        state.flow.displayResponse = displayResponse;
        state.selectedStep = "preview";
      } else {
        state.flow = {};
        state.searchJson = parsedSearchJson;
        state.orchestratorSummary = null;
        state.displaySummary = null;
        state.selectedStep = missingQuery ? "ui" : "searchResponse";
      }
      render();
    }

    function resetFlow() {
      state.fileName = "";
      state.searchJsonText = "";
      state.searchJson = null;
      state.flow = {};
      state.orchestratorSummary = null;
      state.displaySummary = null;
      state.errors = [];
      state.selectedProviderId = null;
      state.visibleCount = 10;
      state.jsonVisible = {};
      state.previewPanelOpen = false;
      state.explanationOpen = false;
      state.selectedStep = "ui";
      els.searchText.value = "";
      els.environment.value = "false";
      els.jsonFile.value = "";
      render();
    }

    function renderRunStatus() {
      const total = state.flow.displayResponse?.totalResults;
      const label = state.errors.length
        ? "נדרש להשלים קלט"
        : (total === undefined ? "טרם הופעל הסימולטור" : "ההרצה הושלמה");
      const meta = total === undefined ? "טרם נבנו תוצאות לתצוגה" : `${total} תוצאות לתצוגה`;
      els.runStatus.innerHTML = `
        <div class="run-state">
          <span class="run-state-label">${escapeHtml(label)}</span>
          <span class="run-state-meta">${escapeHtml(meta)}</span>
        </div>
      `;
      els.fileNamePill.textContent = state.fileName || "לא הועלה פלט מנוע חיפוש";
      els.rawSourcePill.hidden = !includeRawSource();
      els.rawSourcePill.textContent = includeRawSource() ? "Test / QA כולל rawSource" : "";
    }

    function renderHeaderErrors() {
      if (!state.errors.length) {
        els.headerErrors.hidden = true;
        els.headerErrors.innerHTML = "";
        return;
      }
      els.headerErrors.hidden = false;
      els.headerErrors.innerHTML = state.errors.map((error) => `<div class="error-item">${escapeHtml(error)}</div>`).join("");
    }

    function stepStatus(id) {
      if (id === "ui") return state.flow.ui ? { text: "נבנה", state: "done" } : { text: "ממתין להפעלה", state: "waiting" };
      if (id === "agentRequest") return state.flow.agentRequest ? { text: "נבנה", state: "done" } : { text: "ממתין להפעלה", state: "waiting" };
      if (id === "searchResponse") {
        if (!state.searchJsonText) return { text: "נדרש פלט מנוע חיפוש", state: "needs-input" };
        if (state.searchJson && !hasValidHitsPath(state.searchJson)) return { text: "מבנה לא תקין", state: "error" };
        return state.searchJson ? { text: "פלט נטען", state: "done" } : { text: "JSON לא תקין", state: "error" };
      }
      if (id === "orchestrator") return state.orchestratorSummary ? { text: "עיבוד בוצע", state: "done" } : { text: "ממתין להפעלה", state: "waiting" };
      if (id === "agentResponse") return state.flow.agentResponse ? { text: "נבנה", state: "done" } : { text: "ממתין להפעלה", state: "waiting" };
      if (id === "displayResponse") return state.flow.displayResponse ? { text: "נבנה", state: "done" } : { text: "ממתין להפעלה", state: "waiting" };
      if (id === "preview") return state.flow.displayResponse ? { text: "מוצג", state: "done" } : { text: "ממתין להפעלה", state: "waiting" };
      return { text: "", state: "waiting" };
    }

    function renderStepper() {
      els.stepper.innerHTML = steps.map((step) => `
        <button class="step ${state.selectedStep === step.id ? "active" : ""}" type="button" onclick="setStep('${step.id}')">
          <div>
            <div class="step-name">${escapeHtml(step.name)}</div>
          </div>
          ${(() => {
            const status = stepStatus(step.id);
            return `<span class="step-state ${escapeHtml(status.state)}">${escapeHtml(status.text)}</span>`;
          })()}
        </button>
      `).join("");
    }

    function renderJsonActions(target) {
      const data = dataForTarget(target);
      if (data === undefined || data === null) return "";
      const visible = !!state.jsonVisible[target];
      const secondary = visible && ["agentResponse", "displayResponse"].includes(target)
        ? `
          <button class="button" type="button" onclick="copyJson('${target}')">העתק JSON</button>
          <button class="button" type="button" onclick="downloadSimulation()">הורד תוצר סימולציה</button>
        `
        : "";
      return `
        <button class="button ghost" type="button" onclick="toggleJson('${target}')">${visible ? "הסתר JSON" : "הצג JSON"}</button>
        ${secondary}
      `;
    }

    function jsonPanel(target, data) {
      if (data === undefined || data === null) return "";
      if (!state.jsonVisible[target]) return "";
      return `<pre class="json-box">${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
    }

    function renderSearchInput() {
      return `
        <div class="field">
          <label for="searchJsonInput">פלט מנוע חיפוש</label>
          <textarea id="searchJsonInput" oninput="updateSearchJsonText(this.value)" placeholder="{}">${escapeHtml(state.searchJsonText)}</textarea>
        </div>
      `;
    }

    function renderExplanation(rows) {
      return `
        <div class="explain-card">
          ${rows.map((row) => `
            <div class="explain-row">
              <div class="explain-label">${escapeHtml(row.label)}</div>
              <div class="explain-text">${escapeHtml(row.text)}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function splitTextSegments(text) {
      return String(text ?? "")
        .replace(/\.\s+(?=[א-תA-Za-z])/g, ".\n")
        .split(/;\s*|\n+/)
        .map((segment) => segment.trim())
        .filter(Boolean);
    }

    function renderSplitText(text) {
      const segments = splitTextSegments(text);
      if (segments.length <= 1) return escapeHtml(String(text ?? ""));
      return `<span class="split-lines">${segments.map((segment) => `<span class="split-line">${escapeHtml(segment)}</span>`).join("")}</span>`;
    }

    function renderSearchResponseStatus() {
      if (!state.searchJsonText.trim()) {
        return renderExplanation([
          { label: "מה נכנס", text: "טרם הועלה פלט מנוע חיפוש" },
          { label: "מה בוצע", text: "ניתן להעלות קובץ או להדביק JSON של פלט מנוע החיפוש" },
          { label: "מה יצא", text: "ההרצה תמשיך רק לאחר טעינת JSON תקין" },
        ]);
      }
      if (!state.searchJson) return `<div class="empty">JSON לא תקין</div>`;
      const hits = Array.isArray(state.searchJson?.data?.service_guide?.hits)
        ? state.searchJson.data.service_guide.hits.length
        : 0;
      return renderExplanation([
        { label: "מה נכנס", text: "פלט מנוע החיפוש נטען" },
        { label: "מה בוצע", text: "נבדק שהנתיב data.service_guide.hits קיים ושהוא מערך" },
        { label: "מה יצא", text: `נמצאו ${hits} תוצאות מקור` },
      ]);
    }

    function renderOrchestratorSummary() {
      if (!state.orchestratorSummary) return `<div class="empty">סיכום פעולות העיבוד יוצג לאחר הרצה תקינה.</div>`;
      return `
        ${renderExplanation([
          { label: "מה נכנס", text: "התקבל פלט מנוע החיפוש לעיבוד" },
          { label: "מה בוצע", text: "בוצעו פעולות העיבוד המוגדרות באורקסטרטור" },
          { label: "מה יצא", text: `עברו לעיבוד הבא ${state.orchestratorSummary.finalHits} מתוך ${state.orchestratorSummary.sourceHits} תוצאות מקור` },
        ])}
        <div class="summary-metrics">
          <div class="metric">
            <div class="metric-value">${state.orchestratorSummary.sourceHits}</div>
            <div class="metric-label">תוצאות מקור</div>
          </div>
          <div class="metric">
            <div class="metric-value">${state.orchestratorSummary.finalHits}</div>
            <div class="metric-label">תוצאות שעברו ל־Agent</div>
          </div>
          <div class="metric">
            <div class="metric-value">${state.orchestratorSummary.rejectedByInitiator}</div>
            <div class="metric-label">נפסלו בגלל initiatorCode</div>
          </div>
          <div class="metric">
            <div class="metric-value">${state.orchestratorSummary.rejectedWithoutResultId}</div>
            <div class="metric-label">נפסלו ללא מזהה תוצאה</div>
          </div>
        </div>
        <div class="summary-list">
          ${state.orchestratorSummary.operations.map((item) => `
            <div class="summary-item">
              <div class="item-title">${escapeHtml(item.title)}</div>
              <div class="item-text"><span class="item-result-label">מה יצא: </span>${renderSplitText(item.value)}</div>
              ${asArray(item.details).length ? `
                <details class="technical-details">
                  <summary>פירוט טכני ועסקי</summary>
                  <div class="kv">
                    ${asArray(item.details).map((detail) => `
                      <div class="kv-row">
                        <div class="kv-key">פירוט</div>
                        <div class="kv-value explain">${renderSplitText(detail)}</div>
                      </div>
                    `).join("")}
                  </div>
                </details>
              ` : ""}
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderDisplaySummary() {
      if (!state.displaySummary) return `<div class="empty">פירוט בניית תגובת BFF ל־UI יוצג לאחר הרצה תקינה.</div>`;
      return `
        ${renderExplanation([
          { label: "מה נכנס", text: "התקבלה תגובת Agent" },
          { label: "מה בוצע", text: "נבנו רכיבי התצוגה שה־UI צריך לרנדר: רשימת results[] למסך התוצאות ומפת providerDetailsById למסך פרטי הרופא." },
          { label: "מה יצא", text: `נוצר ServiceGuideDisplayResponse עם ${state.displaySummary.finalResults} תוצאות לתצוגה` },
        ])}
        <div class="summary-metrics">
          <div class="metric">
            <div class="metric-value">${state.displaySummary.sourceHits}</div>
            <div class="metric-label">תוצאות שהתקבלו מה-Agent</div>
          </div>
          <div class="metric">
            <div class="metric-value">${state.displaySummary.finalResults}</div>
            <div class="metric-label">תוצאות שנבנו לתצוגה</div>
          </div>
        </div>
        <div class="summary-list">
          ${state.displaySummary.operations.map((item) => `
            <div class="summary-item">
              <div class="item-title">${escapeHtml(item.title)}</div>
              <div class="item-text"><span class="item-result-label">מה יצא: </span>${renderSplitText(item.value)}</div>
              ${asArray(item.details).length ? `
                <details class="technical-details">
                  <summary>פירוט טכני ועסקי</summary>
                  <div class="kv">
                    ${asArray(item.details).map((detail) => `
                      <div class="kv-row">
                        <div class="kv-key">פירוט</div>
                        <div class="kv-value explain">${renderSplitText(detail)}</div>
                      </div>
                    `).join("")}
                  </div>
                </details>
              ` : ""}
            </div>
          `).join("")}
        </div>
      `;
    }

    function currentStepData() {
      if (state.selectedStep === "ui") return state.flow.ui;
      if (state.selectedStep === "agentRequest") return state.flow.agentRequest;
      if (state.selectedStep === "searchResponse") return state.searchJson || null;
      if (state.selectedStep === "agentResponse") return state.flow.agentResponse;
      if (state.selectedStep === "displayResponse" || state.selectedStep === "preview") return state.flow.displayResponse;
      return null;
    }

    function dataForTarget(target) {
      if (target === "ui") return state.flow.ui;
      if (target === "agentRequest") return state.flow.agentRequest;
      if (target === "searchResponse") return state.searchJson || null;
      if (target === "agentResponse") return state.flow.agentResponse;
      if (target === "displayResponse") return state.flow.displayResponse;
      if (target === "orchestrator") return state.orchestratorSummary;
      return null;
    }

    function renderStepIntro(id) {
      if (id === "ui") {
        if (!state.flow.ui) {
          return renderExplanation([
            { label: "מה נכנס", text: "טקסט החיפוש ייקרא בעת הפעלה" },
            { label: "מה בוצע", text: "טרם נבנתה בקשת ServiceGuideSearchRequest" },
            { label: "מה יצא", text: "בקשת החיפוש תיווצר לאחר לחיצה על הפעל" },
          ]);
        }
        return renderExplanation([
          { label: "מה נכנס", text: "התקבל טקסט החיפוש שהוזן במסך" },
          { label: "מה בוצע", text: "נבנתה בקשת ServiceGuideSearchRequest לפי כללי ה־UI" },
          { label: "מה יצא", text: "נוצרה בקשת חיפוש לשליחה ל־BFF" },
        ]);
      }
      if (id === "agentRequest") {
        if (!state.flow.agentRequest) {
          return renderExplanation([
            { label: "מה נכנס", text: "בקשת החיפוש מה־UI תתקבל לאחר הפעלה" },
            { label: "מה בוצע", text: "טרם נבנתה בקשת ServiceGuideSearchAgentRequest" },
            { label: "מה יצא", text: "בקשת Agent תיווצר רק לאחר לחיצה על הפעל והרצה תקינה" },
          ]);
        }
        return renderExplanation([
          { label: "מה נכנס", text: "התקבלה בקשת החיפוש מה־UI" },
          { label: "מה בוצע", text: "נוצר requestId, הוגדר pageSize=50, ו־includeRawSource נקבע לפי הסביבה: true בסביבות Test/QA ו־false בסביבת Prod." },
          { label: "מה יצא", text: "נוצרה בקשת ServiceGuideSearchAgentRequest לשליחה ל־Agent" },
        ]);
      }
      if (id === "agentResponse") {
        if (!state.flow.agentResponse) return `<div class="empty">תגובת Agent תוצג לאחר הרצה תקינה.</div>`;
        return renderExplanation([
          { label: "מה נכנס", text: "התקבלו תוצאות מעיבוד האורקסטרטור" },
          { label: "מה בוצע", text: "נבנתה תגובת Agent בהתאם לחוזה ServiceGuideSearchAgentResponse" },
          { label: "מה יצא", text: "נוצרה תגובת ServiceGuideSearchAgentResponse" },
        ]);
      }
      return "";
    }

    function previewToggleButton() {
      return `<button class="button ghost" type="button" onclick="togglePreviewPanel()">${state.previewPanelOpen ? "הסתר תצוגה מקדימה" : "הצג תצוגה מקדימה"}</button>`;
    }

    function explanationToggleButton() {
      return `<button class="button ghost" type="button" onclick="toggleExplanationPanel()">${state.explanationOpen ? "הסתר הסבר" : "הצג הסבר"}</button>`;
    }

    function renderWorkspace() {
      const step = steps.find((item) => item.id === state.selectedStep) || steps[0];
      els.workspaceTitle.textContent = step.name;
      els.workspaceSubtitle.textContent = step.sub;
      els.workspaceSubtitle.hidden = !step.sub;
      const isPreviewStep = state.selectedStep === "preview";
      els.workspaceShell.className = `workspace ${isPreviewStep ? (state.explanationOpen ? "explanation-visible" : "preview-full") : (state.previewPanelOpen ? "" : "preview-hidden")}`.trim();
      const showJsonToggle = ["ui", "agentRequest", "agentResponse", "displayResponse"].includes(state.selectedStep);
      els.workspaceActions.innerHTML = isPreviewStep
        ? ""
        : `${previewToggleButton()}${showJsonToggle ? renderJsonActions(state.selectedStep) : ""}`;
      els.previewActions.innerHTML = isPreviewStep ? explanationToggleButton() : "";
      if (state.selectedStep === "searchResponse") {
        els.workspaceBody.innerHTML = `${renderSearchInput()}${renderSearchResponseStatus()}`;
        return;
      }
      if (state.selectedStep === "orchestrator") {
        els.workspaceBody.innerHTML = renderOrchestratorSummary();
        return;
      }
      if (state.selectedStep === "displayResponse") {
        els.workspaceBody.innerHTML = `${renderDisplaySummary()}${jsonPanel("displayResponse", currentStepData())}`;
        return;
      }
      if (state.selectedStep === "preview") {
        els.workspaceBody.innerHTML = renderExplanation([
          { label: "מה נכנס", text: "מוצגת הדמיה של מסך התוצאות ושל מסך פרטי הרופא." },
          { label: "מה בוצע", text: "לחיצה על תוצאה משתמשת ב־navigation.targetId כדי לפתוח את הרשומה המתאימה מתוך providerDetailsById, וחזרה מחזירה לרשימת התוצאות." },
          { label: "מה יצא", text: "כך מסך התוצאות ומסך פרטי הרופא צפויים להיראות ב־UI." },
        ]);
        return;
      }
      els.workspaceBody.innerHTML = `${renderStepIntro(state.selectedStep)}${jsonPanel(state.selectedStep, currentStepData())}`;
    }

    function renderTextLines(lines) {
      return asArray(lines).map((line) => `<div>${escapeHtml(line.text)}</div>`).join("");
    }

    function chipClass(chip) {
      if (["accessibility"].includes(chip.type)) return "search-result-chip green";
      if (String(chip.type || "").startsWith("shaban")) return "search-result-chip shaban";
      return "search-result-chip";
    }

    function renderChips(chips) {
      return asArray(chips).map((chip) => `<span class="${chipClass(chip)}">${chip.type === "accessibility" ? icon("accessibility") : ""}${escapeHtml(chip.text)}</span>`).join("");
    }

    function renderMessages(messages) {
      return asArray(messages).map((message) => `<div class="message">${escapeHtml(message.text)}</div>`).join("");
    }

    function renderContactValue(item) {
      const text = escapeHtml(item.text || "");
      if (item.actionType === "copy" && hasText(item.actionValue)) {
        return `<a class="contact-action" href="#" onclick="copyContactValue(event, '${escapeJs(item.actionValue)}')">${text}</a>`;
      }
      if (item.actionType === "mailto" && hasText(item.actionUri)) {
        return `<a class="contact-action" href="${escapeHtml(item.actionUri)}" onclick="event.stopPropagation()">${text}</a>`;
      }
      return `<span class="contact-text">${text}</span>`;
    }

    function renderContactItem(item) {
      return `
        <div class="contact-row">
          <span class="contact-text">${escapeHtml(item.label || "")}</span>
          ${renderContactValue(item)}
          ${item.reason ? `<span class="contact-text">- ${escapeHtml(item.reason)}</span>` : ""}
        </div>
      `;
    }

    function renderSection(section, sectionType) {
      if (!section) return "";
      const open = sectionType !== "services" ? "open" : "";
      const title = `<summary class="preview-section-title" onclick="event.stopPropagation()">${escapeHtml(section.title)}</summary>`;
      if (section.items) {
        return `
          <details class="preview-section-card" ${open} onclick="event.stopPropagation()">
            ${title}
            <div class="section-content">
              ${section.items.map(renderContactItem).join("")}
              ${renderMessages(section.messages)}
            </div>
          </details>
        `;
      }
      if (section.groups) {
        return `
          <details class="preview-section-card" ${open} onclick="event.stopPropagation()">
            ${title}
            <div class="section-content">
              ${section.groups.map((group) => `
                <details ${group.type === "reception" ? "open" : ""} onclick="event.stopPropagation()">
                  <summary onclick="event.stopPropagation()">${escapeHtml(group.title || "")}</summary>
                  ${asArray(group.rows || group.items).map((row) => `<div>${escapeHtml(row.dayText || row.text || "")} ${escapeHtml(row.hoursText || "")} ${escapeHtml(row.notes || row.coverageText || "")}</div>`).join("")}
                </details>
              `).join("")}
            </div>
          </details>
        `;
      }
      if (section.messages || section.city) {
        return `
          <details class="preview-section-card" ${open} onclick="event.stopPropagation()">
            ${title}
            <div class="section-content">
              ${section.city ? `<div>${escapeHtml(section.city)}</div>` : ""}
              ${renderMessages(section.messages)}
            </div>
          </details>
        `;
      }
      return "";
    }

    function renderProviderDetails(details) {
      const header = details.header || {};
      const sections = details.sections || {};
      return `
        <div class="preview-shell">
          <div class="preview-head">
            <button class="button ghost" type="button" onclick="backToResults()">חזרה לתוצאות</button>
            <span>מסך פרטי רופא</span>
          </div>
          <div class="provider-screen">
            <div class="expanded-hero">
              <div class="doctor-avatar">${icon(header.avatarType) || escapeHtml(avatarLetter(header.avatarType))}</div>
              <div>
                <div class="search-result-name">${escapeHtml(header.title || "")}</div>
                <div class="search-result-meta">${renderTextLines(header.subtitleLines)}</div>
                ${header.chips ? `<div class="search-result-footer">${renderChips(header.chips)}</div>` : ""}
              </div>
            </div>
            ${details.locationText ? `<div class="expanded-location-row">${icon("locationPin")}${escapeHtml(details.locationText)}</div>` : ""}
            <div class="service-layout">
              <div class="service-main-column">
                ${renderSection(sections.address, "address")}
                ${renderSection(sections.schedule, "schedule")}
                ${renderSection(sections.services, "services")}
                ${renderSection(sections.absences, "absences")}
              </div>
              <div class="service-side-column">
                ${renderSection(sections.appointments, "appointments")}
                ${renderSection(sections.contacts, "contacts")}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderResult(result) {
      const card = result.collapsedCard;
      return `
        <article class="search-result-card" role="button" tabindex="0" onclick="openProviderDetails('${escapeJs(result.navigation?.targetId || result.resultId)}')" onkeydown="handleCardKey(event, '${escapeJs(result.navigation?.targetId || result.resultId)}')">
          <div class="search-result-hero">
            <div class="search-result-avatar">${icon(card.avatarType) || escapeHtml(avatarLetter(card.avatarType))}</div>
            <div>
              <div class="search-result-name">${escapeHtml(card.title)}</div>
              <div class="search-result-meta">${renderTextLines(card.subtitleLines)}</div>
            </div>
          </div>
          ${card.locationText ? `<div class="search-result-location-row"><span class="search-result-location">${icon("locationPin")}${escapeHtml(card.locationText)}</span></div>` : ""}
          ${renderMessages(card.messages)}
          <div class="search-result-footer">
            ${renderChips(card.chips)}
          </div>
        </article>
      `;
    }

    function renderPreview() {
      const response = state.flow.displayResponse;
      if (!response) {
        els.previewBody.innerHTML = `<div class="empty">יש להפעיל את הסימולטור כדי להציג תוצאות</div>`;
        return;
      }
      if (state.selectedProviderId) {
        const details = response.providerDetailsById?.[state.selectedProviderId];
        if (details) {
          els.previewBody.innerHTML = renderProviderDetails(details);
          return;
        }
        state.selectedProviderId = null;
      }
      if (!response.results.length) {
        els.previewBody.innerHTML = `<div class="preview-shell"><div class="empty">לא נמצאו תוצאות לחיפוש.</div></div>`;
        return;
      }
      const visible = response.results.slice(0, state.visibleCount);
      els.previewBody.innerHTML = `
        <div class="preview-shell">
          <div class="preview-head">
            <strong>תוצאות חיפוש</strong>
            <span>מוצגות ${visible.length} מתוך ${response.results.length}</span>
          </div>
          <div class="results-list">
            ${visible.map(renderResult).join("")}
            ${state.visibleCount < response.results.length ? `<button class="button primary" type="button" onclick="loadMoreResults()">טעינת תוצאות נוספות</button>` : ""}
          </div>
        </div>
      `;
    }

    function render() {
      renderRunStatus();
      renderHeaderErrors();
      renderStepper();
      renderWorkspace();
      renderPreview();
    }

    window.setStep = function(id) {
      state.selectedStep = id;
      state.previewPanelOpen = false;
      state.explanationOpen = false;
      render();
    };

    window.updateSearchJsonText = function(value) {
      state.searchJsonText = value;
      state.fileName = "";
      try { state.searchJson = value.trim() ? JSON.parse(value) : null; } catch (error) { state.searchJson = null; }
      render();
    };

    window.togglePreviewPanel = function() {
      state.previewPanelOpen = !state.previewPanelOpen;
      render();
    };

    window.toggleExplanationPanel = function() {
      state.explanationOpen = !state.explanationOpen;
      render();
    };

    window.openProviderDetails = function(targetId) {
      state.selectedProviderId = targetId;
      if (history.pushState) history.pushState({ providerId: targetId }, "", `#provider-${encodeURIComponent(targetId)}`);
      render();
    };

    window.handleCardKey = function(event, resultId) {
      if (event.key !== "Enter" && event.key !== " ") return;
      event.preventDefault();
      event.stopPropagation();
      window.openProviderDetails(resultId);
    };

    window.backToResults = function() {
      state.selectedProviderId = null;
      if (location.hash.startsWith("#provider-") && history.pushState) history.pushState({}, "", location.pathname + location.search);
      render();
    };

    window.addEventListener("popstate", () => {
      if (!location.hash.startsWith("#provider-")) {
        state.selectedProviderId = null;
        render();
        return;
      }
      const targetId = decodeURIComponent(location.hash.replace("#provider-", ""));
      state.selectedProviderId = targetId || null;
      render();
    });

    window.loadMoreResults = function() {
      state.visibleCount += 10;
      render();
    };

    window.toggleJson = function(target) {
      state.jsonVisible[target] = !state.jsonVisible[target];
      render();
    };

    window.copyJson = async function(target) {
      const data = dataForTarget(target);
      if (data === undefined || data === null) return;
      await navigator.clipboard.writeText(JSON.stringify(data, null, 2));
    };

    window.copyContactValue = async function(event, value) {
      event.preventDefault();
      event.stopPropagation();
      await navigator.clipboard.writeText(value);
    };

    window.openCreatorContact = function() {
      const recipient = "kimronav_a@mac.org.il";
      const message = "היי,\nיש לי שאלה בקשר לסימולטור מדריך השירותים החדש";
      const subject = "סימולטור מדריך השירותים החדש";
      const teamsUrl = `msteams:/l/chat/0/0?users=${encodeURIComponent(recipient)}&message=${encodeURIComponent(message)}`;
      const mailUrl = `mailto:${encodeURIComponent(recipient)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(message)}`;
      let appOpened = false;
      const markOpened = () => { appOpened = true; };
      const fallback = window.setTimeout(() => {
        window.removeEventListener("blur", markOpened);
        document.removeEventListener("visibilitychange", handleVisibilityChange);
        window.removeEventListener("pagehide", markOpened);
        if (!appOpened && document.visibilityState === "visible") window.location.href = mailUrl;
      }, 1400);
      function handleVisibilityChange() {
        if (document.visibilityState === "hidden") {
          markOpened();
          window.clearTimeout(fallback);
        }
      }
      window.addEventListener("blur", markOpened, { once: true });
      document.addEventListener("visibilitychange", handleVisibilityChange, { once: true });
      window.addEventListener("pagehide", markOpened, { once: true });
      window.location.href = teamsUrl;
    };

    window.downloadSimulation = function() {
      const payload = {
        generatedAt: new Date().toISOString(),
        flow: state.flow,
        orchestratorSummary: state.orchestratorSummary,
        displaySummary: state.displaySummary,
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "service-guide-slim-simulation.json";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    };

    els.uploadButton.addEventListener("click", () => els.jsonFile.click());
    els.jsonFile.addEventListener("change", async () => {
      const file = els.jsonFile.files && els.jsonFile.files[0];
      if (!file) return;
      if (file.size > MAX_UPLOAD_BYTES) {
        state.errors = ["ניתן להעלות קובץ עד 1MB"];
        render();
        return;
      }
      state.searchJsonText = await file.text();
      state.fileName = file.name;
      try { state.searchJson = JSON.parse(state.searchJsonText); } catch (error) { state.searchJson = null; }
      state.selectedStep = "searchResponse";
      render();
    });
    els.runButton.addEventListener("click", runFlow);
    els.resetButton.addEventListener("click", resetFlow);
    els.searchText.addEventListener("input", () => {});
    els.environment.addEventListener("change", renderRunStatus);

    render();
  </script>
</body>
