<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>מדריך השירותים החדש - סימולטור</title>
  <style>
    :root {
      --font-family: "Noto Sans Hebrew", "Noto Sans", Arial, sans-serif;
      --primary-main: #1769AA;
      --primary-dark: #0F4F82;
      --primary-light: #E8F2FB;
      --success-main: #14743C;
      --success-light: #E7F6EE;
      --warning-main: #9A6500;
      --warning-light: #FFF4D8;
      --error-main: #B3261E;
      --error-light: #FDECEB;
      --background-default: #F5F7FA;
      --background-paper: #FFFFFF;
      --surface-secondary: #F8FAFC;
      --text-primary: #1C2733;
      --text-secondary: #607080;
      --divider: #DCE3EA;
      --border-strong: #B9C7D4;
      --preview-background-top: #F6FBFE;
      --preview-background-bottom: #EEF7FB;
      --preview-hero: #DFF5FB;
      --preview-info: #E5F6FD;
      --preview-info-text: #0067A6;
      --preview-shaban: #F0E9FF;
      --preview-shaban-text: #5D3AA0;
      --radius-button: 8px;
      --radius-input: 8px;
      --radius-panel: 12px;
      --radius-card: 16px;
      --radius-chip: 999px;
      --shadow-panel: 0 1px 3px rgba(15, 23, 42, 0.08);
      --shadow-card: 0 8px 18px rgba(0, 103, 166, 0.07);
      --shadow-card-open: 0 12px 24px rgba(0, 103, 166, 0.12);
      --focus-ring: 0 0 0 3px var(--primary-light);
      --bg: var(--background-default);
      --surface: var(--background-paper);
      --surface-2: var(--surface-secondary);
      --ink: var(--text-primary);
      --muted: var(--text-secondary);
      --line: var(--divider);
      --primary: var(--primary-main);
      --primary-soft: var(--primary-light);
      --ok: var(--success-main);
      --ok-soft: var(--success-light);
      --warn: var(--warning-main);
      --warn-soft: var(--warning-light);
      --err: var(--error-main);
      --err-soft: var(--error-light);
      --card: var(--surface);
      --border: var(--line);
      --accent-soft: var(--preview-hero);
      --info: var(--preview-info);
      --info-text: var(--preview-info-text);
      --success: var(--success-light);
      --success-text: var(--success-main);
      --shaban: var(--preview-shaban);
      --shaban-text: var(--preview-shaban-text);
      --radius: var(--radius-panel);
      --shadow: var(--shadow-panel);
      font-family: var(--font-family);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-family);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.6;
      overflow: hidden;
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible,
    summary:focus-visible,
    .search-result-card:focus-visible,
    .contact-action:focus-visible {
      outline: 0;
      border-color: var(--primary-main);
      box-shadow: var(--focus-ring);
    }

    .app {
      width: min(1440px, calc(100vw - 32px));
      height: calc(100vh - 32px);
      margin: 16px auto;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 12px;
      min-height: 0;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel.header {
      box-shadow: none;
      border-color: var(--divider);
    }

    .panel-head {
      min-height: 52px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex: none;
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.35;
    }

    .panel-subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .panel-body {
      padding: 16px;
      min-height: 0;
    }

    .header {
      display: grid;
      gap: 14px;
    }

    .panel.header.header-collapsed .panel-body.header {
      gap: 0;
    }

    .panel.header.header-collapsed .controls,
    .panel.header.header-collapsed .status-strip.header-status,
    .panel.header.header-collapsed .panel-body.header > .status-strip,
    .panel.header.header-collapsed .header-errors {
      display: none;
    }

    .title-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
    }

    h1 {
      margin: 0 0 6px;
      color: var(--primary-dark);
      font-size: 24px;
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .title-with-signature {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 13px;
    }

    .controls {
      display: grid;
      grid-template-columns: 320px 104px 190px 96px 96px;
      gap: 12px;
      align-items: end;
      justify-content: start;
    }

    .mode-chip {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      padding: 0;
      font-size: 11px;
      font-weight: 400;
      white-space: nowrap;
    }

    .mode-chip-select {
      width: auto;
      min-height: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--primary);
      padding: 0 2px;
      font-size: 11px;
      font-weight: 400;
      outline: 0;
      box-shadow: none;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
    }

    .mode-chip-select option {
      color: var(--muted);
      font-weight: 400;
    }

    .mode-chip-select:focus,
    .mode-chip-select:focus-visible {
      border: 0;
      outline: 0;
      box-shadow: none;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .field[hidden] {
      display: none;
    }

    #uploadButton {
      width: 190px;
    }

    #runButton,
    #resetButton {
      width: 96px;
    }

    .controls.agent-mode {
      grid-template-columns: 190px 96px 96px;
    }

    label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-input);
      background: #fff;
      color: var(--ink);
      min-height: 40px;
      padding: 8px 12px;
    }

    textarea {
      min-height: 240px;
      direction: ltr;
      text-align: left;
      font-family: Consolas, "Courier New", monospace;
      resize: vertical;
    }

    .button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius-button);
      background: #fff;
      color: var(--ink);
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
    }

    .button.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .button.ghost {
      background: #fff;
      border-color: var(--line);
      color: var(--primary);
    }

    .button.icon-only {
      width: 40px;
      min-width: 40px;
      border-color: transparent;
      background: transparent;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
    }

    .button.icon-only svg {
      width: 24px;
      height: 24px;
      display: block;
      fill: currentColor;
    }

    .file-input {
      display: none;
    }

    .status-strip, .summary-strip, .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-start;
    }

    .status-strip {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .header-errors {
      display: grid;
      gap: 6px;
      width: min(100%, 930px);
      justify-self: start;
    }

    .header-errors[hidden] {
      display: none;
    }

    .status-strip.header-status {
      justify-content: flex-end;
      text-align: left;
    }

    .header-actions {
      display: flex;
      align-items: start;
      gap: 8px;
    }

    .header-toggle {
      width: 32px;
      height: 32px;
      min-height: 32px;
      border: 0;
      background: transparent;
      color: var(--primary);
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
    }

    .header-toggle svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .run-state {
      display: grid;
      gap: 2px;
    }

    .run-state-label {
      color: var(--ink);
    }

    .run-state-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .quiet-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .pill {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius-chip);
      background: var(--surface-2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .pill.ok { background: var(--ok-soft); color: var(--ok); border-color: #bbf7d0; }
    .pill.warn { background: var(--warn-soft); color: var(--warn); border-color: #fde68a; }
    .pill.err { background: var(--err-soft); color: var(--err); border-color: #fecaca; }

    .stepper {
      display: grid;
      grid-template-columns: repeat(7, minmax(120px, 1fr));
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius-panel);
      background: #fff;
      padding: 4px;
    }

    .step {
      border: 1px solid transparent;
      border-radius: var(--radius-button);
      background: transparent;
      min-height: 48px;
      padding: 7px 8px;
      text-align: right;
      display: grid;
      align-content: space-between;
      color: var(--ink);
    }

    .step.active {
      border-color: #cfe4ef;
      background: var(--primary-soft);
      box-shadow: none;
    }

    .step.disabled {
      background: var(--surface-2);
      color: var(--muted);
      cursor: not-allowed;
      opacity: 0.68;
      box-shadow: none;
    }

    .step-name {
      font-size: 12px;
      font-weight: 600;
      direction: rtl;
      text-align: right;
      unicode-bidi: plaintext;
      overflow-wrap: anywhere;
    }

    .step-state {
      color: var(--muted);
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .step-state::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: var(--radius-chip);
      background: var(--line);
    }

    .step-state.done::before { background: var(--ok); }
    .step-state.waiting::before { background: var(--muted); }
    .step-state.needs-input::before { background: var(--warn); }
    .step-state.error::before { background: var(--err); }
    .step-state.disabled::before { background: var(--muted); }

    .workspace {
      display: grid;
      grid-template-columns: minmax(520px, 1fr) minmax(520px, .95fr);
      grid-template-rows: minmax(0, 1fr);
      gap: 16px;
      align-items: stretch;
      min-height: 0;
      height: 100%;
    }

    .workbench, .preview-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      height: 100%;
    }

    .workbench {
      box-shadow: none;
    }

    .workbench .panel-body {
      background: #fff;
    }

    .workbench .panel-body,
    .preview-panel .panel-body {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    .main-grid {
      display: grid;
      gap: 12px;
      min-height: 0;
    }

    .json-box {
      background: #101827;
      color: #dbeafe;
      border-radius: var(--radius-button);
      padding: 12px;
      overflow: auto;
      max-height: clamp(360px, calc(100vh - 300px), 840px);
      direction: ltr;
      text-align: left;
      unicode-bidi: plaintext;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre;
    }

    .summary-list {
      display: grid;
      gap: 10px;
    }

    .summary-item {
      border: 1px solid var(--line);
      border-radius: var(--radius-panel);
      background: #fff;
      padding: 12px 16px;
      display: grid;
      gap: 8px;
    }

    .summary-metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 8px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: var(--radius-panel);
      background: #fff;
      padding: 12px;
      display: grid;
      gap: 4px;
    }

    .metric-value {
      color: var(--ink);
      font-size: 20px;
      font-weight: 700;
      line-height: 1.1;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
    }

    .quiet-card {
      border: 0;
      border-right: 2px solid #cfe4ef;
      border-radius: 0;
      background: transparent;
      padding: 6px 12px 6px 0;
      color: #1d2840;
      line-height: 1.6;
    }

    .explain-card {
      border: 0;
      border-right: 2px solid #cfe4ef;
      border-radius: 0;
      background: transparent;
      padding: 6px 12px 6px 0;
      color: #1d2840;
      line-height: 1.6;
      display: grid;
      gap: 8px;
    }

    .explain-row {
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .explain-label {
      color: var(--muted);
      font-size: 13px;
    }

    .explain-text {
      min-width: 0;
    }

    .technical-details {
      border-top: 1px solid var(--line);
      padding-top: 8px;
      margin-top: 4px;
    }

    .technical-details > summary {
      cursor: pointer;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
    }

    .contact-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .contact-text {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .contact-action {
      color: var(--primary);
      background: transparent;
      border: 0;
      padding: 0;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font: inherit;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .contact-action:hover {
      text-decoration: underline;
    }

    .creator-signature {
      width: 24px;
      height: 24px;
      padding: 0;
      appearance: none;
      display: block;
      border: 1px solid rgba(220, 227, 234, 0.68);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      opacity: 0.48;
      box-shadow: 0 3px 12px rgba(28, 39, 51, 0.07);
      overflow: hidden;
      cursor: pointer;
      flex: none;
      transition: opacity 160ms ease, transform 160ms ease, box-shadow 160ms ease;
    }

    .creator-signature:hover,
    .creator-signature:focus-visible {
      opacity: 0.86;
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(28, 39, 51, 0.12);
    }

    .creator-signature img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      filter: saturate(0.68) contrast(0.94);
    }

    .error-list {
      display: grid;
      gap: 8px;
    }

    .error-item {
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--err);
      padding: 0;
      line-height: 1.5;
    }

    .split-lines {
      display: grid;
      gap: 4px;
    }

    .split-line {
      display: block;
    }

    .workspace.preview-hidden {
      grid-template-columns: 1fr;
    }

    .workspace.preview-hidden .preview-panel {
      display: none;
    }

    .workspace.preview-full {
      grid-template-columns: 1fr;
    }

    .workspace.preview-full .workbench {
      display: none;
    }

    .workspace.explanation-visible {
      grid-template-columns: minmax(520px, 1fr) minmax(520px, .95fr);
    }

    .workspace.explanation-visible .workbench,
    .workspace.explanation-visible .preview-panel {
      display: flex;
    }

    .item-title {
      font-weight: 600;
      color: var(--primary);
      font-size: 16px;
      line-height: 1.4;
    }

    .item-text {
      color: #1d2840;
      font-size: 14px;
      line-height: 1.6;
    }

    .item-result-label {
      color: var(--muted);
      font-size: 12px;
      margin-inline-end: 4px;
    }

    .preview-shell {
      border: 0;
      border-radius: 16px;
      background: linear-gradient(180deg, var(--preview-background-top) 0%, var(--preview-background-bottom) 100%);
      padding: 16px;
      direction: rtl;
    }

    .preview-head {
      max-width: 1080px;
      margin: 0 auto 14px;
      color: var(--muted);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .results-list {
      max-width: 1080px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .search-result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      display: grid;
      gap: 14px;
      box-shadow: var(--shadow-card);
      cursor: pointer;
      overflow: hidden;
      container-type: inline-size;
    }

    .search-result-card.open {
      border-color: #8bd5ec;
      box-shadow: var(--shadow-card-open);
    }

    .search-result-hero {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 18px;
      align-items: center;
      background: var(--accent-soft);
      border-radius: 12px;
      padding: 16px;
      min-height: 146px;
    }

    .search-result-avatar,
    .doctor-avatar {
      border-radius: 50%;
      background: #fff;
      color: var(--info-text);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 400;
      flex: none;
    }

    .preview-icon {
      width: 16px;
      height: 16px;
      display: inline-block;
      flex: none;
      vertical-align: middle;
      object-fit: contain;
    }

    .search-result-avatar .preview-icon,
    .doctor-avatar .preview-icon {
      width: 34px;
      height: 34px;
    }

    .search-result-location .preview-icon,
    .expanded-location-row .preview-icon,
    .search-result-chip .preview-icon {
      width: 15px;
      height: 15px;
    }

    .search-result-avatar {
      width: 68px;
      height: 68px;
      font-size: 23px;
    }

    .doctor-avatar {
      width: 68px;
      height: 68px;
      font-size: 23px;
    }

    .search-result-name {
      color: var(--info-text);
      font-size: 22px;
      line-height: 1.3;
      font-weight: 700;
      text-decoration: underline;
      margin-bottom: 8px;
    }

    .search-result-meta {
      color: #1d2840;
      font-size: 15px;
      line-height: 1.8;
      display: grid;
      gap: 1px;
    }

    .search-result-footer {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      padding-inline: 2px;
    }

    .search-result-location-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      padding-inline: 2px;
    }

    .search-result-location {
      color: #1d2840;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .search-result-chip {
      border-radius: var(--radius-chip);
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 600;
      background: var(--info);
      color: var(--info-text);
      border: 1px solid #b8e6f4;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .search-result-chip.green {
      background: var(--success);
      color: var(--success-text);
      border-color: transparent;
    }

    .search-result-chip.shaban {
      background: var(--shaban);
      color: var(--shaban-text);
      border-color: #d8c9ff;
    }

    .message {
      border: 1px solid #fde68a;
      background: #fffbeb;
      color: #713f12;
      border-radius: var(--radius-button);
      padding: 8px 10px;
      font-size: 13px;
      line-height: 1.5;
    }

    .expanded {
      border-top: 0;
      padding: 0 0 2px;
      background: transparent;
    }

    .provider-screen {
      display: grid;
      gap: 20px;
      padding-top: 2px;
    }

    .expanded-screen-title {
      color: var(--info-text);
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      margin: 0;
    }

    .expanded-hero {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 18px;
      align-items: center;
      background: var(--accent-soft);
      border-radius: 12px;
      padding: 16px;
      min-height: 132px;
    }

    .expanded-location-row {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #1d2840;
      font-size: 14px;
      padding-inline: 4px;
    }

    .service-layout {
      direction: ltr;
      display: grid;
      grid-template-columns: minmax(220px, .9fr) minmax(240px, 1.4fr);
      grid-template-areas: "side main";
      gap: 20px;
      align-items: start;
    }

    .service-main-column {
      grid-area: main;
      direction: rtl;
      display: grid;
      gap: 16px;
    }

    .service-side-column {
      grid-area: side;
      direction: rtl;
      display: grid;
      gap: 16px;
    }

    .preview-section-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .preview-section-title {
      color: var(--info-text);
      font-size: 16px;
      font-weight: 600;
      line-height: 1.4;
      margin: 0 0 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid #b8e6f4;
    }

    .section-content {
      display: grid;
      gap: 12px;
      color: #1d2840;
      font-size: 14px;
      line-height: 1.6;
    }

    .kv {
      display: grid;
      gap: 6px;
    }

    .kv-row {
      display: grid;
      grid-template-columns: 130px minmax(0, 1fr);
      gap: 8px;
      font-size: 13px;
    }

    .kv-key {
      color: var(--muted);
      font-weight: 400;
    }

    .kv-value {
      direction: ltr;
      text-align: left;
      unicode-bidi: plaintext;
      overflow-wrap: anywhere;
    }

    .kv-value.explain {
      direction: rtl;
      text-align: right;
      line-height: 1.6;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: var(--radius-button);
      background: var(--surface-2);
      color: var(--muted);
      padding: 18px;
      text-align: center;
    }

    @container (max-width: 720px) {
      .service-layout {
        grid-template-columns: 1fr;
        grid-template-areas:
          "main"
          "side";
        gap: 16px;
      }
    }

    @media (max-width: 1100px) {
      .stepper {
        display: flex;
        overflow-x: auto;
      }

      .step {
        min-width: 150px;
      }

      .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr);
      }

      .workspace.explanation-visible {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
      }
    }

    @media (max-width: 900px) {
      .controls {
        grid-template-columns: 320px 104px 190px 96px 96px;
        overflow-x: auto;
      }

      .service-layout {
        grid-template-columns: 1fr;
        grid-template-areas:
          "main"
          "side";
        gap: 16px;
      }
    }

    @media (max-width: 640px) {
      .title-row {
        grid-template-columns: 1fr;
      }

      .status-strip.header-status {
        justify-content: flex-start;
        text-align: right;
      }
    }
  </style>
</head>

  <script>
    const INITIATOR_CODE = "001";
    const MAX_UPLOAD_BYTES = 1000 * 1024;
    const BFF_RULESET_VERSION = "v1";
    const AGENT_DISABLED_STEPS = new Set(["ui", "agentRequest", "searchResponse", "orchestrator"]);

    const steps = [
      { id: "ui", name: "בקשת חיפוש UI", sub: "ServiceGuideSearchRequest" },
      { id: "agentRequest", name: "בקשת חיפוש Agent", sub: "ServiceGuideSearchAgentRequest" },
      { id: "searchResponse", name: "פלט מנוע חיפוש", sub: "Search Engine Response" },
      { id: "orchestrator", name: "עיבוד אורקסטרטור", sub: "סיכום פעולות עיבוד" },
      { id: "agentResponse", name: "תגובת Agent", sub: "ServiceGuideSearchAgentResponse" },
      { id: "displayResponse", name: "תגובת BFF ל־UI", sub: "ServiceGuideDisplayResponse" },
      { id: "preview", name: "תצוגה מקדימה", sub: "" },
    ];

    const state = {
      inputMode: "full",
      selectedStep: "ui",
      searchFileName: "",
      agentFileName: "",
      searchJsonText: "",
      searchJson: null,
      agentJsonText: "",
      agentResponseJson: null,
      flow: {},
      orchestratorSummary: null,
      displaySummary: null,
      selectedProviderId: null,
      visibleCount: 10,
      errors: [],
      jsonVisible: {},
      previewPanelOpen: false,
      explanationOpen: false,
      headerCollapsed: false,
    };

    const els = {
      headerPanel: document.getElementById("headerPanel"),
      headerToggleButton: document.getElementById("headerToggleButton"),
      workspaceScroll: document.getElementById("workspaceScroll"),
      inputModeSelect: document.getElementById("inputModeSelect"),
      searchText: document.getElementById("searchText"),
      environment: document.getElementById("environment"),
      uploadButton: document.getElementById("uploadButton"),
      jsonFile: document.getElementById("jsonFile"),
      runButton: document.getElementById("runButton"),
      resetButton: document.getElementById("resetButton"),
      fileNamePill: document.getElementById("fileNamePill"),
      rawSourcePill: document.getElementById("rawSourcePill"),
      headerErrors: document.getElementById("headerErrors"),
      runStatus: document.getElementById("runStatus"),
      workspaceShell: document.getElementById("workspaceShell"),
      stepper: document.getElementById("stepper"),
      workspaceTitle: document.getElementById("workspaceTitle"),
      workspaceSubtitle: document.getElementById("workspaceSubtitle"),
      workspaceActions: document.getElementById("workspaceActions"),
      workspaceBody: document.getElementById("workspaceBody"),
      previewActions: document.getElementById("previewActions"),
      previewBody: document.getElementById("previewBody"),
    };

    const contactMap = {
      "01": { type: "phone", label: "טלפון", order: 1, actionType: "copy" },
      "02": { type: "appointments", label: "זימון תורים", order: 2, actionType: "copy" },
      "03": { type: "fax", label: "פקס", order: 3 },
      "04": { type: "mobile", label: "נייד", order: 4, actionType: "copy" },
      "05": { type: "email", label: "דוא״ל", order: 5, actionType: "mailto" },
    };

    const scheduleMap = {
      1: { type: "reception", title: "שעות פעילות הרופא", order: 1 },
      2: { type: "appointments", title: "זימון תורים", order: 2 },
      15: { type: "teamReception", title: "קבלת קהל צוות", order: 3 },
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeJs(value) {
      return String(value ?? "").replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    }

    function asArray(value) {
      return Array.isArray(value) ? value : [];
    }

    function hasText(value) {
      return value !== undefined && value !== null && String(value).trim() !== "";
    }

    function firstText(...values) {
      return values.find(hasText) ?? null;
    }

    function makeRequestId() {
      if (crypto && crypto.randomUUID) return crypto.randomUUID();
      return `req-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function includeRawSource() {
      return els.environment.value === "true";
    }

    function isAgentMode() {
      return state.inputMode === "agent";
    }

    function isStepDisabled(stepId) {
      return isAgentMode() && AGENT_DISABLED_STEPS.has(stepId);
    }

    function resetRunState() {
      state.flow = {};
      state.orchestratorSummary = null;
      state.displaySummary = null;
      state.errors = [];
      state.selectedProviderId = null;
      state.visibleCount = 10;
      state.jsonVisible = {};
      state.previewPanelOpen = false;
      state.explanationOpen = false;
      state.headerCollapsed = false;
    }

    function resetFullInput() {
      state.searchFileName = "";
      state.searchJsonText = "";
      state.searchJson = null;
      els.searchText.value = "";
      els.environment.value = "false";
    }

    function resetAgentInput() {
      state.agentFileName = "";
      state.agentJsonText = "";
      state.agentResponseJson = null;
    }

    function resetForMode(mode, selectedStep) {
      resetRunState();
      if (mode === "full") {
        resetFullInput();
        resetAgentInput();
      } else {
        resetFullInput();
        resetAgentInput();
      }
      state.selectedStep = selectedStep;
      els.jsonFile.value = "";
    }

    function validateAgentResponse(agentResponse) {
      if (!agentResponse || typeof agentResponse !== "object" || Array.isArray(agentResponse)) {
        return "תגובת Agent חייבת להיות אובייקט JSON";
      }
      if (!hasText(agentResponse.requestId)) return "מבנה תגובת Agent חייב לכלול requestId";
      if (!Array.isArray(agentResponse.hits)) return "מבנה תגובת Agent חסר hits[]";
      return "";
    }

    function parseAgentResponseText(value) {
      const parsed = value.trim() ? JSON.parse(value) : null;
      const validationError = validateAgentResponse(parsed);
      return { parsed, validationError };
    }

    function sourceFromHit(hit) {
      return hit && hit.source ? hit.source : {};
    }

    function getServiceGuideNode(searchJson) {
      return searchJson && searchJson.data && searchJson.data.service_guide ? searchJson.data.service_guide : null;
    }

    function extractHits(searchJson) {
      const serviceGuide = getServiceGuideNode(searchJson);
      return serviceGuide && Array.isArray(serviceGuide.hits) ? serviceGuide.hits : [];
    }

    function hasValidHitsPath(searchJson) {
      const serviceGuide = getServiceGuideNode(searchJson);
      return !!serviceGuide && Array.isArray(serviceGuide.hits);
    }

    function sourceTotalHits(searchJson) {
      const serviceGuide = getServiceGuideNode(searchJson);
      if (!serviceGuide || serviceGuide.total_hits === undefined || serviceGuide.total_hits === null || serviceGuide.total_hits === "") return null;
      const total = Number(serviceGuide.total_hits);
      return Number.isInteger(total) ? total : null;
    }

    function searchQueryId(searchJson) {
      return searchJson?.data?.search_query_id ?? searchJson?.searchQueryId ?? null;
    }

    function buildUiRequest() {
      return {
        query: els.searchText.value.trim(),
        page: 1,
        pageSize: 10,
        sort: 0,
        initiatorCode: INITIATOR_CODE,
      };
    }

    function buildAgentRequest(uiRequest) {
      return {
        requestId: state.flow.agentRequest?.requestId || makeRequestId(),
        query: uiRequest.query,
        page: uiRequest.page,
        pageSize: 50,
        sort: uiRequest.sort,
        initiatorCode: INITIATOR_CODE,
        options: {
          includeRawSource: includeRawSource(),
        },
      };
    }

    function resultIdFromSource(source) {
      return firstText(source.entity_id, source.service_provider_id, source.object_id);
    }

    function normalizeType10(code) {
      return String(code ?? "").trim().replace(/^0+/, "") === "10";
    }

    function mapRemarks(source) {
      const selected = asArray(source.remarks).find((item) => normalizeType10(item.remark_message_type_code) && hasText(item.remark_text));
      if (!selected) return [];
      return [{
        remarkMessageTypeCode: selected.remark_message_type_code ?? null,
        remarkSeqnr: selected.remark_seqnr ?? null,
        remarkLineNumber: selected.remark_line_number ?? null,
        remarkText: String(selected.remark_text).trim(),
      }];
    }

    function mapSchedules(source) {
      return asArray(source.schedule)
        .filter((item) => [1, 2, 15].includes(Number(item.schedule_type)))
        .map((item) => ({
          scheduleType: Number(item.schedule_type),
          scheduleDesc: item.schedule_desc ?? null,
          availabilityWeekDay: hasText(item.availability_week_day) ? Number(item.availability_week_day) : null,
          availabilityStartTime: item.availability_start_time ?? null,
          availabilityEndTime: item.availability_end_time ?? null,
          frequencyDesc: item.frequency_desc ?? null,
          availableMorning: item.available_morning ?? null,
          availableAfternoon: item.available_afternoon ?? null,
          availableEvening: item.available_evening ?? null,
        }));
    }

    function sourceLabel(source) {
      return firstText(source.service_provider_name, source.service_name, source.entity_id, source.service_provider_id, source.object_id) || "ללא שם";
    }

    function formatSourceValue(value) {
      return hasText(value) ? String(value).trim() : "null";
    }

    function remarkAnalysis(source) {
      const rows = asArray(source.remarks);
      const type10 = rows.filter((item) => normalizeType10(item.remark_message_type_code));
      const type10WithText = type10.filter((item) => hasText(item.remark_text));
      const selected = type10WithText[0] || null;
      return {
        sourceCount: rows.length,
        type10Count: type10.length,
        type10WithTextCount: type10WithText.length,
        selected,
        notType10Count: rows.length - type10.length,
        type10WithoutTextCount: type10.length - type10WithText.length,
        type10AfterSelectedCount: selected ? Math.max(0, type10WithText.length - 1) : 0,
      };
    }

    function scheduleRowText(row, index) {
      return `schedule ${index}: scheduleType=${formatSourceValue(row.schedule_type)}, day=${formatSourceValue(row.availability_week_day)}, start=${formatSourceValue(row.availability_start_time)}, end=${formatSourceValue(row.availability_end_time)}`;
    }

    function scheduleTypeSummary(type, rows) {
      const days = Array.from(new Set(rows
        .map((row) => row.availability_week_day)
        .filter(validWeekDay)
        .map(dayLabel)));
      return `scheduleType ${type} - ${scheduleMap[type].title}: ${rows.length} רשומות, ${days.length} ימים (${days.join(", ") || "לא נמצאו נתונים"})`;
    }

    function scheduleAnalysis(source, sourceRank) {
      const rows = asArray(source.schedule);
      const kept = rows.map((row, index) => ({ row, index })).filter(({ row }) => [1, 2, 15].includes(Number(row.schedule_type)));
      const filtered = rows.map((row, index) => ({ row, index })).filter(({ row }) => ![1, 2, 15].includes(Number(row.schedule_type)));
      const byType = [1, 2, 15].map((type) => scheduleTypeSummary(type, kept.filter(({ row }) => Number(row.schedule_type) === type).map(({ row }) => row)));
      const filteredDetails = filtered.map(({ row }) => `sourceRank ${sourceRank}: scheduleType=${formatSourceValue(row.schedule_type)}. נפסל כי אינו 1, 2 או 15.`);
      return {
        sourceCount: rows.length,
        keptCount: kept.length,
        filteredCount: filtered.length,
        byType,
        filteredDetails,
      };
    }

    function dateObjectForDisplay(date) {
      if (!date) return "null";
      return `${String(date.getDate()).padStart(2, "0")}/${String(date.getMonth() + 1).padStart(2, "0")}/${date.getFullYear()}`;
    }

    function dateTimeInIsrael(date = new Date()) {
      return new Intl.DateTimeFormat("he-IL", {
        timeZone: "Asia/Jerusalem",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      }).format(date);
    }

    function absenceAnalysis(source) {
      const today = todayInIsrael();
      const rows = asArray(source.absence);
      let invalidCount = 0;
      let pastCount = 0;
      let relevantCount = 0;
      rows.forEach((item) => {
        const start = parseSourceDate(item.absence_bdate);
        const end = parseSourceDate(item.absence_edate) || start;
        if (!start || !end) {
          invalidCount += 1;
        } else if (end < today) {
          pastCount += 1;
        } else {
          relevantCount += 1;
        }
      });
      return {
        sourceCount: rows.length,
        invalidCount,
        pastCount,
        relevantCount,
      };
    }

    function parseSourceDate(value) {
      if (!hasText(value)) return null;
      const text = String(value).trim();
      let day;
      let month;
      let year;
      const dotted = text.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      const sap = text.match(/^(\d{4})(\d{2})(\d{2})$/);
      if (dotted) {
        day = Number(dotted[1]); month = Number(dotted[2]); year = Number(dotted[3]);
      } else if (sap) {
        year = Number(sap[1]); month = Number(sap[2]); day = Number(sap[3]);
      } else {
        return null;
      }
      const date = new Date(year, month - 1, day);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function sameDateString(a, b) {
      return String(a ?? "").trim() === String(b ?? "").trim();
    }

    function todayInIsrael() {
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: "Asia/Jerusalem",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      }).formatToParts(new Date());
      const get = (type) => Number(parts.find((part) => part.type === type)?.value);
      return new Date(get("year"), get("month") - 1, get("day"));
    }

    function selectRelevantAbsence(source) {
      const today = todayInIsrael();
      const candidates = asArray(source.absence)
        .map((item, index) => {
          const start = parseSourceDate(item.absence_bdate);
          const end = parseSourceDate(item.absence_edate) || start;
          if (!start || !end || end < today) return null;
          return { item, start, end, index };
        })
        .filter(Boolean)
        .sort((a, b) => {
          const aCurrent = a.start <= today && a.end >= today ? 0 : 1;
          const bCurrent = b.start <= today && b.end >= today ? 0 : 1;
          return aCurrent - bCurrent || a.start - b.start || a.index - b.index;
        });
      return candidates[0]?.item || null;
    }

    function mapAbsences(source) {
      const absence = selectRelevantAbsence(source);
      if (!absence) return [];
      const mapped = {
        absenceBdate: absence.absence_bdate ?? null,
        absenceEdate: absence.absence_edate ?? null,
        absenceReasonDis: absence.absence_reason_dis ?? null,
      };
      if (absence.absence_reason_dis === true && hasText(absence.absence_reason)) {
        mapped.absenceReason = absence.absence_reason;
      }
      return [mapped];
    }

    function mapSubstitutes(source, selectedAbsences) {
      const absence = selectedAbsences[0];
      if (!absence) return [];
      const selected = asArray(source.substitute).find((item) =>
        sameDateString(item.sub_bdate, absence.absenceBdate) &&
        sameDateString(item.sub_edate, absence.absenceEdate)
      );
      if (!selected) return [];
      return [{
        subBdate: selected.sub_bdate ?? null,
        subEdate: selected.sub_edate ?? null,
        subName: selected.sub_name ?? null,
        subOtype: selected.sub_otype ?? null,
        subPernr: selected.sub_pernr ?? null,
        subRemark: selected.sub_remark ?? null,
      }];
    }

    function mapTreatAreaList(source) {
      return asArray(source.treat_area_list).map((item) => ({
        treatAreaCode: item.treat_area_code ?? null,
        treatArea: item.treat_area ?? null,
      }));
    }

    function mapLanguages(source) {
      return asArray(source.languages).map((item) => ({
        languageCode: item.language_code ?? null,
        language: item.language ?? null,
        languageDataType: item.language_data_type ?? null,
        seqnrLanguages: item.seqnr_languages ?? null,
      }));
    }

    function mapProfArea(source) {
      return asArray(source.prof_area).map((item) => ({
        professAreaCode: item.profess_area_code ?? null,
        objectType: item.object_type ?? null,
        personNumber: item.person_number ?? null,
        professAreaDesc: item.profess_area_desc ?? null,
        objectId: item.object_id ?? null,
      }));
    }

    function coverageCodeFromTreat(item) {
      if (hasText(item.coverage_code)) return item.coverage_code;
      if (hasText(item.coverageCode)) return item.coverageCode;
      if (item.treat_is_personal === true) return "COMPLEMENTARY";
      if (item.treat_is_personal === false) return "BASKET";
      return null;
    }

    function mapServTreats(source) {
      return asArray(source.serv_treats).map((item) => ({
        cptCode: item.cpt_code ?? null,
        sgTreatName: item.sg_treat_name ?? null,
        cellTreatName: item.cell_treat_name ?? null,
        hebrewText: item.hebrew_text ?? null,
        hebrewServiceName: item.hebrew_service_name ?? null,
        cptPubtName: item.cpt_pubt_name ?? null,
        cptPubt: item.cpt_pubt ?? null,
        coverageCode: coverageCodeFromTreat(item),
      }));
    }

    function mapContacts(source) {
      return asArray(source.contact).map((item) => ({
        chapterCode: item.chapter_code ?? null,
        advertiseChannel: item.advertise_channel ?? null,
        contactType: item.contact_type ?? null,
        contactDesc: item.contact_desc ?? null,
        objectType: item.object_type ?? null,
        personNumber: item.person_number ?? null,
        contactDetail: item.contact_detail ?? null,
        contactFull: item.contact_full ?? null,
        objectId: item.object_id ?? null,
        contactCode: item.contact_code ?? null,
      }));
    }

    function mapResumes(source) {
      return asArray(source.resume).map((item) => ({
        resumeCode: item.resume_code ?? null,
        resumeTopic: item.resume_topic ?? null,
        resumeTitle1: item.resume_title1 ?? null,
        resumeTitle1Contents: item.resume_title1_contents ?? null,
        resumeTitle2: item.resume_title2 ?? null,
        resumeTitle2Contents: item.resume_title2_contents ?? null,
        resumeTitle3: item.resume_title3 ?? null,
        resumeTitle3Contents: item.resume_title3_contents ?? null,
      }));
    }

    function mapFacilServices(source) {
      return asArray(source.facil_services).map((item) => ({
        facilServiceName: item.facil_service_name ?? null,
        serviceOtype: item.service_otype ?? null,
        facilServicesTitle: item.facil_services_title ?? null,
        serviceType: hasText(item.service_type) ? Number(item.service_type) : null,
        servicePernr: item.service_pernr ?? null,
        treatAreaString: item.treat_area_string ?? null,
        serviceObjid: item.service_objid ?? null,
      }));
    }

    function membershipStatusCodeFromSource(source) {
      if (hasText(source.membership_status_code)) return source.membership_status_code;
      if (hasText(source.membershipStatusCode)) return source.membershipStatusCode;
      if (source.limited_memb_icon === true) return "LIMITED";
      return null;
    }

    function mapAgentHit(rawHit, source, sourceRank, rank, agentRequest) {
      const absences = mapAbsences(source);
      return {
        resultId: resultIdFromSource(source),
        rank,
        sourceRank,
        score: rawHit.score ?? null,
        originalScore: rawHit.original_score ?? null,
        timestamp: source["@timestamp"] ?? null,
        entityId: source.entity_id ?? null,
        objectType: source.object_type ?? null,
        objectId: source.object_id ?? null,
        employeeNumber: source.employee_number ?? null,
        serviceProviderId: source.service_provider_id ?? null,
        facilityCode: source.facility_code ?? null,
        occupationCode: source.occupation_code ?? null,
        chapterCode: source.chapter_code ?? null,
        chapterName: source.chapter_name ?? null,
        chapterNameUrl: source.chapter_name_url ?? null,
        serviceProviderName: source.service_provider_name ?? null,
        serviceProviderNameUrl: source.service_provider_name_url ?? null,
        serviceName: source.service_name ?? null,
        serviceProviderGender: source.service_provider_gender ?? null,
        serviceNameDoc: source.service_name_doc ?? null,
        cityCode: source.city_code ?? null,
        cityName: source.city_name ?? null,
        fullAddress: source.full_address ?? null,
        streetCode: source.street_code ?? null,
        streetName: source.street_name ?? null,
        houseNumber: source.house_number ?? null,
        url: source.url ?? null,
        accessibility: source.accessibility ?? null,
        accessibilityBool: source.accessibility_bool ?? null,
        specializationList: asArray(source.specialization_list),
        treatAreaString: source.treat_area_string ?? null,
        languageList: source.language_list ?? null,
        professAreaDescList: source.profess_area_desc_list ?? null,
        sgTreatNameList: source.sg_treat_name_list ?? null,
        cellTreatNameList: source.cell_treat_name_list ?? null,
        referringText: source.referring_text ?? null,
        licenseNumber: source.license_number ?? null,
        shabanType: source.shaban_type ?? null,
        shabanInd: source.shaban_ind ?? null,
        mlhInd: source.mlh_ind ?? null,
        membershipStatusCode: membershipStatusCodeFromSource(source),
        homeClinicIcon: source.home_clinic_icon ?? null,
        sharedClinicIcon: source.shared_clinic_icon ?? null,
        absenceIcon: source.absence_icon ?? null,
        usIcon: source.us_icon ?? null,
        pharmacyIcon: source.pharmacy_icon ?? null,
        substituteInd: source.substitute_ind ?? null,
        category: source.category ?? null,
        subCategory: source.sub_category ?? null,
        subBegda: source.sub_begda ?? null,
        initiatorCode: source.initiator_code ?? null,
        treatAreaList: mapTreatAreaList(source),
        languages: mapLanguages(source),
        profArea: mapProfArea(source),
        servTreats: mapServTreats(source),
        contacts: mapContacts(source),
        remarks: mapRemarks(source),
        resumes: mapResumes(source),
        schedules: mapSchedules(source),
        facilServices: mapFacilServices(source),
        absences,
        substitutes: mapSubstitutes(source, absences),
        filter: { filterFields: asArray(source.filter?.filter_fields) },
        rawSource: agentRequest.options.includeRawSource ? source : null,
      };
    }

    function buildAgentResponse(searchJson, agentRequest) {
      const rawHits = extractHits(searchJson);
      const sourceEntries = rawHits.map((hit, sourceRank) => ({ hit, source: sourceFromHit(hit), sourceRank }));
      const initiatorMatchedEntries = sourceEntries.filter((entry) => String(entry.source.initiator_code ?? "") === INITIATOR_CODE);
      const initiatorRejectedEntries = sourceEntries.filter((entry) => String(entry.source.initiator_code ?? "") !== INITIATOR_CODE);
      const matched = initiatorMatchedEntries.filter((entry) => hasText(resultIdFromSource(entry.source)));
      const rejectedWithoutResultIdEntries = initiatorMatchedEntries.filter((entry) => !hasText(resultIdFromSource(entry.source)));
      const summary = {
        sourceHits: rawHits.length,
        initiatorMatched: initiatorMatchedEntries.length,
        rejectedByInitiator: initiatorRejectedEntries.length,
        rejectedWithoutResultId: rejectedWithoutResultIdEntries.length,
        finalHits: 0,
        operations: [],
      };

      const hits = matched.map((entry, rank) => mapAgentHit(entry.hit, entry.source, entry.sourceRank, rank, agentRequest));
      summary.finalHits = hits.length;
      const fallbackRows = matched.map((entry) => {
        const source = entry.source;
        const fallbackField = hasText(source.entity_id) ? "entityId" : (hasText(source.service_provider_id) ? "serviceProviderId" : "objectId");
        return {
          sourceRank: entry.sourceRank,
          resultId: resultIdFromSource(source),
          fallbackField,
          name: firstText(source.service_provider_name, source.service_name) || "",
        };
      });
      const fallbackCounts = fallbackRows.reduce((acc, row) => {
        acc[row.fallbackField] = (acc[row.fallbackField] || 0) + 1;
        return acc;
      }, {});
      const rankRows = hits.map((hit) => `${hit.resultId}: sourceRank=${hit.sourceRank}, rank=${hit.rank}`);
      const remarkRows = matched.map((entry) => {
        const hit = hits.find((item) => item.sourceRank === entry.sourceRank);
        const analysis = remarkAnalysis(entry.source);
        const selected = analysis.selected;
        const selectedText = selected
          ? `נבחרה הערה: remarkMessageTypeCode=${formatSourceValue(selected.remark_message_type_code)}, remarkSeqnr=${formatSourceValue(selected.remark_seqnr)}, remarkLineNumber=${formatSourceValue(selected.remark_line_number)}, remarkText="${String(selected.remark_text).trim()}"`
          : "לא נמצאה הערה מסוג 10 עם טקסט. remarks[] הוחזר ריק.";
        return `${hit?.resultId || `sourceRank ${entry.sourceRank}`} (${sourceLabel(entry.source)}): נבדקו ${analysis.sourceCount}; סוג 10=${analysis.type10Count}; סוג 10 עם טקסט=${analysis.type10WithTextCount}; ${selectedText}; לא הוחזרו: לא סוג 10=${analysis.notType10Count}, סוג 10 ללא טקסט=${analysis.type10WithoutTextCount}, אחרי ההערה שנבחרה=${analysis.type10AfterSelectedCount}`;
      });
      const sourceRemarksCount = matched.reduce((sum, entry) => sum + remarkAnalysis(entry.source).sourceCount, 0);
      const selectedRemarksCount = hits.reduce((sum, hit) => sum + hit.remarks.length, 0);
      const scheduleAnalyses = matched.map((entry) => ({ entry, analysis: scheduleAnalysis(entry.source, entry.sourceRank) }));
      const sourceSchedulesCount = scheduleAnalyses.reduce((sum, item) => sum + item.analysis.sourceCount, 0);
      const selectedSchedulesCount = scheduleAnalyses.reduce((sum, item) => sum + item.analysis.keptCount, 0);
      const filteredSchedulesCount = scheduleAnalyses.reduce((sum, item) => sum + item.analysis.filteredCount, 0);
      const scheduleTypeRows = [1, 2, 15].map((type) => {
        const rows = matched.flatMap((entry) => asArray(entry.source.schedule).filter((row) => Number(row.schedule_type) === type));
        return scheduleTypeSummary(type, rows);
      });
      const filteredScheduleRows = scheduleAnalyses.flatMap((item) => item.analysis.filteredDetails);
      const membershipCounts = hits.reduce((acc, hit) => {
        const key = hit.membershipStatusCode || "null";
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
      const coverageCounts = hits.flatMap((hit) => hit.servTreats).reduce((acc, item) => {
        const key = item.coverageCode || "null";
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
      const selectedAbsencesCount = hits.reduce((sum, hit) => sum + hit.absences.length, 0);
      const absenceAnalyses = matched.map((entry) => ({ entry, analysis: absenceAnalysis(entry.source), hit: hits.find((item) => item.sourceRank === entry.sourceRank) }));
      const sourceAbsencesCount = absenceAnalyses.reduce((sum, item) => sum + item.analysis.sourceCount, 0);
      const invalidAbsencesCount = absenceAnalyses.reduce((sum, item) => sum + item.analysis.invalidCount, 0);
      const pastAbsencesCount = absenceAnalyses.reduce((sum, item) => sum + item.analysis.pastCount, 0);
      const relevantAbsencesCount = absenceAnalyses.reduce((sum, item) => sum + item.analysis.relevantCount, 0);
      const selectedSubstitutesCount = hits.reduce((sum, hit) => sum + hit.substitutes.length, 0);
      const sourceSubstitutesCount = matched.reduce((sum, entry) => sum + asArray(entry.source.substitute).length, 0);
      const calculationTime = dateTimeInIsrael();
      const comparisonDate = dateObjectForDisplay(todayInIsrael());
      summary.calculationTime = calculationTime;
      summary.comparisonDate = comparisonDate;
      const formatCountMap = (map) => Object.entries(map).map(([key, value]) => `${key}: ${value}`).join(", ") || "לא נמצאו נתונים";
      const rejectedInitiatorDetails = initiatorRejectedEntries.map((entry) => `sourceRank ${entry.sourceRank}: initiatorCode=${entry.source.initiator_code ?? "null"}`);
      const rejectedResultDetails = rejectedWithoutResultIdEntries.map((entry) => `sourceRank ${entry.sourceRank}: ללא entityId/serviceProviderId/objectId`);
      const absenceRows = absenceAnalyses.map(({ entry, analysis, hit }) => {
        const absence = asArray(hit?.absences)[0];
        if (!absence) {
          return `${hit?.resultId || `sourceRank ${entry.sourceRank}`} (${sourceLabel(entry.source)}): נבדקו ${analysis.sourceCount}; לא תקינות=${analysis.invalidCount}; ישנות=${analysis.pastCount}; רלוונטיות=${analysis.relevantCount}; absences[] הוחזר ריק`;
        }
        return `${hit.resultId} (${sourceLabel(entry.source)}): נבדקו ${analysis.sourceCount}; לא תקינות=${analysis.invalidCount}; ישנות=${analysis.pastCount}; רלוונטיות=${analysis.relevantCount}; הוחזר absenceBdate=${formatSourceValue(absence.absenceBdate)}, absenceEdate=${formatSourceValue(absence.absenceEdate)}, absenceReasonDis=${formatSourceValue(absence.absenceReasonDis)}, absenceReason=${formatSourceValue(absence.absenceReason)}`;
      });
      const substituteRows = hits.map((hit) => {
        const substitute = asArray(hit.substitutes)[0];
        const absence = asArray(hit.absences)[0];
        if (!absence) return `${hit.resultId}: לא חזרה היעדרות רלוונטית ולכן substitutes[] הוחזר ריק`;
        if (!substitute) return `${hit.resultId}: נבדקו ממלאי מקום מול טווח ${absence.absenceBdate}-${absence.absenceEdate}; לא נמצא ממלא מקום תואם; substitutes[] הוחזר ריק`;
        return `${hit.resultId}: נבחר ממלא מקום עם אותו טווח תאריכים; subBdate=${formatSourceValue(substitute.subBdate)}, subEdate=${formatSourceValue(substitute.subEdate)}, subName=${formatSourceValue(substitute.subName)}, subOtype=${formatSourceValue(substitute.subOtype)}, subPernr=${formatSourceValue(substitute.subPernr)}, subRemark=${formatSourceValue(substitute.subRemark)}`;
      });
      summary.operations = [
        {
          title: "סינון תוצאות",
          value: `${summary.sourceHits} תוצאות התקבלו; ${summary.initiatorMatched} התאימו ל-initiatorCode=001; ${summary.rejectedByInitiator} נפסלו בגלל initiatorCode אחר; ${summary.rejectedWithoutResultId} נפסלו ללא resultId; totalHits=${hits.length}; sourceTotalHits=${String(sourceTotalHits(searchJson))}`,
          details: rejectedInitiatorDetails,
        },
        {
          title: "בדיקת מזהה תוצאה",
          value: `${summary.rejectedWithoutResultId} תוצאות נפסלו ללא entityId/serviceProviderId/objectId`,
          details: rejectedResultDetails,
        },
        {
          title: "יצירת מזהה תוצאה",
          value: `entityId: ${fallbackCounts.entityId || 0}, serviceProviderId: ${fallbackCounts.serviceProviderId || 0}, objectId: ${fallbackCounts.objectId || 0}`,
          details: fallbackRows.map((row) => `sourceRank ${row.sourceRank}: ${row.fallbackField} → ${row.resultId}${row.name ? ` (${row.name})` : ""}`),
        },
        {
          title: "חישוב דירוג",
          value: `${hits.length} תוצאות שמרו sourceRank מקורי וקיבלו rank חדש אחרי הסינון`,
          details: rankRows,
        },
        {
          title: "קביעת סטטוס קבלת חברים",
          value: formatCountMap(membershipCounts),
          details: hits.map((hit) => `${hit.resultId}: membershipStatusCode → ${hit.membershipStatusCode || "null"}`),
        },
        {
          title: "קביעת סוג כיסוי",
          value: formatCountMap(coverageCounts),
          details: hits.flatMap((hit) => hit.servTreats.map((item, index) => `${hit.resultId} טיפול ${index + 1}: coverageCode → ${item.coverageCode || "null"}`)),
        },
        {
          title: "בחירת הערה להצגה",
          value: `${selectedRemarksCount} הערות נבחרו מתוך ${sourceRemarksCount}; נשמרת רק ההערה הראשונה מסוג 10 שיש לה טקסט`,
          details: remarkRows,
        },
        {
          title: "בחירת שעות פעילות",
          value: `${selectedSchedulesCount} רשומות schedules נשמרו מתוך ${sourceSchedulesCount}; ${filteredSchedulesCount} סוננו בגלל scheduleType שאינו 1/2/15`,
          details: [...scheduleTypeRows, ...(filteredScheduleRows.length ? filteredScheduleRows : ["כל רשומות schedules עברו את הסינון."])],
        },
        {
          title: "בחירת היעדרות להצגה",
          value: `${selectedAbsencesCount} היעדרויות נבחרו מתוך ${sourceAbsencesCount}; מועד חישוב: ${calculationTime}; תאריך להשוואה: ${comparisonDate}`,
          details: [
            `מועד החישוב: ${calculationTime} Asia/Jerusalem`,
            `השוואת היעדרויות לפי תאריך בלבד: ${comparisonDate}`,
            `לא תקינות=${invalidAbsencesCount}, ישנות=${pastAbsencesCount}, רלוונטיות=${relevantAbsencesCount}`,
            ...absenceRows,
          ],
        },
        {
          title: "בחירת ממלא מקום",
          value: `${selectedSubstitutesCount} ממלאי מקום נבחרו מתוך ${sourceSubstitutesCount}; נבחר רק ממלא מקום עם אותו טווח תאריכים כמו ההיעדרות`,
          details: substituteRows,
        },
      ];
      state.orchestratorSummary = summary;

      return {
        requestId: agentRequest.requestId,
        status: "success",
        sourceSystem: "search_engine",
        searchQueryId: searchQueryId(searchJson),
        isProcessed: true,
        totalHits: hits.length,
        sourceTotalHits: sourceTotalHits(searchJson),
        hits,
      };
    }

    function avatarType(gender) {
      const value = String(gender ?? "").trim().toLowerCase();
      if (["גבר", "זכר", "male", "m"].includes(value)) return "doctorMale";
      if (["אישה", "נקבה", "female", "f"].includes(value)) return "doctorFemale";
      return "doctorDefault";
    }

    function specializationText(hit) {
      return asArray(hit.specializationList).filter(hasText).join(", ") || hit.serviceNameDoc || "";
    }

    function professionalizationText(hit) {
      const fromAreas = asArray(hit.treatAreaList).map((item) => item.treatArea).filter(hasText).join(", ");
      const fromProf = asArray(hit.profArea).map((item) => item.professAreaDesc).filter(hasText).join(", ");
      return fromAreas || hit.treatAreaString || fromProf || "";
    }

    function languagesText(hit) {
      const fromArray = asArray(hit.languages)
        .slice()
        .sort((a, b) => Number(a.seqnrLanguages || 0) - Number(b.seqnrLanguages || 0))
        .map((item) => item.language)
        .filter(hasText)
        .join(", ");
      return fromArray || String(hit.languageList || "").split(",").map((item) => item.trim()).filter(Boolean).join(", ");
    }

    function subtitleLines(hit) {
      return [
        { type: "specialization", text: specializationText(hit) },
        { type: "professionalization", text: professionalizationText(hit) },
        { type: "languages", text: languagesText(hit) },
      ].filter((line) => hasText(line.text));
    }

    function shabanChips(hit) {
      const type = Number(hit.shabanType);
      const chips = [];
      if (type === 1 || type === 3) chips.push({ type: "shabanConsultation", text: "ייעוץ בתשלום נוסף" });
      if (type === 2 || type === 3) chips.push({ type: "shabanTreatments", text: "ניתוחים וטיפולים בתשלום נוסף" });
      return chips;
    }

    function collapsedChips(hit) {
      const chips = [];
      if (hit.accessibilityBool === true) chips.push({ type: "accessibility", text: hit.accessibility || "נגיש" });
      chips.push(...shabanChips(hit));
      if (hit.membershipStatusCode === "LIMITED") chips.push({ type: "limitedMembership", text: "לא מקבל חברים חדשים" });
      return chips;
    }

    function remark10Messages(hit) {
      return asArray(hit.remarks).filter((item) => hasText(item.remarkText)).map((item) => ({ type: "remark10", text: item.remarkText }));
    }

    function formatDateForDisplay(value) {
      const date = parseSourceDate(value);
      if (!date) return "";
      return `${String(date.getDate()).padStart(2, "0")}/${String(date.getMonth() + 1).padStart(2, "0")}/${date.getFullYear()}`;
    }

    function absenceText(hit, absence, includeSubstitute = true) {
      const start = formatDateForDisplay(absence.absenceBdate);
      const end = formatDateForDisplay(absence.absenceEdate);
      const female = avatarType(hit.serviceProviderGender) === "doctorFemale";
      const who = female ? "הרופאה לא נמצאת" : "הרופא לא נמצא";
      if (!start) return "";
      let text = !end || start === end ? `${who} בתאריך: ${start}` : `${who} בין התאריכים: ${start} עד ${end}`;
      const sub = includeSubstitute ? asArray(hit.substitutes)[0] : null;
      if (sub && hasText(sub.subName)) {
        text += `, ממלא מקום: ${sub.subName}`;
        if (hasText(sub.subRemark)) text += ` - ${sub.subRemark}`;
      }
      return text;
    }

    function absenceMessages(hit) {
      return asArray(hit.absences).map((absence) => ({ type: "absence", text: absenceText(hit, absence) })).filter((item) => hasText(item.text));
    }

    function buildAddressSection(hit) {
      const messages = [];
      if (hit.accessibilityBool === true) messages.push({ type: "accessibility", text: hit.accessibility || "נגיש" });
      remark10Messages(hit).forEach((message) => messages.push(message));
      if (!hasText(hit.cityName) && !messages.length) return null;
      const section = { title: "כתובת" };
      if (hasText(hit.cityName)) section.city = hit.cityName;
      if (messages.length) section.messages = messages;
      return section;
    }

    function buildAppointmentsSection(hit) {
      if (hit.membershipStatusCode !== "LIMITED") return null;
      return { title: "זימון תורים", messages: [{ type: "limitedMembership", text: "לא מקבל חברים חדשים" }] };
    }

    function contactTypeByRow(row) {
      const code = String(row.contactCode ?? "").trim().padStart(2, "0");
      const byCode = contactMap[code];
      if (byCode) return byCode;
      return { type: "other", label: row.contactDesc || "", order: 999 };
    }

    function buildContactsSection(hit) {
      const seen = new Set();
      const items = asArray(hit.contacts).map((row) => {
        const text = hasText(row.contactDetail) ? String(row.contactDetail).trim() : "";
        if (!hasText(text)) return null;
        const meta = contactTypeByRow(row);
        if (!hasText(meta.label)) return null;
        const key = `${meta.type}:${text}`;
        if (seen.has(key)) return null;
        seen.add(key);
        const item = { type: meta.type, label: meta.label, text };
        if (meta.actionType === "copy") {
          item.actionType = "copy";
          item.actionValue = text;
        }
        if (meta.actionType === "mailto") {
          item.actionType = "mailto";
          item.actionUri = `mailto:${text}`;
        }
        item.order = meta.order;
        return item;
      }).filter(Boolean).sort((a, b) => a.order - b.order).map(({ order, ...item }) => item);
      if (!items.length) return null;
      const section = { title: "אמצעי קשר", items };
      if (items.some((item) => item.type === "email")) {
        section.messages = [{ type: "emailDisclaimer", text: "לורם איפסום דולור סיט אמט, קונסקטורר אדיפיסינג אלית. סד אאוסמוד טמפור אינסידידונט אוט לבורה אה דולורה מגנה אליקווה." }];
      }
      return section;
    }

    function scheduleNotes(value) {
      const text = String(value ?? "").trim();
      return text && text !== "שבועית" ? text : "";
    }

    function scheduleDisplayRow(row) {
      if (!scheduleMap[Number(row.scheduleType)] || !validWeekDay(row.availabilityWeekDay)) return null;
      const start = normalizeTime(row.availabilityStartTime);
      const end = normalizeTime(row.availabilityEndTime);
      const hasRawStart = hasText(row.availabilityStartTime);
      const hasRawEnd = hasText(row.availabilityEndTime);
      const day = Number(row.availabilityWeekDay);
      if (start && end) {
        return {
          scheduleType: Number(row.scheduleType),
          availabilityWeekDay: day,
          sortStart: start,
          hoursText: `${start} עד ${end}`,
          notes: scheduleNotes(row.frequencyDesc),
        };
      }
      if (!hasRawStart && !hasRawEnd && day !== 7) {
        return {
          scheduleType: Number(row.scheduleType),
          availabilityWeekDay: day,
          sortStart: "99:99",
          hoursText: "סגור",
          notes: "",
        };
      }
      return null;
    }

    function sameSchedulePattern(a, b) {
      return a.hoursText === b.hoursText && (a.notes || "") === (b.notes || "");
    }

    function scheduleRowFromCluster(cluster) {
      const first = cluster[0];
      const last = cluster[cluster.length - 1];
      const dayText = cluster.length === 1
        ? dayLabel(first.availabilityWeekDay)
        : `${dayLabel(first.availabilityWeekDay)} עד ${dayLabel(last.availabilityWeekDay)}`;
      const row = { dayText, hoursText: first.hoursText };
      if (hasText(first.notes)) row.notes = first.notes;
      return row;
    }

    function mergeScheduleRows(rows) {
      const merged = [];
      rows.forEach((row) => {
        const lastCluster = merged[merged.length - 1];
        const previous = lastCluster && lastCluster[lastCluster.length - 1];
        const isConsecutive = previous && Number(row.availabilityWeekDay) === Number(previous.availabilityWeekDay) + 1;
        if (previous && isConsecutive && sameSchedulePattern(previous, row)) {
          lastCluster.push(row);
        } else {
          merged.push([row]);
        }
      });
      return merged.map(scheduleRowFromCluster);
    }

    function closedScheduleRow(scheduleType, day) {
      return {
        scheduleType: Number(scheduleType),
        availabilityWeekDay: Number(day),
        sortStart: "99:99",
        hoursText: "סגור",
        notes: "",
      };
    }

    function scheduleRowsForGroup(sourceRows) {
      const displayRows = sourceRows.map(scheduleDisplayRow).filter(Boolean);
      if (!displayRows.length) return displayRows;
      const coveredDays = new Set(displayRows.map((row) => Number(row.availabilityWeekDay)));
      const sourceDays = new Set(sourceRows
        .map((row) => Number(row.availabilityWeekDay))
        .filter((day) => Number.isInteger(day) && day >= 1 && day <= 6));
      const scheduleType = Number(sourceRows[0].scheduleType);
      for (let day = 1; day <= 6; day += 1) {
        if (!coveredDays.has(day) && !sourceDays.has(day)) {
          displayRows.push(closedScheduleRow(scheduleType, day));
        }
      }
      return displayRows.sort((a, b) => Number(a.availabilityWeekDay) - Number(b.availabilityWeekDay) || String(a.sortStart).localeCompare(String(b.sortStart)));
    }

    function buildScheduleSection(hit) {
      const sourceGroups = asArray(hit.schedules).reduce((acc, row) => {
        if (!scheduleMap[Number(row.scheduleType)] || !validWeekDay(row.availabilityWeekDay)) return acc;
        acc[Number(row.scheduleType)] = acc[Number(row.scheduleType)] || [];
        acc[Number(row.scheduleType)].push(row);
        return acc;
      }, {});
      const groups = Object.entries(sourceGroups).map(([scheduleType, sourceRows]) => {
        const meta = scheduleMap[Number(scheduleType)];
        return {
          type: meta.type,
          title: meta.title,
          order: meta.order,
          rows: scheduleRowsForGroup(sourceRows),
        };
      }).filter((group) => group.rows.length).sort((a, b) => a.order - b.order).map(({ order, ...group }) => ({
        ...group,
        rows: mergeScheduleRows(group.rows),
      }));
      return groups.length ? { title: "שעות פעילות", groups } : null;
    }

    function dayLabel(value) {
      return ({ 1: "א׳", 2: "ב׳", 3: "ג׳", 4: "ד׳", 5: "ה׳", 6: "ו׳", 7: "ש׳" })[Number(value)] || String(value ?? "");
    }

    function validWeekDay(value) {
      const day = Number(value);
      return Number.isInteger(day) && day >= 1 && day <= 7;
    }

    function normalizeTime(value) {
      if (!hasText(value)) return "";
      const match = String(value).trim().match(/^(\d{1,2}):(\d{2})(?::\d{2})?$/);
      if (!match) return "";
      const hour = Number(match[1]);
      const minute = Number(match[2]);
      if (hour < 0 || hour > 23 || minute < 0 || minute > 59) return "";
      return `${String(hour).padStart(2, "0")}:${String(minute).padStart(2, "0")}`;
    }

    function cleanServiceText(text, code) {
      const raw = String(text || "").trim();
      if (!code) return raw;
      return raw
        .replace(String(code), "")
        .replace(/^[\s\-:]+/, "")
        .replace(/[\s\-:]+$/, "")
        .trim() || raw;
    }

    function extractServiceCode(text) {
      const match = String(text || "").match(/\b\d{3,}\b/);
      return match ? match[0] : "";
    }

    function buildServicesSection(hit) {
      const items = asArray(hit.servTreats).map((row) => {
        const text = firstText(row.sgTreatName, row.cellTreatName, row.hebrewText, row.hebrewServiceName);
        const code = firstText(row.cptCode, extractServiceCode(text));
        if (!hasText(text)) return null;
        const hasGroupTitle = hasText(row.cptPubtName);
        return {
          groupKey: hasText(row.cptPubt) ? row.cptPubt : "services",
          groupTitle: hasGroupTitle ? row.cptPubtName : "טיפולים נוספים",
          groupTitleMissing: !hasGroupTitle,
          text: hasText(text) ? cleanServiceText(text, code) : String(code || ""),
          coverageText: row.coverageCode === "COMPLEMENTARY" ? "משלים" : "בסל",
        };
      }).filter(Boolean);
      if (!items.length) return null;
      const groupsMap = {};
      items.forEach((item) => {
        const key = item.groupKey;
        groupsMap[key] = groupsMap[key] || { title: item.groupTitle, titleMissing: item.groupTitleMissing, items: [] };
        if (hasText(item.groupTitle) && !item.groupTitleMissing) {
          groupsMap[key].title = item.groupTitle;
          groupsMap[key].titleMissing = false;
        }
        const { groupKey, groupTitle, groupTitleMissing, ...clean } = item;
        groupsMap[key].items.push(clean);
      });
      const groups = Object.values(groupsMap)
        .sort((a, b) => Number(a.titleMissing) - Number(b.titleMissing))
        .map(({ titleMissing, ...group }) => group);
      return { title: "ניתוחים וטיפולים", groups };
    }

    function buildAbsencesSection(hit) {
      const items = asArray(hit.absences).map((absence) => {
        const item = { text: absenceText(hit, absence) };
        if (hasText(absence.absenceReason)) item.reason = absence.absenceReason;
        return item;
      }).filter((item) => hasText(item.text));
      return items.length ? { title: "היעדרויות וממלאי מקום", items } : null;
    }

    function buildDisplayResult(hit) {
      const title = firstText(hit.serviceProviderName, hit.serviceName) || "";
      if (!hasText(title)) return null;
      const avatar = avatarType(hit.serviceProviderGender);
      const subtitles = subtitleLines(hit);
      const collapsedMessages = [...remark10Messages(hit), ...absenceMessages(hit)];
      const sections = {};
      const address = buildAddressSection(hit);
      const appointments = buildAppointmentsSection(hit);
      const contacts = buildContactsSection(hit);
      const schedule = buildScheduleSection(hit);
      const services = buildServicesSection(hit);
      const absences = buildAbsencesSection(hit);
      if (address) sections.address = address;
      if (appointments) sections.appointments = appointments;
      if (contacts) sections.contacts = contacts;
      if (schedule) sections.schedule = schedule;
      if (services) sections.services = services;
      if (absences) sections.absences = absences;
      const collapsed = {
        title,
        avatarType: avatar,
      };
      if (subtitles.length) collapsed.subtitleLines = subtitles;
      const chips = collapsedChips(hit);
      if (chips.length) collapsed.chips = chips;
      if (collapsedMessages.length) collapsed.messages = collapsedMessages;
      if (hasText(hit.cityName)) collapsed.locationText = hit.cityName;
      const header = {
        title,
        avatarType: avatar,
      };
      if (subtitles.length) header.subtitleLines = subtitles;
      const headerChips = shabanChips(hit);
      if (headerChips.length) header.chips = headerChips;
      const providerDetails = {
        resultId: hit.resultId,
        header,
      };
      if (hasText(hit.cityName)) providerDetails.locationText = hit.cityName;
      if (Object.keys(sections).length) providerDetails.sections = sections;
      return {
        result: {
          resultId: hit.resultId,
          collapsedCard: collapsed,
          navigation: {
            type: "providerDetails",
            targetId: hit.resultId,
          },
        },
        providerDetails,
      };
    }

    function countSectionRows(section) {
      if (!section) return 0;
      if (section.items) return asArray(section.items).length;
      if (section.messages) return asArray(section.messages).length + (section.city ? 1 : 0);
      if (section.groups) {
        return asArray(section.groups).reduce((sum, group) => sum + asArray(group.rows || group.items).length, 0);
      }
      return 0;
    }

    function detail(resultId, text) {
      return `${resultId}: ${text}`;
    }

    function chosenField(hit, fields) {
      const found = fields.find((field) => hasText(hit[field.key]));
      return found ? `${found.label}="${hit[found.key]}"` : "לא נמצא מקור נתונים";
    }

    function subtitleDecision(hit) {
      const specialization = specializationText(hit);
      const professionalization = professionalizationText(hit);
      const languages = languagesText(hit);
      return [
        `specialization: ${specialization || "הושמט כי אין מקור"}`,
        `professionalization: ${professionalization || "הושמט כי אין מקור"}`,
        `languages: ${languages || "הושמט כי אין מקור"}`,
      ].join(" | ");
    }

    function chipDecision(hit) {
      const decisions = [];
      decisions.push(hit.accessibilityBool === true ? `accessibility -> "${hit.accessibility || "נגיש"}"` : "accessibility הושמט כי accessibilityBool אינו true");
      decisions.push(`shabanType=${hit.shabanType ?? "null"} -> ${shabanChips(hit).map((chip) => chip.text).join(" + ") || "ללא chip"}`);
      decisions.push(hit.membershipStatusCode === "LIMITED" ? "membershipStatusCode=LIMITED -> לא מקבל חברים חדשים" : "לא נוצר chip הגבלת חברים");
      return decisions.join(" | ");
    }

    function contactDecision(hit, result) {
      const details = result.providerDetails;
      const items = asArray(details.sections?.contacts?.items);
      const displayTexts = items.map((item) => `${item.type}:${item.text}`).join(", ") || "לא נמצאו נתונים";
      const rejected = asArray(hit.contacts).length - items.length;
      const disclaimer = asArray(details.sections?.contacts?.messages).some((message) => message.type === "emailDisclaimer");
      return `נלקח רק contactDetail לאחר trim; dedup לפי type+text; מיון לפי phone, appointments, fax, mobile, email, other. display=${displayTexts}; rejectedOrDedup=${Math.max(0, rejected)}; emailDisclaimer=${disclaimer ? "כן" : "לא"}`;
    }

    function scheduleDecision(hit, result) {
      const rows = asArray(hit.schedules);
      const groupedRows = Object.values(rows.reduce((acc, row) => {
        if (!scheduleMap[Number(row.scheduleType)] || !validWeekDay(row.availabilityWeekDay)) return acc;
        acc[Number(row.scheduleType)] = acc[Number(row.scheduleType)] || [];
        acc[Number(row.scheduleType)].push(row);
        return acc;
      }, {}));
      const validRows = groupedRows.flatMap(scheduleRowsForGroup);
      const details = result.providerDetails;
      const groups = asArray(details.sections?.schedule?.groups);
      const groupText = groups.map((group) => `${group.type}:${asArray(group.rows).map((row) => `${row.dayText} ${row.hoursText}${row.notes ? ` (${row.notes})` : ""}`).join("; ")}`).join(" | ") || "לא נמצאו נתונים";
      return `שעות פעילות נבנות רק מרשומות עם scheduleType ממופה ויום בטווח 1-7. שעות תקינות מוצגות בפורמט HH:mm עד HH:mm. אם שעת התחלה או שעת סיום חסרה או לא ניתנת לפענוח, הרשומה מושמטת ולא מוצגת כ"סגור". ימים א׳-ו׳ שלא הופיעו כלל בקבוצת השעות מושלמים כ"סגור"; שבת ללא שעות אינה מוחזרת. ימים רצופים מתאחדים לטווח רק כאשר הטקסט, הסטטוס וההערה זהים. מקור=${rows.length}, תקינים=${validRows.length}, קבוצות לתצוגה=${groups.length}; פירוט קבוצות=${groupText}`;
    }

    function serviceDecision(hit, result) {
      const section = result.providerDetails.sections?.services;
      const items = asArray(section?.groups).flatMap((group) => asArray(group.items).map((item) => item.text));
      return `טיפול מוצג רק אם נמצא שם טיפול לתצוגה לפי סדר fallback: sgTreatName, cellTreatName, hebrewText, hebrewServiceName. אם אין שם טיפול לתצוגה, הפריט מושמט גם אם קיים cptCode. קוד טיפול שמופיע בתוך הטקסט מנוקה מהתצוגה ואינו מוחזר ל־UI. הפריטים מקובצים לפי cptPubt; אם אין שם קבוצה, הקבוצה תוצג כ"טיפולים נוספים" ותמויין לאחר הקבוצות בעלות שם. מקור=${asArray(hit.servTreats).length}, פריטים לתצוגה=${items.length}; פירוט פריטים=${items.join(", ") || "לא נמצאו נתונים"}`;
    }

    function providerDetailsDecision(hit, result) {
      const details = result.providerDetails;
      const headerChips = asArray(details.header?.chips);
      const chipText = headerChips.map((chip) => chip.text).join(", ");
      const chipsDecision = headerChips.length
        ? `header chips נבנו רק מתגיות שב״ן: ${chipText}`
        : `לא נבנו header chips כי shabanType=${hit?.shabanType ?? "null"} אינו יוצר תגית שב״ן`;
      const sectionNames = Object.keys(details.sections || {}).join(", ") || "לא נבנו אזורי תוכן להצגה";
      return `providerDetailsById[${result.resultId}] נבנה עם header שמשתמש באותו title/avatar/subtitle של הכרטיס. ${chipsDecision}. sections נבנו רק עבור אזורים שבהם קיים תוכן להצגה: ${sectionNames}`;
    }

    function absenceDecision(hit, result) {
      const absence = asArray(hit.absences)[0];
      const displayItem = asArray(result.providerDetails.sections?.absences?.items)[0];
      if (!absence || !displayItem) return `לא נבנה טקסט היעדרות כי לא חזרה היעדרות תקפה מה-Agent`;
      const start = formatDateForDisplay(absence.absenceBdate);
      const end = formatDateForDisplay(absence.absenceEdate);
      const female = avatarType(hit.serviceProviderGender) === "doctorFemale";
      const who = female ? "הרופאה לא נמצאת" : "הרופא לא נמצא";
      const dateRule = !end || start === end ? `תאריך יחיד -> ${start}` : `טווח תאריכים -> ${start} עד ${end}`;
      const sub = asArray(hit.substitutes)[0];
