<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>סימולציית מסכי רופא</title>
  <style>
    :root{
      --blue:#06489b;
      --blue-2:#eaf6ff;
      --line:#d7e6f2;
      --green:#eaffd2;
      --green-border:#b7e889;
      --green-text:#167a31;
      --red:#d5243f;
      --yellow:#f5a400;
      --text:#17213a;
      --muted:#596273;
      --bg:#f5f7fb;
      --card:#fff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, "Noto Sans Hebrew", sans-serif;
      background:var(--bg);
      color:var(--text);
      direction:rtl;
    }
    .toolbar{
      position:sticky;
      top:0;
      z-index:10;
      background:#fff;
      border-bottom:1px solid #e5e9f0;
      padding:12px 18px;
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
    }
    .toolbar h1{font-size:18px;margin:0;color:var(--blue)}
    input[type=file]{max-width:360px}
    .status{font-size:13px;color:var(--muted)}
    .screens{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px;
      padding:24px;
      max-width:1500px;
      margin:auto;
      align-items:start;
    }
    .screen{
      background:#fff;
      border:1px solid #dfe6ef;
      border-radius:18px;
      padding:18px;
      box-shadow:0 6px 18px rgba(20,40,80,.08);
    }
    .screen-title{
      font-size:26px;
      color:#10295c;
      margin:4px 0 18px;
      font-weight:800;
      text-align:right;
    }
    .card{
      border:1px solid #d9e2ec;
      border-radius:14px;
      background:var(--card);
      margin:14px 0;
      padding:16px;
      box-shadow:0 2px 8px rgba(30,50,80,.05);
    }
    .section-title{
      color:var(--blue);
      font-size:20px;
      font-weight:800;
      border-bottom:1px solid #bcdff5;
      padding-bottom:12px;
      margin:0 0 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .notice{
      background:var(--green);
      border:1px solid var(--green-border);
      border-radius:10px;
      padding:10px 14px;
      color:#35522c;
      font-size:14px;
      margin-bottom:14px;
      display:flex;
      gap:8px;
      align-items:center;
    }
    .notice:before{content:"✓"; color:#46a929; font-weight:900}
    .doctor-hero{
      display:grid;
      grid-template-columns:86px 1fr;
      gap:16px;
      background:var(--blue-2);
      border-radius:12px;
      padding:16px;
      align-items:center;
    }
    .avatar{
      width:76px;height:76px;border-radius:50%;
      background:linear-gradient(#e8edf3,#cfd8e3);
      display:flex;align-items:center;justify-content:center;
      font-size:42px;color:#69778a;
      border:1px solid #ccd7e3;
    }
    .doctor-name{font-size:22px;color:var(--blue);font-weight:800;margin:0 0 8px}
    .meta{font-size:15px;line-height:1.8;color:#1d2840}
    .muted{color:var(--muted)}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
    .chip{
      border-radius:9px;
      padding:6px 10px;
      font-size:13px;
      font-weight:700;
      background:#eef3f9;
    }
    .chip.green{background:#e7f8ea;color:var(--green-text)}
    .chip.blue{background:#eaf3ff;color:#1662b8;border:1px solid #b8d6ff}
    .chip.red{background:#fff0f2;color:var(--red);border:1px solid #ffc2cb}
    .two-col{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }
    table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }
    th{
      background:#e5f6ff;
      color:#17213a;
      padding:10px;
      border:1px solid #cde8f7;
      font-weight:800;
    }
    td{
      padding:10px;
      border-bottom:1px solid #dce7ef;
      vertical-align:top;
    }
    tr.day-break td{border-top:1px solid #bcdff5}
    .closed{color:#454b5b}
    .contact-row{
      display:grid;
      grid-template-columns:130px 1fr 32px;
      gap:8px;
      align-items:center;
      padding:12px 0;
      border-bottom:1px solid #e0e6ee;
    }
    .contact-row:last-child{border-bottom:0}
    .contact-label{font-weight:800;color:#10295c}
    .contact-value{direction:ltr;text-align:left}
    a{color:#06489b}
    .info-note{
      display:grid;
      grid-template-columns:24px 1fr;
      gap:8px;
      margin-top:12px;
      font-size:14px;
      line-height:1.7;
      color:#2e3447;
    }
    .info-dot{
      width:22px;height:22px;border-radius:50%;
      background:#2176ff;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;
    }
    .absence-item{
      display:flex;
      gap:8px;
      align-items:flex-start;
      padding:8px 0;
      font-size:14px;
      line-height:1.7;
    }
    .warn{color:var(--yellow);font-weight:900}
    .accordion{
      border:1px solid #d9e2ec;
      border-radius:12px;
      margin:10px 0;
      overflow:hidden;
      background:#fff;
    }
    .acc-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:13px 14px;
      font-weight:800;
      color:#103b83;
      border-bottom:1px solid #d9e2ec;
    }
    .acc-body{padding:0 14px 10px}
    .treat-row{
      display:grid;
      grid-template-columns:1fr 84px;
      gap:10px;
      align-items:center;
      padding:10px 0;
      border-bottom:1px solid #e3e9f1;
      font-size:14px;
    }
    .treat-row:last-child{border-bottom:0}
    .badge{
      justify-self:start;
      border-radius:7px;
      padding:4px 8px;
      font-size:12px;
      font-weight:800;
      border:1px solid #c8d7e6;
      background:#f4f6f8;
      color:#334;
    }
    .badge.basket{background:#effcf3;color:#15703a;border-color:#9ee3b4}
    .badge.supplementary{background:#eef5ff;color:#1764d8;border-color:#acd0ff}
    .badge.unknown{background:#f3f4f6;color:#555;border-color:#ddd}
    .small-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .kv{padding:8px 0;border-bottom:1px solid #e5edf4}
    .kv b{color:#10295c}
    .empty{
      color:#7d8794;
      text-align:center;
      padding:28px;
      border:1px dashed #cfd8e3;
      border-radius:12px;
    }
    @media (max-width:1000px){
      .screens{grid-template-columns:1fr;padding:12px}
      .two-col,.small-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>סימולציית תוצאות חיפוש ופרטי רופא</h1>
    <div>
      <input id="fileInput" type="file" accept=".json,.txt,application/json" />
      <span class="status" id="status">טעני JSON כדי להציג סימולציה</span>
    </div>
  </div>

  <main class="screens">
    <section class="screen" id="searchScreen">
      <div class="empty">לא נטען JSON</div>
    </section>
    <section class="screen" id="detailsScreen">
      <div class="empty">לא נטען JSON</div>
    </section>
  </main>

<script>
const CONTACT_ORDER = {"02":1,"01":2,"03":3,"05":4,"04":5};
const CONTACT_TYPES = {
  "02": {type:"appointment", icon:"☎"},
  "01": {type:"phone", icon:"☎"},
  "03": {type:"fax", icon:"▣"},
  "05": {type:"email", icon:"✉"},
  "04": {type:"mobile", icon:"▯"}
};
const SCHEDULE_ORDER = {1:1,2:2,5:3,14:4,15:5};
const DAY_LABELS = {1:"א׳",2:"ב׳",3:"ג׳",4:"ד׳",5:"ה׳",6:"ו׳",7:"שבת"};

function escapeHtml(v){
  return String(v ?? "").replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]));
}
function onlyDigitsDateParts(s){
  if(!s) return null;
  const str = String(s);
  if(/^\d{4}-\d{2}-\d{2}$/.test(str)){
    const [y,m,d]=str.split("-");
    return {y:+y,m:+m,d:+d, iso:str};
  }
  if(/^\d{2}\.\d{2}\.\d{4}$/.test(str)){
    const [d,m,y]=str.split(".");
    return {y:+y,m:+m,d:+d, iso:`${y}-${m}-${d}`};
  }
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(str)){
    const [d,m,y]=str.split("/");
    return {y:+y,m:+m,d:+d, iso:`${y}-${m}-${d}`};
  }
  return null;
}
function parseDate(s){
  const p = onlyDigitsDateParts(s);
  if(!p) return null;
  return new Date(p.y, p.m-1, p.d);
}
function formatDate(s){
  const p = onlyDigitsDateParts(s);
  if(!p) return escapeHtml(s);
  return `${String(p.d).padStart(2,"0")}/${String(p.m).padStart(2,"0")}/${p.y}`;
}
function todayDateOnly(){
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}
function getSource(payload){
  const hit = payload?.data?.service_guide?.hits?.[0];
  if(!hit?.source) throw new Error("לא נמצא data.service_guide.hits[0].source");
  return hit.source;
}
function normArray(a){ return Array.isArray(a) ? a : []; }

function buildViewModel(src){
  const contacts = normArray(src.contact)
    .filter(c => c.contact_detail && CONTACT_TYPES[c.contact_code])
    .sort((a,b)=>(CONTACT_ORDER[a.contact_code]??99)-(CONTACT_ORDER[b.contact_code]??99))
    .map(c => {
      const t = CONTACT_TYPES[c.contact_code];
      const value = String(c.contact_detail);
      let action = null;
      if(["01","02","04"].includes(c.contact_code)) action = `tel:${value}`;
      if(c.contact_code === "05") action = `mailto:${value}`;
      return {code:c.contact_code, type:t.type, label:c.contact_desc, value, action, icon:t.icon};
    });

  const scheduleGroups = buildScheduleGroups(normArray(src.schedule));
  const absences = buildAbsences(normArray(src.absence), normArray(src.substitute));
  const treatments = buildTreatmentGroups(normArray(src.serv_treats));
  const emergency = normArray(src.remarks).find(r => ["10","0010","00010"].includes(String(r.remark_message_type_code).replace(/^0+(?=\d)/,"")));

  return {
    header: {
      name: src.service_provider_name,
      profileUrl: src.service_provider_name_url,
      gender: src.service_provider_gender,
      avatar: src.service_provider_gender === "F" ? "👩" : "👨",
      specializations: normArray(src.specialization_list),
      occupations: normArray(src.treat_area_list).map(x=>x.treat_area).filter(Boolean),
      languages: normArray(src.languages).map(x=>x.language).filter(Boolean),
      city: src.city_name,
      accessibility: src.accessibility_bool ? src.accessibility : null,
      limited: !!src.limited_memb_icon,
      shaban: src.shaban_ind ? shabanText(src.shaban_type) : null
    },
    emergency: emergency ? {text: emergency.remark_text} : null,
    contacts,
    scheduleGroups,
    absences,
    address: {
      full: src.full_address,
      city: src.city_name,
      street: src.street_name,
      house: src.house_number
    },
    treatments,
    details: {
      licenseNumber: src.license_number,
      resume: normArray(src.resume)
    }
  };
}
function shabanText(t){
  if(Number(t)===1) return "ייעוץ בתשלום נוסף";
  if(Number(t)===2) return "ניתוחים וטיפולים בתשלום נוסף";
  return null;
}
function buildScheduleGroups(schedule){
  const allowed = new Set([1,2,5,14,15]);
  const byType = new Map();

  schedule
    .filter(r =>
      allowed.has(Number(r.schedule_type)) &&
      r.availability_week_day &&
      r.availability_start_time &&
      r.availability_end_time
    )
    .forEach(r => {
      const type = Number(r.schedule_type);
      if(!byType.has(type)) byType.set(type,{type,title:r.schedule_desc || String(type), rows:[]});
      byType.get(type).rows.push(r);
    });

  return [...byType.values()]
    .sort((a,b)=>(SCHEDULE_ORDER[a.type]??99)-(SCHEDULE_ORDER[b.type]??99))
    .map(group => {
      const days = [...new Set(group.rows.map(r => Number(r.availability_week_day)))]
        .sort((a,b)=>a-b)
        .map(d => {
          const rows = group.rows
            .filter(r => Number(r.availability_week_day)===d)
            .sort((a,b)=>String(a.availability_start_time).localeCompare(String(b.availability_start_time)))
            .map((r,i)=>({
              hours:`${r.availability_start_time} עד ${r.availability_end_time}`,
              notes:r.frequency_desc || "",
              isClosed:false,
              showDayLabel:i===0
            }));
          return {dayCode:d,dayLabel:DAY_LABELS[d] || String(d),rows};
        });

      return {type:group.type,title:group.title,days};
    })
    .filter(group => group.days.length > 0);
}
function buildAbsences(absences, substitutes){
  const today = todayDateOnly();
  return absences
    .map(a => ({...a, _start: parseDate(a.absence_bdate), _end: parseDate(a.absence_edate)}))
    .filter(a => a._start && a._end && a._end >= today)
    .sort((a,b)=>a._start-b._start)
    .map(a => {
      const sub = substitutes.find(s => String(s.sub_bdate)===String(a.absence_bdate) && String(s.sub_edate)===String(a.absence_edate));
      const single = String(a.absence_bdate) === String(a.absence_edate);
      const displayDate = single ? formatDate(a.absence_bdate) : `${formatDate(a.absence_bdate)} - ${formatDate(a.absence_edate)}`;
      const text = single ? `הרופא לא נמצא בתאריך: ${displayDate}` : `הרופא לא נמצא בתאריכים: ${displayDate}`;
      return {
        displayText:text,
        reason:a.absence_reason_dis ? a.absence_reason : null,
        substitute: sub ? {name:sub.sub_name, remark:sub.sub_remark, providerId:sub.sub_pernr, objectType:sub.sub_otype} : null
      };
    });
}
function buildTreatmentGroups(treats){
  const map = new Map();
  treats.filter(t => t.sg_treat_name).forEach((t,idx) => {
    const code = t.cpt_pubt || "00000";
    if(!map.has(code)){
      map.set(code,{groupCode:code,title:t.cpt_pubt_name || "ללא קטגוריה",sortOrder:idx,items:[]});
    }
    const coverageType = t.treat_is_personal === false ? "basket" : t.treat_is_personal === true ? "supplementary" : "unknown";
    const coverageText = coverageType === "basket" ? "בסל" : coverageType === "supplementary" ? "משלים" : "ללא ציון";
    map.get(code).items.push({code:t.cpt_code,name:t.sg_treat_name,coverageType,coverageText});
  });
  return [...map.values()].sort((a,b)=>a.sortOrder-b.sortOrder);
}

function renderDoctorHero(vm, compact=false){
  const h = vm.header;
  return `
    <div class="doctor-hero">
      <div class="avatar">${escapeHtml(h.avatar)}</div>
      <div>
        <div class="doctor-name">${escapeHtml(h.name)}</div>
        <div class="meta">
          ${line("התמחויות", h.specializations.join(", "))}
          ${line("התמקצעויות", h.occupations.join(", "))}
          ${line("שפות", h.languages.join(", "))}
          ${h.city ? `<span>${escapeHtml(h.city)}</span>` : ""}
        </div>
      </div>
    </div>
    <div class="chips">
      ${h.accessibility ? `<span class="chip green">♿ ${escapeHtml(h.accessibility)}</span>` : ""}
      ${h.limited ? `<span class="chip red">לא מקבל חברים חדשים</span>` : ""}
      ${h.shaban ? `<span class="chip blue">שב״ן ${escapeHtml(h.shaban)}</span>` : ""}
    </div>
  `;
}
function line(label,value){
  return value ? `<b>${escapeHtml(label)}:</b> ${escapeHtml(value)}<br>` : "";
}
function renderContacts(vm){
  if(!vm.contacts.length) return "";
  return `<div class="card">
    <h2 class="section-title">אמצעי תקשורת</h2>
    ${vm.contacts.map(c => {
      const value = c.action ? `<a href="${escapeHtml(c.action)}">${escapeHtml(c.value)}</a>` : escapeHtml(c.value);
      return `<div class="contact-row"><div class="contact-label">${escapeHtml(c.label)}</div><div class="contact-value">${value}</div><div>${escapeHtml(c.icon)}</div></div>`;
    }).join("")}
    ${vm.contacts.some(c=>c.type==="email") ? `<div class="info-note"><div class="info-dot">i</div><div>כתובת המייל מיועדת אך ורק להעברת טפסים ומסמכים הנדרשים להערכה. המייל אינו מיועד להתייעצות עם הרופאים והמטפלים והעברת מידע רפואי אחר.</div></div>` : ""}
  </div>`;
}
function renderSchedule(vm, limitGroups=false){
  if(!vm.scheduleGroups.length) return "";
  const groups = limitGroups ? vm.scheduleGroups.slice(0,2) : vm.scheduleGroups;
  return `<div class="card">
    <h2 class="section-title">שעות פעילות</h2>
    ${groups.map(g => `<div class="accordion">
      <div class="acc-head"><span>${escapeHtml(g.title)}</span><span>⌃</span></div>
      <table>
        <thead><tr><th>יום</th><th>שעה</th><th>הערה</th></tr></thead>
        <tbody>
          ${g.days.flatMap(day => day.rows.map((r,i) => `
            <tr class="${i===0?'day-break':''}">
              <td>${r.showDayLabel ? escapeHtml(day.dayLabel) : ""}</td>
              <td class="${r.isClosed?'closed':''}">${escapeHtml(r.hours)}</td>
              <td>${escapeHtml(r.notes)}</td>
            </tr>`)).join("")}
        </tbody>
      </table>
    </div>`).join("")}
  </div>`;
}
function renderAbsences(vm, limit=0){
  if(!vm.absences.length) return "";
  const items = limit ? vm.absences.slice(0,limit) : vm.absences;
  return `<div class="card">
    <h2 class="section-title">היעדרויות וממלאי מקום</h2>
    ${items.map(a => `<div class="absence-item">
      <span class="warn">!</span>
      <div>${escapeHtml(a.displayText)}${a.substitute ? `, ממלא מקום: <a href="#">${escapeHtml(a.substitute.name)}</a>` : ""}${a.reason ? `, ${escapeHtml(a.reason)}` : ""}</div>
    </div>`).join("")}
  </div>`;
}
function renderTreatments(vm, limitGroups=0){
  if(!vm.treatments.length) return "";
  const groups = limitGroups ? vm.treatments.slice(0,limitGroups) : vm.treatments;
  return `<div class="card">
    <h2 class="section-title">ניתוחים וטיפולים</h2>
    ${groups.map(g => `<div class="accordion">
      <div class="acc-head"><span>${escapeHtml(g.groupCode)} - ${escapeHtml(g.title)}</span><span>⌃</span></div>
      <div class="acc-body">
        ${g.items.map(i => `<div class="treat-row">
          <div>${escapeHtml(i.name)} ${i.code ? `<span class="muted">(${escapeHtml(i.code)})</span>` : ""}</div>
          <div class="badge ${escapeHtml(i.coverageType)}">${escapeHtml(i.coverageText)}</div>
        </div>`).join("")}
      </div>
    </div>`).join("")}
  </div>`;
}
function renderAddress(vm){
  if(!vm.address.full) return "";
  return `<div class="card">
    <h2 class="section-title">כתובת</h2>
    <div><a href="#">${escapeHtml(vm.address.full)}</a></div>
    <div class="notice" style="margin-top:12px">המתקן ממוגן תקנית וניתן בו שירות בהתאם לשעות הפעילות</div>
  </div>`;
}
function renderDetails(vm){
  const d=vm.details;
  if(!d.licenseNumber && !d.resume.length) return "";
  return `<div class="card">
    <h2 class="section-title">פרטי רופא</h2>
    ${d.licenseNumber ? `<div class="kv"><b>מספר רישיון:</b> ${escapeHtml(d.licenseNumber)}</div>` : ""}
    ${d.resume.map(r => `<div class="kv"><b>${escapeHtml(r.resume_topic || "")}</b><br>
      ${[1,2,3].map(n => {
        const label = r[`resume_title${n}`], value = r[`resume_title${n}_contents`];
        return label && value ? `${escapeHtml(label)}: ${escapeHtml(value)}<br>` : "";
      }).join("")}
    </div>`).join("")}
  </div>`;
}
function renderSearch(vm){
  return `
    <div class="screen-title">תוצאות חיפוש</div>
    ${vm.emergency ? `<div class="card"><div class="chip red">הערת חירום</div><div>${escapeHtml(vm.emergency.text)}</div></div>` : ""}
    <div class="card">
      ${renderDoctorHero(vm,true)}
      <div class="two-col">
        ${renderAbsences(vm,1)}
        ${renderSchedule(vm,true)}
      </div>
      <div class="two-col">
        ${renderContacts(vm)}
        ${renderTreatments(vm,2)}
      </div>
    </div>`;
}
function renderDetailsScreen(vm){
  return `
    <div class="screen-title">פרטי רופא</div>
    <div class="card">${renderDoctorHero(vm)}</div>
    <div class="small-grid">
      ${renderAbsences(vm)}
      ${renderDetails(vm)}
    </div>
    ${renderSchedule(vm)}
    ${renderAddress(vm)}
    ${renderTreatments(vm)}
    ${renderContacts(vm)}
  `;
}
function loadPayloadText(txt){
  const payload = JSON.parse(txt);
  const src = getSource(payload);
  const vm = buildViewModel(src);
  document.getElementById("searchScreen").innerHTML = renderSearch(vm);
  document.getElementById("detailsScreen").innerHTML = renderDetailsScreen(vm);
  document.getElementById("status").textContent = "הסימולציה נטענה";
}
document.getElementById("fileInput").addEventListener("change", async e => {
  const f = e.target.files[0];
  if(!f) return;
  try{
    const txt = await f.text();
    loadPayloadText(txt);
  }catch(err){
    document.getElementById("status").textContent = "שגיאה: " + err.message;
  }
});
</script>
</body>
</html>
