<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>מציג UI לפיילואד מוכן</title>
  <style>
    :root {
      --blue: #06489b;
      --blue-soft: #eaf6ff;
      --line: #d7e6f2;
      --text: #17213a;
      --muted: #596273;
      --bg: #f5f7fb;
      --card: #fff;
      --green: #167a31;
      --red: #d5243f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Noto Sans Hebrew", sans-serif;
      background: var(--bg);
      color: var(--text);
      direction: rtl;
    }
    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 22px;
    }
    .top {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }
    h1 {
      color: var(--blue);
      margin: 0 0 6px;
      font-size: 28px;
    }
    .top p { margin: 0; color: var(--muted); line-height: 1.6; }
    .layout {
      display: grid;
      grid-template-columns: minmax(360px, 0.85fr) minmax(520px, 1.25fr);
      gap: 18px;
      align-items: start;
    }
    .card, .provider-card {
      background: var(--card);
      border: 1px solid #dfe6ef;
      border-radius: 8px;
      box-shadow: 0 4px 14px rgba(20, 40, 80, 0.06);
    }
    .card-body { padding: 16px; }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .toolbar h2 { margin: 0; color: #10295c; font-size: 18px; }
    textarea {
      width: 100%;
      min-height: 560px;
      resize: vertical;
      border: 1px solid #ccd7e3;
      border-radius: 6px;
      padding: 12px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      direction: ltr;
      text-align: left;
      background: #fff;
    }
    .button {
      border: 1px solid #c5d5e8;
      border-radius: 6px;
      background: #fff;
      color: #0b4a94;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
    }
    .button.primary {
      background: var(--blue);
      color: white;
      border-color: var(--blue);
    }
    .button.small { padding: 6px 10px; font-size: 12px; }
    .status { color: var(--muted); font-size: 13px; margin-top: 8px; }
    .error {
      color: #9f1239;
      background: #fff0f3;
      border: 1px solid #fecdd3;
      border-radius: 6px;
      padding: 10px;
      margin-top: 8px;
      white-space: pre-wrap;
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .tab {
      border: 1px solid #c5d5e8;
      background: #fff;
      color: #123b70;
      padding: 10px;
      border-radius: 6px;
      font-weight: 800;
      cursor: pointer;
    }
    .tab.active {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }
    .entity-switcher {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .provider-screen {
      background: #fff;
      border: 1px solid #dfe6ef;
      border-radius: 8px;
      padding: 18px;
    }
    .service-screen-title {
      margin: 0 0 14px;
      color: #10295c;
      font-size: 24px;
    }
    .doctor-hero {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 14px;
      background: var(--blue-soft);
      border-radius: 8px;
      padding: 14px;
      align-items: center;
    }
    .doctor-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #d8e2ee;
      color: #69778a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 26px;
    }
    .doctor-name {
      color: var(--blue);
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 7px;
    }
    .doctor-meta {
      line-height: 1.7;
      font-size: 14px;
      color: #253047;
    }
    .provider-chips, .search-result-footer {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .provider-chip, .search-result-chip, .search-result-location, .search-result-message {
      border-radius: 6px;
      padding: 6px 9px;
      font-size: 12px;
      font-weight: 800;
      background: #eef3f9;
      color: #2f394a;
    }
    .green { background: #e7f8ea; color: var(--green); }
    .red { background: #fff0f2; color: var(--red); border: 1px solid #ffc2cb; }
    .blue { background: #eaf3ff; color: #1662b8; border: 1px solid #b8d6ff; }
    .provider-notice {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 8px;
      background: #eaffd2;
      border: 1px solid #b7e889;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      color: #35522c;
      line-height: 1.55;
    }
    .provider-icon-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #2176ff;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 12px;
    }
    .service-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 16px;
      align-items: start;
    }
    .service-layout.single { grid-template-columns: 1fr; }
    .provider-section-title {
      color: var(--blue);
      font-size: 18px;
      font-weight: 900;
      border-bottom: 1px solid #bcdff5;
      padding-bottom: 10px;
      margin: 0 0 12px;
    }
    .section-card {
      background: #fff;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .provider-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .provider-table th {
      background: #e5f6ff;
      color: #17213a;
      padding: 9px;
      border: 1px solid #cde8f7;
      text-align: right;
    }
    .provider-table td {
      padding: 9px;
      border-bottom: 1px solid #dce7ef;
      vertical-align: top;
    }
    .provider-table tr.day-break td { border-top: 1px solid #bcdff5; }
    .contact-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid #e0e6ee;
    }
    .contact-row:last-child { border-bottom: 0; }
    .contact-label { font-weight: 900; color: #10295c; }
    .contact-values {
      display: grid;
      gap: 5px;
      direction: ltr;
      text-align: left;
    }
    .contact-value {
      color: #06489b;
      font: inherit;
    }
    .treat-row {
      display: grid;
      grid-template-columns: 1fr 80px;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid #e3e9f1;
      font-size: 14px;
    }
    .coverage-badge {
      justify-self: start;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 900;
      border: 1px solid #c8d7e6;
      background: #f4f6f8;
    }
    .coverage-badge.basket { background: #effcf3; color: #15703a; border-color: #9ee3b4; }
    .coverage-badge.supplementary { background: #eef5ff; color: #1764d8; border-color: #acd0ff; }
    .kv {
      padding: 8px 0;
      border-bottom: 1px solid #e5edf4;
      line-height: 1.7;
    }
    .muted { color: var(--muted); }
    .search-result-card {
      background: #fff;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .search-result-hero {
      display: grid;
      grid-template-columns: 1fr 54px;
      gap: 12px;
      align-items: start;
    }
    .search-result-name {
      color: #1a73e8;
      font-size: 22px;
      line-height: 1.25;
      font-weight: 900;
      text-decoration: underline;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
    }
    .search-result-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #cfeeff;
      color: #06489b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
    }
    .search-result-meta { color: #2f394a; font-size: 14px; line-height: 1.7; margin-top: 6px; }
    pre {
      margin: 0;
      background: #0f172a;
      color: #e5e7eb;
      border-radius: 8px;
      padding: 14px;
      direction: ltr;
      text-align: left;
      overflow: auto;
      max-height: 760px;
      font-size: 12px;
      line-height: 1.5;
    }
    .empty {
      color: #7d8794;
      text-align: center;
      padding: 28px;
      border: 1px dashed #cfd8e3;
      border-radius: 8px;
      background: #fff;
    }
    @media (max-width: 1050px) {
      .layout, .service-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="top">
      <div>
        <h1>מציג UI לפיילואד מוכן</h1>
        <p>הדביקי response payload מוכן או טעני קובץ JSON. אין כאן יצירת payload, רק הצגה של `metadata + results[]` או רשומה בודדת.</p>
      </div>
      <div>
        <input id="fileInput" type="file" accept=".json,.txt,application/json" />
      </div>
    </div>

    <div class="layout">
      <section class="card">
        <div class="card-body">
          <div class="toolbar">
            <button class="button" id="loadSampleBtn">טען דוגמה</button>
            <h2>Payload מוכן</h2>
          </div>
          <textarea id="payloadInput" spellcheck="false"></textarea>
          <div id="payloadStatus" class="status"></div>
          <div id="payloadError" class="error" style="display:none"></div>
        </div>
      </section>

      <section>
        <div id="entitySwitcher" class="entity-switcher"></div>
        <div class="tabs">
          <button class="tab active" data-tab="results">תוצאות חיפוש</button>
          <button class="tab" data-tab="screen">פרטי רופא</button>
          <button class="tab" data-tab="payload">JSON</button>
        </div>
        <div id="resultsView"></div>
        <div id="screenView" style="display:none"></div>
        <div id="jsonView" style="display:none"></div>
      </section>
    </div>
  </main>

  <script>
    const input = document.getElementById("payloadInput");
    const statusBox = document.getElementById("payloadStatus");
    const errorBox = document.getElementById("payloadError");
    const switcher = document.getElementById("entitySwitcher");
    const resultsView = document.getElementById("resultsView");
    const screenView = document.getElementById("screenView");
    const jsonView = document.getElementById("jsonView");
    const fileInput = document.getElementById("fileInput");

    const state = {
      response: { metadata: null, results: [] },
      selectedIndex: 0,
      activeTab: "results",
    };

    const samplePayload = {
      metadata: {
        requestId: "viewer-sample",
        payloadVersion: "1.0",
        schemaName: "UniversalProviderDisplayPayload",
        schemaVersion: "1.0",
        supportedEntityTypes: ["doctor"],
        entityTypeVersions: { doctor: "1.0" },
        generatedAt: new Date().toISOString(),
        locale: { language: "he", country: "IL", direction: "rtl" },
        client: { clientType: "mobile", platform: "app", channel: "memberApp" },
        content: { mode: "hardcoded", provider: "agent", futureProvider: "umbraco", contentVersion: "hc-v1" },
        businessRules: { rulesetVersion: "provider-search-v1", source: "agent-hardcoded", applied: true },
        sourceData: { sourceSystem: "serviceGuide", sourcePayloadType: "originalJson", transformationVersion: "universal-provider-payload-v1" },
      },
      results: [{
        entity: {
          isVisible: true,
          entityType: "doctor",
          id: "1",
          sourceType: "001",
          sourceCode: "70068432",
          name: "רפואת משפחה",
          displayName: "דר אלישבע טובעלם",
          subtitle: "משפחה, פנימית וכללית",
          profileUrl: null,
          image: { type: "avatar", gender: "אישה", avatarType: "female", url: null, alt: "דר אלישבע טובעלם" },
        },
        presentation: {
          entityType: "doctor",
          searchResult: {
            title: "תוצאות חיפוש",
            contentKeys: { title: "provider.searchResult.title" },
            componentIds: ["entity", "specializations", "professionalizations", "languages", "remarks", "icons", "address", "absences"],
          },
          details: {
            title: "איתור שירות",
            contentKeys: { title: "provider.details.screenTitle" },
            layoutPolicy: "clientManaged",
            availableComponentIds: ["remarks", "entity", "specializations", "professionalizations", "languages", "icons", "absences", "schedule", "address", "facil", "services", "appointments", "contacts", "resume"],
          },
        },
        components: {
          specializations: { id: "specializations", title: "מומחיות", isVisible: true, contentKeys: { title: "provider.specializations.title" }, values: [{ value: "משפחה, פנימית וכללית", sortOrder: 1 }] },
          professionalizations: { id: "professionalizations", title: "התמקצעות", isVisible: true, contentKeys: { title: "provider.professionalizations.title" }, values: [{ value: "משפחה, פנימית וכללית", sortOrder: 1 }] },
          languages: { id: "languages", title: "שפות", isVisible: true, contentKeys: { title: "provider.languages.title" }, values: [{ value: "עברית", sortOrder: 1 }, { value: "אנגלית", sortOrder: 2 }] },
          address: { id: "address", title: "כתובת", isVisible: true, contentKeys: { title: "provider.address.title" }, city: "ירושלים", street: "הרב עוזיאל", streetCode: "3996", houseNumber: "98", fullAddress: "ירושלים הרב עוזיאל 98", displayAddress: "ירושלים הרב עוזיאל 98", navigationUrl: null, accessibility: { isVisible: true, text: "נגיש" }, messages: [] },
          remarks: { id: "remarks", isVisible: false, items: [] },
          icons: { id: "icons", isVisible: true, items: [{ id: "accessibility", type: "accessibility", text: "נגיש", icon: "accessibility", targetArea: "entityHeader", severity: "positive", source: "accessibility_bool", sortOrder: 1 }] },
          facil: { id: "facil", title: "מתקנים", isVisible: false, contentKeys: { title: "provider.facil.title" }, items: [] },
          absences: { id: "absences", title: "היעדרויות וממלאי מקום", isVisible: false, contentKeys: { title: "provider.absences.title" }, items: [] },
          schedule: {
            id: "schedule",
            title: "שעות פעילות",
            isVisible: true,
            contentKeys: { title: "provider.schedule.title" },
            groups: [{
              type: "reception",
              title: "שעות פעילות הרופא",
              sortOrder: 1,
              days: [{ dayCode: 1, dayLabel: "א׳", isVisible: true, rows: [{ startTime: "08:30", endTime: "12:30", hoursText: "08:30 עד 12:30", notes: "שבועית", isClosed: false, showDayLabel: true, availableMorning: true, availableAfternoon: false, availableEvening: false, sortOrder: 1 }] }],
              displayDays: [{ dayCodes: [1], dayLabel: "א׳", isRange: false, rows: [{ startTime: "08:30", endTime: "12:30", hoursText: "08:30 עד 12:30", notes: "שבועית", isClosed: false, showDayLabel: true, sortOrder: 1 }], sortOrder: 1 }],
              display: { defaultOpen: true, previewRows: null, hasOverflow: false },
            }],
          },
          services: { id: "services", title: "ניתוחים וטיפולים", isVisible: false, contentKeys: { title: "provider.services.title" }, groups: [] },
          appointments: { id: "appointments", title: "זימון תורים", isVisible: false, contentKeys: { title: "provider.appointments.title" }, messages: [] },
          contacts: { id: "contacts", title: "אמצעי תקשורת", isVisible: true, contentKeys: { title: "provider.contacts.title" }, items: [{ type: "appointments", sourceCode: "02", label: "זימון תורים", sortOrder: 2, values: [{ value: "*3555", preferredAction: { type: "tel", uri: "tel:*3555" }, sortOrder: 1 }] }], messages: [] },
          resume: { id: "resume", title: "פרטים נוספים", isVisible: true, contentKeys: { title: "provider.resume.sectionTitle" }, sections: [{ type: "license", title: "רישיון", contentKeys: { title: "provider.resume.license.title" }, sortOrder: 1, items: [{ label: "מספר רישיון", value: "1-84096", sortOrder: 1, contentKeys: { label: "provider.resume.license.numberLabel" } }] }] },
        },
      }],
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeJsString(value) {
      return String(value ?? "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/\r/g, "\\r")
        .replace(/\n/g, "\\n");
    }

    function nonEmpty(value) {
      return value !== undefined && value !== null && String(value).trim() !== "";
    }

    function normalizePayload(inputPayload) {
      if (!inputPayload) return { metadata: null, results: [] };
      if (Array.isArray(inputPayload)) return { metadata: null, results: inputPayload };
      if (Array.isArray(inputPayload.results)) return inputPayload;
      if (inputPayload.entity && inputPayload.presentation && inputPayload.components) {
        const { metadata = null, ...result } = inputPayload;
        return { metadata, results: [result] };
      }
      if (inputPayload.metadata && inputPayload.entity && inputPayload.components) {
        const { metadata, ...result } = inputPayload;
        return { metadata, results: [result] };
      }
      return { metadata: inputPayload.metadata || null, results: [] };
    }

    function getComponent(result, id) {
      return result && result.components ? result.components[id] : null;
    }

    function componentValues(component) {
      return component && Array.isArray(component.values)
        ? component.values.map((item) => item && item.value).filter(nonEmpty)
        : [];
    }

    function renderMetaLine(label, values) {
      return values && values.length ? `<span><b>${escapeHtml(label)}:</b> ${escapeHtml(values.join(", "))}</span><br>` : "";
    }

    function renderSection(title, content) {
      if (!content) return "";
      return `<section class="section-card"><h2 class="provider-section-title">${escapeHtml(title || "")}</h2>${content}</section>`;
    }

    function renderHeader(result) {
      const e = result.entity || {};
      const specializations = componentValues(getComponent(result, "specializations"));
      const professionalizations = componentValues(getComponent(result, "professionalizations"));
      const languages = componentValues(getComponent(result, "languages"));
      const address = getComponent(result, "address") || {};
      const icons = (getComponent(result, "icons") || { items: [] }).items || [];
      const accessibility = icons.filter((icon) => icon.type === "accessibility");
      const limited = icons.filter((icon) => icon.type === "limitedMembership");
      const shaban = icons.filter((icon) => icon.type && icon.type.indexOf("shaban") === 0);

      return `
        <div class="provider-card" style="padding:14px;margin-bottom:12px">
          <div class="doctor-hero">
            <div class="doctor-avatar">דר</div>
            <div>
              <div class="doctor-name">${escapeHtml(e.displayName || "")}</div>
              <div class="doctor-meta">
                ${renderMetaLine((getComponent(result, "specializations") || {}).title || "מומחיות", specializations)}
                ${renderMetaLine((getComponent(result, "professionalizations") || {}).title || "התמקצעות", professionalizations)}
                ${renderMetaLine((getComponent(result, "languages") || {}).title || "שפות", languages)}
                ${e.subtitle ? `<span>${escapeHtml(e.subtitle)}</span><br>` : ""}
                ${address.city ? `<span>${escapeHtml(address.city)}</span>` : ""}
              </div>
            </div>
          </div>
          <div class="provider-chips">
            ${accessibility.map((icon) => `<span class="provider-chip green">${escapeHtml(icon.text || "נגיש")}</span>`).join("")}
            ${limited.map((icon) => `<span class="provider-chip red">${escapeHtml(icon.text || "")}</span>`).join("")}
            ${shaban.map((icon) => `<span class="provider-chip blue">שב&quot;ן ${escapeHtml(icon.text || "")}</span>`).join("")}
          </div>
        </div>
      `;
    }

    function renderRemarks(result) {
      const remarks = getComponent(result, "remarks");
      const items = remarks && remarks.items ? remarks.items.filter((r) => r.isVisible && r.targetArea !== "locations") : [];
      return items.map((r) => `<div class="provider-notice"><div class="provider-icon-dot">i</div><div>${escapeHtml(r.text)}</div></div>`).join("");
    }

    function renderAbsences(result) {
      const absences = getComponent(result, "absences");
      const displayed = absences && absences.items ? absences.items.filter((item) => item.isDisplayed) : [];
      return displayed.map((item) => `<div class="provider-notice"><div class="provider-icon-dot">!</div><div>${escapeHtml(item.displayText || item.displayDate || "")}${item.reason ? `, ${escapeHtml(item.reason)}` : ""}</div></div>`).join("");
    }

    function renderSchedule(result) {
      const schedule = getComponent(result, "schedule");
      const groups = schedule && schedule.groups ? schedule.groups : [];
      return groups.map((group) => {
        const days = group.displayDays || group.days || [];
        const rows = days.filter((day) => day.isVisible !== false).flatMap((day) => (day.rows || []).map((row, index) => `
          <tr class="${index === 0 ? "day-break" : ""}">
            <td>${row.showDayLabel !== false && index === 0 ? escapeHtml(day.dayLabel || "") : ""}</td>
            <td>${escapeHtml(row.hoursText || [row.startTime, row.endTime].filter(Boolean).join(" עד "))}</td>
            <td>${escapeHtml(row.notes || "")}</td>
          </tr>
        `)).join("");
        return `
          <div style="margin-bottom:12px">
            <h3 style="margin:0 0 8px;color:#103b83;font-size:15px">${escapeHtml(group.title || "")}</h3>
            <table class="provider-table">
              <thead><tr><th>יום</th><th>שעה</th><th>הערה</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        `;
      }).join("");
    }

    function renderAddress(result) {
      const address = getComponent(result, "address");
      if (!address || !nonEmpty(address.displayAddress)) return "";
      return `
        <div>
          <a href="${escapeHtml(address.navigationUrl || "#")}">${escapeHtml(address.displayAddress)}</a>
          ${address.accessibility && address.accessibility.isVisible ? `<div class="provider-notice" style="margin-top:12px"><div class="provider-icon-dot">i</div><div>${escapeHtml(address.accessibility.text || "")}</div></div>` : ""}
        </div>
      `;
    }

    function renderServices(result) {
      const services = getComponent(result, "services");
      const groups = services && services.groups ? services.groups : [];
      return groups.map((group) => `
        <div style="margin-bottom:12px">
          <h3 style="margin:0 0 8px;color:#103b83;font-size:15px">${escapeHtml(group.title || "")}</h3>
          ${(group.items || []).map((item) => `
            <div class="treat-row">
              <div>${escapeHtml(item.name || "")}</div>
              <div class="coverage-badge ${escapeHtml(item.coverageType || "")}">${escapeHtml(item.coverageText || "")}</div>
            </div>
          `).join("")}
        </div>
      `).join("");
    }

    function renderAppointments(result) {
      const appointments = getComponent(result, "appointments");
      if (!appointments || !appointments.messages) return "";
      return appointments.messages.map((message) => `<div class="provider-notice"><div class="provider-icon-dot">i</div><div>${escapeHtml(message.text || "")}</div></div>`).join("");
    }

    function renderContacts(result) {
      const contacts = getComponent(result, "contacts");
      if (!contacts || !contacts.items) return "";
      return `
        ${(contacts.items || []).map((contact) => `
          <div class="contact-row">
            <div class="contact-label">${escapeHtml(contact.label || "")}</div>
            <div class="contact-values">
              ${(contact.values || []).map((valueItem) => {
                const action = valueItem.preferredAction;
                if (action && action.type === "tel") return `<a class="contact-value" href="${escapeHtml(action.uri || "#")}">${escapeHtml(valueItem.value || "")}</a>`;
                if (action && action.type === "mailto") return `<a class="contact-value" href="${escapeHtml(action.uri || "#")}">${escapeHtml(valueItem.value || "")}</a>`;
                if (action && action.type === "copy") return `<button type="button" class="button small contact-value" onclick="copyContactValue('${escapeHtml(escapeJsString(valueItem.value || ""))}')">${escapeHtml(valueItem.value || "")}</button>`;
                return `<span class="contact-value">${escapeHtml(valueItem.value || "")}</span>`;
              }).join("")}
            </div>
          </div>
        `).join("")}
        ${(contacts.messages || []).map((message) => `<div class="provider-notice"><div class="provider-icon-dot">i</div><div>${escapeHtml(message.text || "")}</div></div>`).join("")}
      `;
    }

    function renderResume(result) {
      const resume = getComponent(result, "resume");
      if (!resume || !resume.sections) return "";
      return resume.sections.map((section) => `
        <div class="kv">
          <b>${escapeHtml(section.title || "")}</b>
          ${(section.items || []).map((item) => `<div>${item.label ? `<span class="muted">${escapeHtml(item.label)}:</span> ` : ""}${escapeHtml(item.value || "")}</div>`).join("")}
        </div>
      `).join("");
    }

    function renderDetailsScreen(result) {
      if (!result) return `<div class="empty">אין result להצגה</div>`;
      const components = result.components || {};
      const title = result.presentation && result.presentation.details ? result.presentation.details.title : "";
      const top = [renderRemarks(result), renderHeader(result)].filter(Boolean).join("");
      const main = [
        components.absences && components.absences.isVisible ? renderSection(components.absences.title, renderAbsences(result)) : "",
        components.schedule && components.schedule.isVisible ? renderSection(components.schedule.title, renderSchedule(result)) : "",
        components.address && components.address.isVisible ? renderSection(components.address.title, renderAddress(result)) : "",
        components.facil && components.facil.isVisible ? renderSection(components.facil.title, "") : "",
        components.services && components.services.isVisible ? renderSection(components.services.title, renderServices(result)) : "",
        components.resume && components.resume.isVisible ? renderSection(components.resume.title, renderResume(result)) : "",
      ].filter(Boolean).join("");
      const side = [
        components.appointments && components.appointments.isVisible ? renderSection(components.appointments.title, renderAppointments(result)) : "",
        components.contacts && components.contacts.isVisible ? renderSection(components.contacts.title, renderContacts(result)) : "",
      ].filter(Boolean).join("");

      return `
        <div class="provider-screen">
          <h2 class="service-screen-title">${escapeHtml(title)}</h2>
          ${top}
          <div class="service-layout ${side ? "" : "single"}">
            <div>${main}</div>
            ${side ? `<aside>${side}</aside>` : ""}
          </div>
        </div>
      `;
    }

    function renderSearchResult(result, index) {
      const entity = result.entity || {};
      const address = getComponent(result, "address") || {};
      const icons = (getComponent(result, "icons") || { items: [] }).items || [];
      const accessibility = icons.find((icon) => icon.type === "accessibility");
      const displayIcons = icons.filter((icon) => icon.type !== "accessibility");
      const specializations = componentValues(getComponent(result, "specializations"));
      const professionalizations = componentValues(getComponent(result, "professionalizations"));
      const languages = componentValues(getComponent(result, "languages"));
      const remarks = getComponent(result, "remarks") || { items: [] };
      const emergency = (remarks.items || []).filter((remark) => remark.isVisible && remark.type === "emergency");

      return `
        <article class="search-result-card">
          <div class="search-result-hero">
            <div>
              <button type="button" class="search-result-name" onclick="openEntityDetails(${index})">${escapeHtml(entity.displayName || "")}</button>
              <div class="search-result-meta">
                ${specializations.length ? `${escapeHtml(specializations.join(", "))}<br>` : ""}
                ${renderMetaLine((getComponent(result, "professionalizations") || {}).title || "התמקצעות", professionalizations)}
                ${renderMetaLine((getComponent(result, "languages") || {}).title || "שפות", languages)}
              </div>
            </div>
            <div class="search-result-avatar">דר</div>
          </div>
          <div class="search-result-footer">
            ${accessibility ? `<span class="search-result-chip green">${escapeHtml(accessibility.text || "נגיש")}</span>` : ""}
            ${displayIcons.map((icon) => `<span class="search-result-chip">${escapeHtml(icon.text || "")}</span>`).join("")}
            ${address.city ? `<span class="search-result-location">${escapeHtml(address.city)}</span>` : ""}
            ${emergency.map((remark) => `<span class="search-result-message">${escapeHtml(remark.text || "")}</span>`).join("")}
          </div>
        </article>
      `;
    }

    function renderSearchResults(results) {
      if (!results.length) return `<div class="empty">אין תוצאות להצגה</div>`;
      return results.map((result, index) => renderSearchResult(result, index)).join("");
    }

    function renderSwitcher() {
      const results = state.response.results || [];
      if (results.length <= 1) {
        switcher.innerHTML = "";
        return;
      }
      switcher.innerHTML = results.map((result, index) => `
        <button class="button small ${index === state.selectedIndex ? "primary" : ""}" onclick="selectEntity(${index})">
          ${index + 1}. ${escapeHtml((result.entity || {}).displayName || "ישות")}
        </button>
      `).join("");
    }

    window.selectEntity = function(index) {
      state.selectedIndex = index;
      renderAll();
    };

    window.openEntityDetails = function(index) {
      state.selectedIndex = index;
      state.activeTab = "screen";
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.tab === "screen");
      });
      renderAll();
    };

    window.copyContactValue = async function(value) {
      try {
        await navigator.clipboard.writeText(value);
        window.alert("הערך הועתק");
      } catch (error) {
        window.alert("לא ניתן להעתיק");
      }
    };

    function renderAll() {
      const results = state.response.results || [];
      const selected = results[state.selectedIndex];
      renderSwitcher();
      resultsView.innerHTML = renderSearchResults(results);
      screenView.innerHTML = renderDetailsScreen(selected);
      jsonView.innerHTML = `<pre>${escapeHtml(JSON.stringify(state.response, null, 2))}</pre>`;

      resultsView.style.display = state.activeTab === "results" ? "block" : "none";
      screenView.style.display = state.activeTab === "screen" ? "block" : "none";
      jsonView.style.display = state.activeTab === "payload" ? "block" : "none";
    }

    function parseAndRender() {
      try {
        const parsed = JSON.parse(input.value);
        state.response = normalizePayload(parsed);
        state.selectedIndex = 0;
        errorBox.style.display = "none";
        statusBox.textContent = `נטענו ${(state.response.results || []).length} תוצאות`;
      } catch (error) {
        state.response = { metadata: null, results: [] };
        errorBox.style.display = "block";
        errorBox.textContent = `שגיאת JSON: ${error.message}`;
        statusBox.textContent = "";
      }
      renderAll();
    }

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        state.activeTab = tab.dataset.tab;
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");
        renderAll();
      });
    });

    document.getElementById("loadSampleBtn").addEventListener("click", () => {
      input.value = JSON.stringify(samplePayload, null, 2);
      parseAndRender();
    });

    fileInput.addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      input.value = await file.text();
      parseAndRender();
    });

    input.addEventListener("input", parseAndRender);
    input.value = JSON.stringify(samplePayload, null, 2);
    parseAndRender();
  </script>
</body>
</html>
